<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

        * {

            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f5f0e8;
            font-family: 'PingFang TC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
        }

        #left-panel {
            flex: 0 0 50%;
            height: 100vh;
            display: flex;
            flex-direction: row;
            padding: 2vh 0 2vh 1vw;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(180, 150, 100, 0.2);
            position: relative;
            z-index: 2;
        }
        #left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(200, 170, 120, 0.05), transparent 60%);
            pointer-events: none;
            animation: breatheGlow 8s ease-in-out infinite alternate;
            z-index: -1;
        }
        @keyframes breatheGlow {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        /* 缩略图列 */
        #thumbnail-column {
            flex: 0 0 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2vh;
            padding: 1vh 0;
            border-right: 1px solid rgba(180, 150, 100, 0.15);
            margin-right: 1vw;
        }
        .thumb-btn {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            border: 2px solid rgba(180, 150, 100, 0.3);
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            overflow: hidden;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .thumb-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .thumb-btn:hover {
            border-color: #b8860b;
            background: rgba(255,215,0,0.1);
        }
        .thumb-btn.active {
            border-color: #b8860b;
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.15);
        }
        .thumb-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: rgba(180,150,100,0.2);
            filter: grayscale(0.3);
        }
        .thumb-btn.exit-btn {
            margin-top: auto;
            border-color: rgba(200, 70, 70, 0.3);
            background: rgba(200,70,70,0.05);
            font-size: 0.8rem;
            color: #a94442;
            font-weight: 500;
        }
        .thumb-btn.exit-btn:hover {
            background: rgba(200,70,70,0.1);
            border-color: #a94442;
        }

        /* 右侧主内容区 */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-right: 1vw;
        }

        #status-area {
            width: 100%;
            max-width: 580px;
            text-align: center;
            padding: 1.2vh 1vw;
            margin-bottom: 1.5vh;
            background: rgba(255, 245, 230, 0.7);
            border: 1px solid rgba(180, 150, 100, 0.2);
            border-radius: 16px;
            position: relative;
            z-index: 2;
            min-height: 7vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #status-text {
            font-size: clamp(1.1rem, 2.2vh, 1.8rem);
            color: #3a2e1e;
            letter-spacing: 0.06em;
            font-weight: 400;
            line-height: 1.6;
        }
        #status-text .highlight {
            color: #b8860b;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(184, 134, 11, 0.15);
        }
        #pinyin-display {
            font-size: clamp(1.8rem, 3.6vh, 3rem);
            color: #b8860b;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(184, 134, 11, 0.15);
            margin-top: 0.2vh;
            display: none;
        }
        #pinyin-display.show {
            display: block;
            animation: pinyinPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes pinyinPop {
            0% { opacity: 0; transform: scale(0.6) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(180, 150, 100, 0.15), inset 0 0 60px rgba(255, 250, 240, 0.5);
            border: 1px solid rgba(180, 150, 100, 0.25);
            background: #ffffff;
            z-index: 2;
            touch-action: none;
        }
        #canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: pointer;
        }
        #canvas-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(200, 180, 160, 0.1) 100%);
            border-radius: 20px;
            z-index: 1;
        }

        #controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8vh 1vw;
            width: 100%;
            max-width: 580px;
            margin-top: 1.8vh;
            padding: 0.6vh 0;
            position: relative;
            z-index: 2;
        }
        .btn {
            padding: 0.8vh 1.8vw;
            min-height: 5vh;
            min-width: 8vw;
            font-size: clamp(0.8rem, 1.6vh, 1.2rem);
            font-weight: 500;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.04em;
            touch-action: manipulation;
            background: rgba(255, 255, 255, 0.6);
            color: #3a2e1e;
            border: 1px solid rgba(180, 150, 100, 0.3);
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4vw;
            flex: 0 1 auto;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .btn:active { transform: scale(0.94); }
        .btn-primary {
            background: linear-gradient(135deg, #d4a017, #b8860b);
            color: #fff;
            border-color: #b8860b;
            box-shadow: 0 4px 20px rgba(184, 134, 11, 0.25);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            filter: grayscale(0.5);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-voice {
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.1), rgba(60, 100, 200, 0.05));
            border-color: rgba(60, 100, 200, 0.2);
            color: #3a6bb0;
        }
        .btn-voice.recording {
            animation: pulseMic 1.2s ease-in-out infinite;
            border-color: #c0392b;
            color: #c0392b;
            background: rgba(200, 70, 70, 0.1);
        }
        @keyframes pulseMic {
            0%, 100% { box-shadow: 0 0 10px rgba(192, 57, 43, 0.15); }
            50% { box-shadow: 0 0 30px rgba(192, 57, 43, 0.3), 0 0 60px rgba(192, 57, 43, 0.05); }
        }
        .btn-success {
            background: linear-gradient(135deg, #5cb85c, #449d44);
            color: #fff;
            border-color: #449d44;
            box-shadow: 0 4px 20px rgba(68, 157, 68, 0.25);
        }
        .btn-clear {
            background: rgba(200, 180, 160, 0.2);
            border-color: rgba(180, 150, 100, 0.15);
            color: #6b5a44;
        }
        .btn-clear:active { background: rgba(200, 180, 160, 0.35); }

        /* 右側 AR 相機 */
        #right-panel {
            flex: 0 0 50%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #placeholder-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(1rem, 2vh, 1.6rem);
            letter-spacing: 0.2em;
            text-align: center;
            padding: 2vh;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
        #placeholder-area .symbol {
            font-size: clamp(3rem, 8vh, 6rem);
            opacity: 0.3;
            margin-bottom: 1vh;
        }

        #reveal-area {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1vh 2vw 0 2vw;
            pointer-events: none;
            animation: revealAppear 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        #reveal-area.show {
            display: flex;
        }
        @keyframes revealAppear {
            0% { opacity: 0; transform: scale(0.6) rotate(-8deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        #modern-char {
            font-size: clamp(3rem, 10vh, 8rem);
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.5), 0 0 120px rgba(255, 215, 0, 0.2);
            letter-spacing: 0.1em;
            line-height: 1.2;
            flex: 0 0 12.5%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            animation: charGlow 3s ease-in-out infinite alternate;
        }
        @keyframes charGlow {
            0% { text-shadow: 0 0 60px rgba(184, 134, 11, 0.2), 0 0 120px rgba(184, 134, 11, 0.05); }
            100% { text-shadow: 0 0 80px rgba(184, 134, 11, 0.4), 0 0 180px rgba(184, 134, 11, 0.15); }
        }

        #animal-image {
            flex: 0 0 87.5%;
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply;
            background: transparent;
            filter: drop-shadow(0 0 30px rgba(184, 134, 11, 0.1));
            animation: floatAnimal 3.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes floatAnimal {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
            color: #b8860b;
            font-size: clamp(1rem, 2vh, 1.6rem);
            letter-spacing: 0.1em;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-overlay .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(184, 134, 11, 0.1);
            border-top: 3px solid #b8860b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2vh;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">🔮 召喚甲骨文靈力 ...</div>
    </div>

    <div id="app">
        <div id="left-panel">
            <!-- 缩略图列 -->
            <div id="thumbnail-column">
                <!-- 由JS动态生成 -->
                <button class="thumb-btn exit-btn" id="exitBtn" style="display:none;">✕ 退出</button>
            </div>
            <!-- 主内容 -->
            <div id="main-content">
                <div id="status-area">
                    <div id="status-text">👆 請選擇一個符咒</div>

                    <button class="btn btn-primary" id="btnVerify" disabled>⚡ 驗證符文</button>

                    <button class="btn btn-success" id="btnNext" style="display:none;">🔮 繼續</button>
                </div>
            </div>
        </div>

        <div id="right-panel">
            <video id="camera-video" autoplay playsinline muted></video>
            <div id="placeholder-area">
                <div class="symbol">✦</div>
                <div>等待符文之力</div>
                <div style="font-size:0.7em; opacity:0.5; margin-top:0.5vh;">描繪甲骨文 · 誦唸咒語</div>

            <div id="reveal-area">

                <img id="animal-image" src="" alt="妖怪">

    </div>

            // ========== 2. 字庫 ==========

            // ========== 3. 同音字映射（忽略聲調），并扩展多字词映射 ==========

                };
                const map = {};
                CHARACTERS.forEach(item => {
                    const pinyinNoTone = item.pinyinRaw.replace(/\d/g, '');
                    for (const [key, val] of Object.entries(baseMap)) {
                        if (val === pinyinNoTone) {
                            map[key] = pinyinNoTone;

                    }
                    map[item.char] = pinyinNoTone;

                // 添加多字词映射（允许这些词通过）
                map['你好'] = 'niao';

                map['與'] = 'yu'; // 繁体“與”已经存在，但确保覆盖

                return map;

            const pinyinMap = buildFullPinyinMap();

            // ========== 4. 狀態 ==========
            const state = {

            // ========== 5. DOM ==========
            const $ = id => document.getElementById(id);
            const canvas = $('oracleCanvas');
            const ctx = canvas.getContext('2d');
            const statusText = $('status-text');
            const pinyinDisplay = $('pinyin-display');
            const btnClear = $('btnClear');
            const btnVerify = $('btnVerify');

            const loadingOverlay = $('loading-overlay');

            const thumbColumn = $('thumbnail-column');
            const exitBtn = $('exitBtn');

            // ========== 6. Canvas ==========
            let canvasW, canvasH;
            let isDrawing = false;
            let drawHistory = [];

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvasW = rect.width;
                canvasH = rect.height;
                canvas.width = canvasW * dpr;
                canvas.height = canvasH * dpr;
                canvas.style.width = canvasW + 'px';
                canvas.style.height = canvasH + 'px';
                ctx.scale(dpr, dpr);
                ctx.lineWidth = Math.max(3, canvasW * 0.02);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#5a4a3a';
                ctx.shadowColor = 'rgba(100,80,60,0.1)';
                ctx.shadowBlur = 8;
                renderOracle();
            }

            function renderOracle() {
                ctx.clearRect(0, 0, canvasW, canvasH);
                const char = state.selectedCharId ? CHARACTERS.find(c => c.id === state.selectedCharId) : null;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.25;
                    ctx.drawImage(char.img, 0, 0, canvasW, canvasH);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#ddd';
                    ctx.font = '18px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(state.phase === 'select' ? '請選擇符咒' : '字形載入中...', canvasW / 2, canvasH / 2);
                }
                if (drawHistory.length > 0) {
                    ctx.save();
                    if (state.canvasLocked && state.phase === 'voice') {
                        ctx.strokeStyle = '#ffd700';
                        ctx.shadowColor = 'rgba(255,215,0,0.4)';
                        ctx.shadowBlur = 20;
                    } else {
                        ctx.strokeStyle = '#5a4a3a';
                        ctx.shadowColor = 'rgba(100,80,60,0.15)';
                        ctx.shadowBlur = 10;
                    }
                    ctx.lineWidth = Math.max(3, canvasW * 0.02);
                    ctx.globalAlpha = 0.85;
                    for (const path of drawHistory) {
                        if (path.length < 2) continue;
                        ctx.beginPath();
                        ctx.moveTo(path[0].x, path[0].y);
                        for (let i = 1; i < path.length; i++) {
                            ctx.lineTo(path[i].x, path[i].y);
                        }
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
            }

            function startDraw(e) {
                if (state.canvasLocked || state.phase === 'reveal' || state.phase === 'select') return;
                e.preventDefault();
                isDrawing = true;
                const pos = getPos(e);
                drawHistory.push([{ x: pos.x, y: pos.y }]);
            }

            function moveDraw(e) {
                if (!isDrawing || state.canvasLocked || state.phase === 'select') return;
                e.preventDefault();
                const pos = getPos(e);
                const currentPath = drawHistory[drawHistory.length - 1];
                if (currentPath) {
                    const last = currentPath[currentPath.length - 1];
                    if (last && Math.hypot(pos.x - last.x, pos.y - last.y) < 2) return;
                    currentPath.push({ x: pos.x, y: pos.y });
                }
                renderOracle();
            }

            function endDraw(e) {
                if (isDrawing) {
                    isDrawing = false;
                    const lastPath = drawHistory[drawHistory.length - 1];
                    if (lastPath && lastPath.length < 3) {
                        drawHistory.pop();
                        renderOracle();
                    }
                }
            }

            function bindCanvasEvents() {
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', moveDraw, { passive: false });
                canvas.addEventListener('touchend', endDraw, { passive: false });
                canvas.addEventListener('touchcancel', endDraw, { passive: false });
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', moveDraw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
            }

            // ========== 7. 像素比對 ==========
            function computeF1Score() {
                const dpr = window.devicePixelRatio || 1;
                const w = Math.floor(canvasW * dpr);
                const h = Math.floor(canvasH * dpr);

                const off1 = document.createElement('canvas');
                off1.width = w;
                off1.height = h;
                const ctx1 = off1.getContext('2d');
                const char = state.selectedCharId ? CHARACTERS.find(c => c.id === state.selectedCharId) : null;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx1.drawImage(char.img, 0, 0, w, h);
                }

                const off2 = document.createElement('canvas');
                off2.width = w;
                off2.height = h;
                const ctx2 = off2.getContext('2d');
                ctx2.strokeStyle = '#ffffff';
                ctx2.lineWidth = Math.max(3, canvasW * 0.02) * dpr;
                ctx2.lineCap = 'round';
                ctx2.lineJoin = 'round';
                for (const path of drawHistory) {
                    if (path.length < 2) continue;
                    ctx2.beginPath();
                    const scaleX = w / canvasW;
                    const scaleY = h / canvasH;
                    ctx2.moveTo(path[0].x * scaleX, path[0].y * scaleY);
                    for (let i = 1; i < path.length; i++) {
                        ctx2.lineTo(path[i].x * scaleX, path[i].y * scaleY);
                    }
                    ctx2.stroke();
                }

                const data1 = ctx1.getImageData(0, 0, w, h).data;
                const data2 = ctx2.getImageData(0, 0, w, h).data;

                const step = 2;
                let tp = 0,
                    fp = 0,
                    fn = 0;
                const threshold = 30;

                for (let i = 0; i < data1.length; i += 4 * step) {
                    const idx = i / 4;
                    const x = (idx % w);
                    const y = Math.floor(idx / w);
                    if (x % step !== 0 || y % step !== 0) continue;

                    const lum1 = 0.299 * data1[i] + 0.587 * data1[i + 1] + 0.114 * data1[i + 2];
                    const lum2 = 0.299 * data2[i] + 0.587 * data2[i + 1] + 0.114 * data2[i + 2];

                    const isFore1 = lum1 < threshold;
                    const isFore2 = lum2 > threshold;

                    if (isFore1 && isFore2) tp++;
                    else if (!isFore1 && isFore2) fp++;
                    else if (isFore1 && !isFore2) fn++;
                }

                if (tp === 0) return 0;
                const precision = tp / (tp + fp);
                const recall = tp / (tp + fn);
                const f1 = 2 * precision * recall / (precision + recall);
                return Math.round(f1 * 100);
            }

            // ========== 8. 音頻與相機 ==========
            const workletCode = `
          class PCMProcessor extends AudioWorkletProcessor {
            constructor() {
              super();
              this.buffer = [];
              this.chunkSize = 640;
              this.running = true;
              this.port.onmessage = (e) => {
                if (e.data.type === 'flush') {
                  this.flushBuffer();
                }
              };
            }
            flushBuffer() {
              if (this.buffer.length === 0) {
                this.port.postMessage({ type: 'flushed' });
                return;
              }
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              const merged = new Float32Array(totalLen);
              let offset = 0;
              for (const chunk of this.buffer) {
                merged.set(chunk, offset);
                offset += chunk.length;
              }
              this.buffer = [];
              const pcm = new Int16Array(merged.length);
              for (let i = 0; i < merged.length; i++) {
                let s = merged[i];
                s = Math.max(-1, Math.min(1, s));
                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
              }
              this.port.postMessage({ type: 'audio', buffer: pcm.buffer, isFlush: true }, [pcm.buffer]);
              this.port.postMessage({ type: 'flushed' });
            }
            process(inputs, outputs, parameters) {
              if (!this.running) return false;
              const input = inputs[0];
              if (!input || input.length === 0) return true;
              const channelData = input[0];
              if (!channelData) return true;
              this.buffer.push(new Float32Array(channelData));
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              if (totalLen >= this.chunkSize) {
                const merged = new Float32Array(totalLen);
                let offset = 0;
                for (const chunk of this.buffer) {
                  merged.set(chunk, offset);
                  offset += chunk.length;
                }
                this.buffer = [];
                const sendData = merged.slice(0, this.chunkSize);
                if (merged.length > this.chunkSize) {
                  const remaining = merged.slice(this.chunkSize);
                  this.buffer.push(remaining);
                }
                const pcm = new Int16Array(sendData.length);
                for (let i = 0; i < sendData.length; i++) {
                  let s = sendData[i];
                  s = Math.max(-1, Math.min(1, s));
                  pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                this.port.postMessage({ type: 'audio', buffer: pcm.buffer, isFlush: false }, [pcm.buffer]);
              }
              return true;
            }
          }
          registerProcessor('pcm-processor', PCMProcessor);
        `;
            let workletBlobURL = null;

            function initWorklet() {
                if (!workletBlobURL) {
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    workletBlobURL = URL.createObjectURL(blob);
                }
                return workletBlobURL;
            }

            let audioContext = null,
                audioWorkletNode = null,
                mediaStream = null,
                cameraStream = null;
            let isRecording = false;
            let recordTimer = null;
            let sourceNode = null;

            // ---------- 相機 ----------
            async function startCamera() {
                if (cameraStream) {
                    if (cameraVideo.srcObject !== cameraStream) {
                        cameraVideo.srcObject = cameraStream;
                    }
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false,
                    });
                    cameraStream = stream;
                    cameraVideo.srcObject = stream;
                    await cameraVideo.play();
                } catch (e) {
                    // 忽略错误
                }
            }

            // ---------- 音頻 ----------
            async function prepareAudio() {
                if (state.audioPrepared) return;
                if (state.preparingAudio) {
                    return new Promise((resolve) => {
                        const check = setInterval(() => {
                            if (state.audioPrepared) {
                                clearInterval(check);
                                resolve();
                            }
                        }, 50);
                    });
                }
                state.preparingAudio = true;

                try {
                    if (!audioContext || audioContext.state === 'closed') {
                        audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: AUDIO_CONFIG
                                .sampleRate });
                    }
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }

                    if (!mediaStream || mediaStream.getTracks().some(t => t.readyState === 'ended')) {
                        if (mediaStream) {
                            mediaStream.getTracks().forEach(t => t.stop());
                            mediaStream = null;
                        }
                        mediaStream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                sampleRate: AUDIO_CONFIG.sampleRate,
                            },
                            video: false,
                        });
                    }

                    if (!audioWorkletNode) {
                        await audioContext.audioWorklet.addModule(initWorklet());
                        sourceNode = audioContext.createMediaStreamSource(mediaStream);
                        audioWorkletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                        audioWorkletNode.port.onmessage = (e) => {
                            if (e.data.type === 'audio' && state.isRecording && state.wsReady) {
                                const buffer = e.data.buffer;
                                const bytes = new Uint8Array(buffer);
                                let binary = '';
                                for (let i = 0; i < bytes.length; i++) {
                                    binary += String.fromCharCode(bytes[i]);
                                }
                                const b64 = btoa(binary);
                                sendAudioChunk(b64, e.data.isFlush || false);
                            }
                            if (e.data.type === 'flushed') {
                                if (state.flushResolve) {
                                    state.flushResolve();
                                    state.flushResolve = null;
                                }
                            }
                        };
                        sourceNode.connect(audioWorkletNode);
                        audioWorkletNode.connect(audioContext.destination);
                    }

                    state.audioPrepared = true;
                } catch (e) {
                    setStatus('⚠️ 麥克風初始化失敗: ' + e.message, true);
                } finally {
                    state.preparingAudio = false;
                }
            }

            function resetAudioNode() {
                if (audioWorkletNode) {
                    try {
                        audioWorkletNode.disconnect();
                        audioWorkletNode = null;
                    } catch (e) {}
                }
                if (sourceNode) {
                    try {
                        sourceNode.disconnect();
                        sourceNode = null;
                    } catch (e) {}
                }
                state.audioPrepared = false;
                state.audioBuffer = [];
            }

            // ---------- 發送音頻 ----------
            function sendAudioChunk(b64Data, isFlush = false) {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = {
                    data: {
                        status: 1,
                        format: 'audio/L16;rate=16000',
                        encoding: 'raw',
                        audio: b64Data
                    }
                };
                state.audioBuffer.push(b64Data);
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                } catch (e) {
                    // ignore
                }
            }

            function sendAudioEnd() {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = { data: { status: 2 } };
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                } catch (e) {
                    // ignore
                }
            }

            // ---------- 錄音控制 ----------
            async function startRecording() {
                if (isRecording) return;
                if (state.phase !== 'voice') {
                    setStatus('⚠️ 請先通過符文驗證再唸咒', true);
                    return;
                }

                if (!state.audioPrepared) {
                    await prepareAudio();
                }
                if (!state.wsReady) {
                    if (state.wsConnectPromise) {
                        await state.wsConnectPromise;
                    } else {
                        await connectWebSocket();
                    }
                }

                if (!audioWorkletNode) {
                    await prepareAudio();
                }

                if (audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                isRecording = true;
                state.isRecording = true;
                state.recordStartTime = Date.now();
                state.resultReceived = false;
                state.resultHandled = false;
                btnVoice.textContent = '⏹️ 停止錄音';
                btnVoice.classList.add('recording');
                btnVoice.disabled = false;
                setStatus('🎤 請朗讀咒語（語音識別自動比對）', false);
                if (recordTimer) clearTimeout(recordTimer);
                recordTimer = setTimeout(() => {
                    if (isRecording) stopRecording(true);
                }, AUDIO_CONFIG.maxRecordSeconds * 1000);
            }

            function stopRecording(auto = false) {
                if (!isRecording) return;
                if (state.isFinalizing) return;

                const elapsed = Date.now() - state.recordStartTime;
                const remaining = MIN_RECORD_DURATION - elapsed;

                state.isFinalizing = true;
                btnVoice.disabled = true;
                btnVoice.textContent = '⏳ 處理中...';
                btnVoice.classList.remove('recording');
                setStatus('⏳ 語音識別中，請等候 ...', false);

                if (remaining > 0) {
                    if (state.minDurationTimer) clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = setTimeout(() => {
                        state.minDurationTimer = null;
                        finalizeStop();
                    }, remaining);
                } else {
                    finalizeStop();
                }
            }

            function finalizeStop() {
                if (state.isFlushing) return;
                state.isFlushing = true;

                if (sourceNode) {
                    try {
                        sourceNode.disconnect();
                        sourceNode = null;
                    } catch (e) {}
                }

                if (recordTimer) { clearTimeout(recordTimer);
                    recordTimer = null; }
                if (state.minDurationTimer) { clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = null; }

                if (audioWorkletNode) {
                    audioWorkletNode.port.postMessage({ type: 'flush' });
                    const flushPromise = new Promise((resolve) => {
                        state.flushResolve = resolve;
                        setTimeout(() => {
                            if (state.flushResolve) {
                                state.flushResolve();
                                state.flushResolve = null;
                            }
                        }, 300);
                    });
                    flushPromise.then(() => {
                        if (state.wsReady) {
                            sendAudioEnd();
                        }
                        state.audioBuffer = [];
                        isRecording = false;
                        state.isRecording = false;
                        state.isFinalizing = false;
                        state.isFlushing = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        btnVoice.classList.remove('recording');
                        btnVoice.disabled = (state.phase !== 'voice');
                    });
                } else {
                    if (state.wsReady) {
                        sendAudioEnd();
                    }
                    isRecording = false;
                    state.isRecording = false;
                    state.isFinalizing = false;
                    state.isFlushing = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    btnVoice.classList.remove('recording');
                    btnVoice.disabled = (state.phase !== 'voice');
                }
            }

            // ---------- WebSocket ----------
            function preConnectWebSocket() {
                if (state.wsReady) return Promise.resolve();
                if (state.wsConnectPromise) return state.wsConnectPromise;
                state.wsConnectPromise = connectWebSocket().catch(() => {
                    state.wsConnectPromise = null;
                });
                return state.wsConnectPromise;
            }

            async function connectWebSocket() {
                if (state.wsReady) return;
                if (state.wsConnection && state.wsConnection.readyState === WebSocket.CONNECTING) {
                    return new Promise((resolve) => {
                        const check = setInterval(() => {
                            if (state.wsReady) {
                                clearInterval(check);
                                resolve();
                            }
                        }, 100);
                    });
                }
                if (state.wsConnection) {
                    try { state.wsConnection.close(); } catch (e) {}
                    state.wsConnection = null;
                }
                try {
                    const url = buildWSSUrl();
                    state.wsConnection = new WebSocket(url);
                    state.wsConnection.binaryType = 'blob';
                    return new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error('WSS 連線超時'));
                        }, 10000);
                        state.wsConnection.onopen = () => {
                            clearTimeout(timeout);
                            state.wsReady = true;
                            sendInitFrame();
                            resolve();
                        };
                        state.wsConnection.onerror = () => {
                            clearTimeout(timeout);
                            reject(new Error('WebSocket error'));
                        };
                        state.wsConnection.onmessage = (e) => {
                            handleWSMessage(e.data);
                        };
                        state.wsConnection.onclose = () => {
                            state.wsReady = false;
                        };
                    });
                } catch (e) {
                    throw e;
                }
            }

            function buildWSSUrl() {
                const { APPID, API_KEY, API_SECRET, WSS_URL } = XF_CONFIG;
                const host = new URL(WSS_URL).host;
                const date = new Date().toUTCString();
                const signatureOrigin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
                const sha = CryptoJS.HmacSHA256(signatureOrigin, API_SECRET);
                const signature = CryptoJS.enc.Base64.stringify(sha);
                const authOrigin = `api_key="${API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const auth = btoa(authOrigin);
                return `${WSS_URL}?authorization=${auth}&date=${encodeURIComponent(date)}&host=${host}`;
            }

            function sendInitFrame() {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = {
                    common: { app_id: XF_CONFIG.APPID },
                    business: {
                        language: 'zh_cn',
                        domain: 'iat',
                        accent: 'mandarin',
                        rlang: 'zh-cn',
                        ptt: 1,
                    },
                    data: { status: 0 }
                };
                state.wsConnection.send(JSON.stringify(payload));
            }

            function handleWSMessage(data) {
                try {
                    let text;
                    if (data instanceof Blob) {
                        const reader = new FileReader();
                        reader.onload = () => {
                            const result = reader.result;
                            parseWSResult(result);
                        };
                        reader.readAsText(data);
                    } else {
                        parseWSResult(data);
                    }
                } catch (e) {
                    // ignore
                }
            }

            function parseWSResult(text) {
                try {
                    const json = JSON.parse(text);
                    if (json.code && json.code !== 0) {
                        setStatus('⚠️ 語音識別錯誤: ' + (json.message || '未知錯誤'), true);
                        return;
                    }
                    let recognized = '';
                    if (json.data && json.data.result && json.data.result.ws) {
                        const ws = json.data.result.ws;
                        for (let i = 0; i < ws.length; i++) {
                            const cw = ws[i].cw;
                            if (cw && cw.length > 0) {
                                recognized += cw[0].w;
                            }
                        }
                        recognized = recognized.replace(/[\s，。、！？；：,.!?;:]/g, '');
                        state.recognizedText = recognized;
                        if (json.data.status === 2 || json.data.result.ls === true) {
                            state.resultReceived = true;
                            handleRecognitionResult(recognized);
                        }
                    }
                } catch (e) {
                    // ignore
                }
            }

            // ========== 9. 識別結果處理（支援多字詞映射） ==========
            function handleRecognitionResult(recognized) {
                if (state.resultHandled) return;
                state.resultHandled = true;

                if (!recognized) {
                    setStatus('🗣️ 未檢測到語音，請再試一次', true);
                    state.phase = 'voice';
                    btnVoice.disabled = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    btnVoice.classList.remove('recording');
                    state.isFinalizing = false;
                    state.isFlushing = false;
                    closeWS();
                    resetAudioNode();
                    state.resultHandled = false;
                    return;
                }

                // 检查是否命中多字词映射（直接取映射后的拼音）
                let matchedPinyin = null;
                if (pinyinMap[recognized]) {
                    matchedPinyin = pinyinMap[recognized];
                } else {
                    // 如果不是多字词，但长度>1，则报错
                    if (recognized.length > 1) {
                        setStatus('❌ 請只朗讀一個目標字', true);
                        state.phase = 'voice';
                        btnVoice.disabled = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        btnVoice.classList.remove('recording');
                        state.isFinalizing = false;
                        state.isFlushing = false;
                        closeWS();
                        resetAudioNode();
                        state.resultHandled = false;
                        return;
                    }
                    // 单字则查映射
                    matchedPinyin = pinyinMap[recognized] || null;
                }

                const targetChar = state.selectedCharId ? CHARACTERS.find(c => c.id === state.selectedCharId).char : '';
                const targetPinyin = pinyinMap[targetChar] || '';
                const isMatch = matchedPinyin && matchedPinyin === targetPinyin;

                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnVoice.disabled = (state.phase !== 'voice');
                state.isFinalizing = false;
                state.isFlushing = false;

                if (isMatch) {
                    setStatus('🎉 咒語正確！妖怪現形！', false);
                    revealMonster();
                } else {
                    setStatus('😤 咒語比對失敗，請再試一次！', true);
                    state.phase = 'voice';
                    btnVoice.disabled = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    closeWS();
                    resetAudioNode();
                }
                state.resultHandled = false;
            }

            // ========== 10. 妖怪現形 ==========
            function revealMonster() {
                state.phase = 'reveal';
                const char = state.selectedCharId ? CHARACTERS.find(c => c.id === state.selectedCharId) : null;
                if (!char) return;
                modernChar.textContent = char.char;
                if (char.animalImg) {
                    animalImage.src = char.animalImg;
                    animalImage.style.display = 'block';
                }
                revealArea.classList.add('show');
                revealArea.style.display = 'flex';
                placeholderArea.style.display = 'none';
                setStatus(`✨ ${char.char} 已現形！ 繼續伏妖之旅？`, false);
                btnVoice.style.display = 'none';
                btnNext.style.display = 'inline-flex';
                btnVerify.disabled = true;
                btnClear.disabled = true;
                state.canvasLocked = true;
                closeWS();
                renderOracle();
                resetAudioNode();
                // 保持锁定状态，退出后重置
            }

            // ========== 11. 选择与退出逻辑 ==========
            function selectChar(charId) {
                if (state.isLocked) return;
                const char = CHARACTERS.find(c => c.id === charId);
                if (!char) return;
                state.selectedCharId = charId;
                state.phase = 'draw';
                state.canvasLocked = false;
                state.drawScore = 0;
                drawHistory = [];
                // 更新缩略图高亮
                document.querySelectorAll('.thumb-btn:not(.exit-btn)').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.id === charId);
                });
                // 启用按钮
                btnClear.disabled = false;
                btnVerify.disabled = false;
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnNext.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                // 更新状态
                setStatus(`✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span>`, false);
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                renderOracle();
                // 隐藏退出按钮（缩略图列仍显示）
                exitBtn.style.display = 'none';
                // 准备音频和WebSocket（预连接）
                prepareAudio();
                preConnectWebSocket();
                // 启动相机
                startCamera();
            }

            function exitSelection() {
                // 重置所有状态
                state.isLocked = false;
                state.selectedCharId = null;
                state.phase = 'select';
                state.canvasLocked = false;
                drawHistory = [];
                renderOracle();
                // 重置按钮
                btnClear.disabled = true;
                btnVerify.disabled = true;
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnNext.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                setStatus('👆 請選擇一個符咒', false);
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                // 取消所有高亮
                document.querySelectorAll('.thumb-btn:not(.exit-btn)').forEach(btn => {
                    btn.classList.remove('active');
                });
                exitBtn.style.display = 'none';
                // 关闭WebSocket和音频资源
                closeWS();
                resetAudioNode();
                // 释放音频上下文
                if (audioContext) {
                    try { audioContext.close(); } catch (e) {}
                    audioContext = null;
                    mediaStream = null;
                    audioWorkletNode = null;
                    sourceNode = null;
                    state.audioPrepared = false;
                }
                // 重置录制状态
                isRecording = false;
                state.isRecording = false;
                state.isFinalizing = false;
                state.isFlushing = false;
                if (recordTimer) { clearTimeout(recordTimer);
                    recordTimer = null; }
                if (state.minDurationTimer) { clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = null; }
            }

            function lockSelection() {
                state.isLocked = true;
                document.querySelectorAll('.thumb-btn:not(.exit-btn)').forEach(btn => {
                    btn.disabled = true;
                });
                exitBtn.style.display = 'block';
            }

            function unlockSelection() {
                state.isLocked = false;
                document.querySelectorAll('.thumb-btn:not(.exit-btn)').forEach(btn => {
                    btn.disabled = false;
                });
                exitBtn.style.display = 'none';
            }

            // ========== 12. 流程控制 ==========
            function initLevel() {
                // 初始状态为选择
                state.phase = 'select';
                state.selectedCharId = null;
                setStatus('👆 請選擇一個符咒', false);
                btnClear.disabled = true;
                btnVerify.disabled = true;
                btnVoice.disabled = true;
                btnNext.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                renderOracle();
                // 生成缩略图
                renderThumbnails();
                exitBtn.style.display = 'none';
                unlockSelection();
            }

            function renderThumbnails() {
                // 清空除退出按钮外的所有按钮
                const exit = document.getElementById('exitBtn');
                thumbColumn.innerHTML = '';
                CHARACTERS.forEach(char => {
                    const btn = document.createElement('button');
                    btn.className = 'thumb-btn';
                    btn.dataset.id = char.id;
                    const img = document.createElement('img');
                    img.src = char.imgSrc;
                    img.alt = char.char;
                    btn.appendChild(img);
                    btn.addEventListener('click', () => {
                        if (state.isLocked) return;
                        selectChar(char.id);
                        // 选中后显示退出按钮
                        if (!state.isLocked) {
                            exitBtn.style.display = 'block';
                        }
                    });
                    thumbColumn.appendChild(btn);
                });
                // 重新添加退出按钮
                const exitBtnNew = document.createElement('button');
                exitBtnNew.className = 'thumb-btn exit-btn';
                exitBtnNew.id = 'exitBtn';
                exitBtnNew.textContent = '✕ 退出';
                exitBtnNew.style.display = 'none';
                exitBtnNew.addEventListener('click', () => {
                    exitSelection();
                });
                thumbColumn.appendChild(exitBtnNew);
                // 更新引用
                window.exitBtn = exitBtnNew;
            }

            // ========== 13. 验证、清除、语音切换等 ==========
            function handleVerify() {
                if (state.isVerifying || state.phase === 'reveal') return;
                if (state.canvasLocked) { setStatus('⚠️ 符文已驗證通過，請進行唸咒', true); return; }
                if (state.phase === 'select') { setStatus('⚠️ 請先選擇一個符咒', true); return; }
                if (drawHistory.length === 0 || drawHistory.every(p => p.length < 3)) {
                    setStatus('⚠️ 請先在畫布上描寫甲骨文', true);
                    return;
                }
                state.isVerifying = true;
                btnVerify.disabled = true;
                setStatus('🔍 比對符文靈力 ...', false);
                setTimeout(() => {
                    const score = computeF1Score();
                    state.drawScore = score;
                    state.isVerifying = false;
                    btnVerify.disabled = false;
                    if (score >= THRESHOLDS.drawPass) {
                        state.canvasLocked = true;
                        state.phase = 'voice';
                        setStatus(`✅ 符文契合度合格！咒語已解鎖`, false);
                        const char = CHARACTERS.find(c => c.id === state.selectedCharId);
                        if (char) {
                            pinyinDisplay.textContent = char.pinyinTone;
                            pinyinDisplay.style.display = 'block';
                            setTimeout(() => pinyinDisplay.classList.add('show'), 50);
                        }
                        btnVoice.disabled = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        setStatus(`🗣️ 請唸出咒語（語音識別自動比對）`, false);
                        renderOracle();
                        // 锁定缩略图
                        lockSelection();
                    } else {
                        setStatus(`❌ 符文契合度不足，再努力描寫！`, true);
                    }
                }, 500);
            }

            function handleClear() {
                if (state.canvasLocked || state.phase === 'reveal' || state.phase === 'select') return;
                drawHistory = [];
                renderOracle();
                setStatus('✍️ 已清除，重新描寫', false);
            }

            function handleNext() {
                // 继续下一关：直接退出选择状态
                exitSelection();
                // 释放资源后，重新显示缩略图
                renderThumbnails();
                initLevel();
            }

            function handleVoiceToggle() {
                if (state.phase !== 'voice') { setStatus('⚠️ 請先通過符文驗證', true); return; }
                if (isRecording) stopRecording(false);
                else startRecording();
            }

            function setStatus(html, isError = false) {
                statusText.innerHTML = html;
                statusText.style.color = isError ? '#a94442' : '#3a2e1e';
            }

            function closeWS() {
                if (state.wsConnection) {
                    try { state.wsConnection.close(); } catch (e) {}
                    state.wsConnection = null;
                }
                state.wsReady = false;
                state.wsConnectPromise = null;
            }

            // ========== 14. 圖片加載 ==========
            function loadImages() {
                const promises = CHARACTERS.map(char => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            char.img = img;
                            resolve();
                        };
                        img.onerror = () => {
                            // 使用占位图
                            const fallbackCanvas = document.createElement('canvas');
                            fallbackCanvas.width = 200;
                            fallbackCanvas.height = 200;
                            const fctx = fallbackCanvas.getContext('2d');
                            fctx.fillStyle = '#ffffff';
                            fctx.fillRect(0, 0, 200, 200);
                            fctx.strokeStyle = '#000000';
                            fctx.lineWidth = 4;
                            fctx.font = '60px sans-serif';
                            fctx.textAlign = 'center';
                            fctx.textBaseline = 'middle';
                            fctx.fillStyle = '#000';
                            fctx.fillText(char.char, 100, 100);
                            const imgData = fallbackCanvas.toDataURL();
                            const fallbackImg = new Image();
                            fallbackImg.onload = () => {
                                char.img = fallbackImg;
                                resolve();
                            };
                            fallbackImg.src = imgData;
                        };
                        img.src = char.imgSrc;
                    });
                });
                return Promise.all(promises);
            }

            // ========== 15. 初始化 ==========
            async function init() {
                loadingText.textContent = '📜 載入甲骨文字形圖片 ...';
                await loadImages();
                loadingText.textContent = '🔮 靈力凝聚中 ...';

                resizeCanvas();
                bindCanvasEvents();
                btnClear.addEventListener('click', handleClear);
                btnVerify.addEventListener('click', handleVerify);
                btnVoice.addEventListener('click', handleVoiceToggle);
                btnNext.addEventListener('click', handleNext);

                // 初始化选择界面
                initLevel();

                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(resizeCanvas, 200);
                });

                setTimeout(() => loadingOverlay.classList.add('hidden'), 600);
                document.addEventListener('touchstart', () => {
                    if (audioContext && audioContext.state === 'suspended') audioContext.resume().catch(() => {});
                }, { passive: true });
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
</html>
