    <script>
        (function() {
            'use strict';

            // ========== 1. 配置 ==========
            const XF_CONFIG = {

            };
            const AUDIO_CONFIG = { sampleRate: 16000, bitDepth: 16, channels: 1, frameDuration: 40, maxRecordSeconds: 8 };
            const THRESHOLDS = { drawPass: 45 };
            const MIN_RECORD_DURATION = 1000;

            // ========== 2. 字庫 ==========
            const CHARACTERS = [
                { id: 'yang', char: '羊', pinyinRaw: 'yang2', pinyinTone: 'yáng', imgSrc: 'images/羊_1.png', animalImg: 'images/羊.png', img: null },
                { id: 'ma', char: '馬', pinyinRaw: 'ma3', pinyinTone: 'mǎ', imgSrc: 'images/馬_1.png', animalImg: 'images/馬.png', img: null },
                { id: 'niu', char: '牛', pinyinRaw: 'niu2', pinyinTone: 'niú', imgSrc: 'images/牛_1.png', animalImg: 'images/牛.png', img: null },
                { id: 'niao', char: '鳥', pinyinRaw: 'niao3', pinyinTone: 'niǎo', imgSrc: 'images/鳥_1.png', animalImg: 'images/鳥.png', img: null },
                { id: 'yu', char: '魚', pinyinRaw: 'yu2', pinyinTone: 'yú', imgSrc: 'images/魚_1.png', animalImg: 'images/魚.png', img: null }
            ];

            // ========== 3. 同音字映射 ==========
            function buildFullPinyinMap() {
                const baseMap = {
                    '羊':'yang','阳':'yang','杨':'yang','扬':'yang','洋':'yang','佯':'yang','疡':'yang','徉':'yang','炀':'yang','烊':'yang','旸':'yang','飏':'yang','蛘':'yang','阚':'yang','陽':'yang','楊':'yang','揚':'yang','暘':'yang',
                    '馬':'ma','马':'ma','码':'ma','玛':'ma','蚂':'ma','杩':'ma','砝':'ma','犸':'ma','唛':'ma','遤':'ma','碼':'ma','瑪':'ma','螞':'ma',
                    '牛':'niu','妞':'niu','扭':'niu','纽':'niu','钮':'niu','拗':'niu','忸':'niu','沤':'niu','紐':'niu','鈕':'niu','理由':'niu','理':'niu','由':'niu',
                    '鳥':'niao','鸟':'niao','袅':'niao','嬲':'niao','茑':'niao','裊':'niao','你好':'niao','你':'niao','好':'niao',
                    '魚':'yu','鱼':'yu','渔':'yu','余':'yu','于':'yu','娱':'yu','愚':'yu','隅':'yu','俞':'yu','逾':'yu','渝':'yu','瑜':'yu','萸':'yu','榆':'yu','虞':'yu','舆':'yu','玙':'yu','餘':'yu','於':'yu','娛':'yu','愚':'yu','隅':'yu','俞':'yu','逾':'yu','渝':'yu','瑜':'yu','榆':'yu','虞':'yu','輿':'yu','与':'yu','屿':'yu','宇':'yu','羽':'yu','雨':'yu','语':'yu','玉':'yu','育':'yu','郁':'yu','浴':'yu','欲':'yu','裕':'yu','喻':'yu','愈':'yu','豫':'yu','预':'yu','遇':'yu','御':'yu','寓':'yu','誉':'yu','域':'yu','越':'yu','阅':'yu','跃':'yu','粤':'yu','月':'yu','乐':'yu','岳':'yu','钥':'yu','與':'yu'
                };
                const map = {};
                CHARACTERS.forEach(item => {
                    const pinyinNoTone = item.pinyinRaw.replace(/\d/g, '');
                    for (const [key, val] of Object.entries(baseMap)) {
                        if (val === pinyinNoTone) map[key] = pinyinNoTone;
                    }
                    map[item.char] = pinyinNoTone;
                });
                return map;
            }
            const pinyinMap = buildFullPinyinMap();

            // ========== 4. 狀態 ==========
            const state = {
                currentChar: null,
                phase: 'select',
                canvasLocked: false,
                isRecording: false,
                isVerifying: false,
                drawScore: 0,
                audioContext: null,
                audioWorkletNode: null,
                mediaStream: null,
                cameraStream: null,
                audioBuffer: [],
                recordTimer: null,
                wsConnection: null,
                wsReady: false,
                wsConnectPromise: null,
                usedCharIds: [],
                recordStartTime: 0,
                minDurationTimer: null,
                isFinalizing: false,
                flushResolve: null,
                isFlushing: false,
                recognizedText: '',
                audioPrepared: false,
                preparingAudio: false,
                resultReceived: false,
                resultHandled: false,
                isLocked: false,
                selectedCharId: null,
                penColorGold: false,
                animFrameId: null,
                glowPhase: 0,
            };

            // ========== 5. DOM ==========
            const $ = id => document.getElementById(id);
            const canvas = $('oracleCanvas');
            const ctx = canvas.getContext('2d');
            const statusText = $('status-text');
            const pinyinDisplay = $('pinyin-display');
            const btnClear = $('btnClear');
            const btnVerify = $('btnVerify');
            const btnVoice = $('btnVoice');
            const btnExit = $('btnExit');
            const revealArea = $('reveal-area');
            const placeholderArea = $('placeholder-area');
            const modernChar = $('modern-char');
            const animalImage = $('animal-image');
            const cameraVideo = $('camera-video');
            const loadingOverlay = $('loading-overlay');
            const loadingText = $('loading-text');
            const thumbnailBar = $('thumbnail-bar');
            const shockwaveContainer = $('shockwave-container');

            // ========== 6. Canvas ==========
            let canvasW, canvasH;
            let isDrawing = false;
            let drawHistory = [];

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvasW = rect.width;
                canvasH = rect.height;
                canvas.width = canvasW * dpr;
                canvas.height = canvasH * dpr;
                canvas.style.width = canvasW + 'px';
                canvas.style.height = canvasH + 'px';
                ctx.scale(dpr, dpr);
                ctx.lineWidth = Math.max(3, canvasW * 0.02);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#c0392b';
                ctx.shadowColor = 'rgba(192, 57, 43, 0.15)';
                ctx.shadowBlur = 8;
                renderOracle();
            }

            function renderOracle() {
                // 彻底清除画布
                ctx.clearRect(0, 0, canvasW, canvasH);
                
                // 如果当前没有有效字符，直接返回（画布空白）
                if (!state.currentChar) {
                    return;
                }

                const char = state.currentChar;
                // 绘制底图（参考甲骨文）
                if (char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.22;
                    ctx.drawImage(char.img, 0, 0, canvasW, canvasH);
                    ctx.restore();
                }

                // 绘制用户笔迹
                if (drawHistory.length > 0) {
                    ctx.save();
                    const useGold = state.penColorGold || (state.canvasLocked && state.phase === 'voice');
                    if (useGold) {
                        const pulse = 0.8 + 0.2 * Math.sin(state.glowPhase);
                        ctx.strokeStyle = `rgba(255, 215, 0, ${pulse})`;
                        ctx.shadowColor = `rgba(255, 215, 0, ${0.3 * pulse})`;
                        ctx.shadowBlur = 25 + 10 * Math.sin(state.glowPhase);
                    } else {
                        ctx.strokeStyle = '#c0392b';
                        ctx.shadowColor = 'rgba(192, 57, 43, 0.15)';
                        ctx.shadowBlur = 10;
                    }
                    ctx.lineWidth = Math.max(3, canvasW * 0.02);
                    ctx.globalAlpha = 0.85;
                    for (const path of drawHistory) {
                        if (path.length < 2) continue;
                        ctx.beginPath();
                        ctx.moveTo(path[0].x, path[0].y);
                        for (let i = 1; i < path.length; i++) {
                            ctx.lineTo(path[i].x, path[i].y);
                        }
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            function startGlowAnimation() {
                if (state.animFrameId) return;
                function animate() {
                    state.glowPhase += 0.05;
                    if (state.penColorGold || (state.canvasLocked && state.phase === 'voice')) {
                        renderOracle();
                    }
                    state.animFrameId = requestAnimationFrame(animate);
                }
                animate();
            }

            function stopGlowAnimation() {
                if (state.animFrameId) {
                    cancelAnimationFrame(state.animFrameId);
                    state.animFrameId = null;
                }
            }

            // 获取位置
            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
            }

            function startDraw(e) {
                if (state.canvasLocked || state.phase === 'reveal' || state.phase === 'select') return;
                e.preventDefault();
                isDrawing = true;
                const pos = getPos(e);
                drawHistory.push([{ x: pos.x, y: pos.y }]);
            }

            function moveDraw(e) {
                if (!isDrawing || state.canvasLocked) return;
                e.preventDefault();
                const pos = getPos(e);
                const currentPath = drawHistory[drawHistory.length - 1];
                if (currentPath) {
                    const last = currentPath[currentPath.length - 1];
                    if (last && Math.hypot(pos.x - last.x, pos.y - last.y) < 2) return;
                    currentPath.push({ x: pos.x, y: pos.y });
                }
                renderOracle();
            }

            function endDraw(e) {
                if (isDrawing) {
                    isDrawing = false;
                    const lastPath = drawHistory[drawHistory.length - 1];
                    if (lastPath && lastPath.length < 3) {
                        drawHistory.pop();
                        renderOracle();
                    }
                }
            }

            function bindCanvasEvents() {
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', moveDraw, { passive: false });
                canvas.addEventListener('touchend', endDraw, { passive: false });
                canvas.addEventListener('touchcancel', endDraw, { passive: false });
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', moveDraw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
            }

            // ========== 7. 像素比對 ==========
            function computeF1Score() {
                const dpr = window.devicePixelRatio || 1;
                const w = Math.floor(canvasW * dpr);
                const h = Math.floor(canvasH * dpr);

                const off1 = document.createElement('canvas');
                off1.width = w;
                off1.height = h;
                const ctx1 = off1.getContext('2d');
                const char = state.currentChar;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx1.drawImage(char.img, 0, 0, w, h);
                }

                const off2 = document.createElement('canvas');
                off2.width = w;
                off2.height = h;
                const ctx2 = off2.getContext('2d');
                ctx2.strokeStyle = '#ffffff';
                ctx2.lineWidth = Math.max(3, canvasW * 0.02) * dpr;
                ctx2.lineCap = 'round';
                ctx2.lineJoin = 'round';
                for (const path of drawHistory) {
                    if (path.length < 2) continue;
                    ctx2.beginPath();
                    const scaleX = w / canvasW;
                    const scaleY = h / canvasH;
                    ctx2.moveTo(path[0].x * scaleX, path[0].y * scaleY);
                    for (let i = 1; i < path.length; i++) {
                        ctx2.lineTo(path[i].x * scaleX, path[i].y * scaleY);
                    }
                    ctx2.stroke();
                }

                const data1 = ctx1.getImageData(0, 0, w, h).data;
                const data2 = ctx2.getImageData(0, 0, w, h).data;

                const step = 2;
                let tp = 0, fp = 0, fn = 0;
                const threshold = 30;

                for (let i = 0; i < data1.length; i += 4 * step) {
                    const idx = i / 4;
                    const x = (idx % w);
                    const y = Math.floor(idx / w);
                    if (x % step !== 0 || y % step !== 0) continue;

                    const lum1 = 0.299 * data1[i] + 0.587 * data1[i+1] + 0.114 * data1[i+2];
                    const lum2 = 0.299 * data2[i] + 0.587 * data2[i+1] + 0.114 * data2[i+2];

                    const isFore1 = lum1 < threshold;
                    const isFore2 = lum2 > threshold;

                    if (isFore1 && isFore2) tp++;
                    else if (!isFore1 && isFore2) fp++;
                    else if (isFore1 && !isFore2) fn++;
                }

                if (tp === 0) return 0;
                const precision = tp / (tp + fp);
                const recall = tp / (tp + fn);
                const f1 = 2 * precision * recall / (precision + recall);
                return Math.round(f1 * 100);
            }

            // ========== 8. 音頻與相機 ==========
            const workletCode = `
          class PCMProcessor extends AudioWorkletProcessor {
            constructor() {
              super();
              this.buffer = [];
              this.chunkSize = 640;
              this.running = true;
              this.port.onmessage = (e) => {
                if (e.data.type === 'flush') {
                  this.flushBuffer();
                }
              };
            }
            flushBuffer() {
              if (this.buffer.length === 0) {
                this.port.postMessage({ type: 'flushed' });
                return;
              }
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              const merged = new Float32Array(totalLen);
              let offset = 0;
              for (const chunk of this.buffer) {
                merged.set(chunk, offset);
                offset += chunk.length;
              }
              this.buffer = [];
              const pcm = new Int16Array(merged.length);
              for (let i = 0; i < merged.length; i++) {
                let s = merged[i];
                s = Math.max(-1, Math.min(1, s));
                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
              }
              this.port.postMessage({ type: 'audio', buffer: pcm.buffer, isFlush: true }, [pcm.buffer]);
              this.port.postMessage({ type: 'flushed' });
            }
            process(inputs, outputs, parameters) {
              if (!this.running) return false;
              const input = inputs[0];
              if (!input || input.length === 0) return true;
              const channelData = input[0];
              if (!channelData) return true;
              this.buffer.push(new Float32Array(channelData));
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              if (totalLen >= this.chunkSize) {
                const merged = new Float32Array(totalLen);
                let offset = 0;
                for (const chunk of this.buffer) {
                  merged.set(chunk, offset);
                  offset += chunk.length;
                }
                this.buffer = [];
                const sendData = merged.slice(0, this.chunkSize);
                if (merged.length > this.chunkSize) {
                  const remaining = merged.slice(this.chunkSize);
                  this.buffer.push(remaining);
                }
                const pcm = new Int16Array(sendData.length);
                for (let i = 0; i < sendData.length; i++) {
                  let s = sendData[i];
                  s = Math.max(-1, Math.min(1, s));
                  pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                this.port.postMessage({ type: 'audio', buffer: pcm.buffer, isFlush: false }, [pcm.buffer]);
              }
              return true;
            }
          }
          registerProcessor('pcm-processor', PCMProcessor);
        `;
            let workletBlobURL = null;

            function initWorklet() {
                if (!workletBlobURL) {
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    workletBlobURL = URL.createObjectURL(blob);
                }
                return workletBlobURL;
            }

            let audioContext = null, audioWorkletNode = null, mediaStream = null, cameraStream = null;
            let isRecording = false;
            let recordTimer = null;
            let sourceNode = null;

            async function startCamera() {
                if (cameraStream) {
                    if (cameraVideo.srcObject !== cameraStream) cameraVideo.srcObject = cameraStream;
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false,
                    });
                    cameraStream = stream;
                    cameraVideo.srcObject = stream;
                    await cameraVideo.play();
                    console.log('[AR] 相機已啟動');
                } catch (e) {
                    console.warn('[AR] 相機啟動失敗');
                }
            }

            async function prepareAudio() {
                if (state.audioPrepared) return;
                if (state.preparingAudio) {
                    return new Promise((resolve) => {
                        const check = setInterval(() => {
                            if (state.audioPrepared) { clearInterval(check); resolve(); }
                        }, 50);
                    });
                }
                state.preparingAudio = true;
                console.log('[準備] 初始化音頻...');
                try {
                    if (!audioContext || audioContext.state === 'closed') {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: AUDIO_CONFIG.sampleRate });
                    }
                    if (audioContext.state === 'suspended') await audioContext.resume();

                    if (!mediaStream || mediaStream.getTracks().some(t => t.readyState === 'ended')) {
                        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
                        mediaStream = await navigator.mediaDevices.getUserMedia({
                            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: AUDIO_CONFIG.sampleRate },
                            video: false,
                        });
                        console.log('[準備] 麥克風權限已獲得');
                    }

                    if (!audioWorkletNode) {
                        await audioContext.audioWorklet.addModule(initWorklet());
                        sourceNode = audioContext.createMediaStreamSource(mediaStream);
                        audioWorkletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                        audioWorkletNode.port.onmessage = (e) => {
                            if (e.data.type === 'audio' && state.isRecording && state.wsReady) {
                                const buffer = e.data.buffer;
                                const bytes = new Uint8Array(buffer);
                                let binary = '';
                                for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                                const b64 = btoa(binary);
                                sendAudioChunk(b64, e.data.isFlush || false);
                            }
                            if (e.data.type === 'flushed') {
                                if (state.flushResolve) { state.flushResolve(); state.flushResolve = null; }
                            }
                        };
                        sourceNode.connect(audioWorkletNode);
                        audioWorkletNode.connect(audioContext.destination);
                        console.log('[準備] AudioWorkletNode 創建成功');
                    }

                    state.audioPrepared = true;
                    console.log('[準備] 音頻初始化完成');
                } catch (e) {
                    console.error('[準備] 音頻初始化失敗:', e);
                } finally {
                    state.preparingAudio = false;
                }
            }

            function resetAudioNode() {
                if (audioWorkletNode) { try { audioWorkletNode.disconnect(); audioWorkletNode = null; } catch(e) {} }
                if (sourceNode) { try { sourceNode.disconnect(); sourceNode = null; } catch(e) {} }
                state.audioPrepared = false;
                state.audioBuffer = [];
                console.log('[重置] 音頻節點已斷開');
            }

            function sendAudioChunk(b64Data, isFlush = false) {
                if (!state.wsReady || !state.wsConnection || state.wsConnection.readyState !== WebSocket.OPEN) return;
                const payload = { data: { status: 1, format: 'audio/L16;rate=16000', encoding: 'raw', audio: b64Data } };
                state.audioBuffer.push(b64Data);
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                    console.log(`[WS] 發送音頻幀, 大小=${b64Data.length}${isFlush ? ' (flush)' : ''}`);
                } catch(e) { console.error('發送音訊幀失敗:', e); }
            }

            function sendAudioEnd() {
                if (!state.wsReady || !state.wsConnection || state.wsConnection.readyState !== WebSocket.OPEN) {
                    console.warn('WS未就緒或未開啟，無法發送尾幀');
                    return;
                }
                const payload = { data: { status: 2 } };
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                    console.log('[WS] 發送尾幀 status=2');
                } catch(e) { console.error('發送尾幀失敗:', e); }
            }

            async function startRecording() {
                if (isRecording) return;
                if (state.phase !== 'voice') { setStatus('⚠️ 請先通過符文驗證再唸咒', true); return; }

                if (!state.audioPrepared) await prepareAudio();
                if (!state.wsReady) {
                    console.log('[WS] 等待 WebSocket 就緒...');
                    if (state.wsConnectPromise) await state.wsConnectPromise;
                    else await connectWebSocket();
                    console.log('[WS] 就緒');
                }

                if (!audioWorkletNode) await prepareAudio();
                if (audioContext && audioContext.state === 'suspended') await audioContext.resume();

                isRecording = true;
                state.isRecording = true;
                state.recordStartTime = Date.now();
                state.resultReceived = false;
                state.resultHandled = false;
                btnVoice.textContent = '⏹️ 停止錄音';
                btnVoice.classList.add('recording');
                btnVoice.disabled = false;
                setStatus('🎤 請朗讀咒語', false);
                if (recordTimer) clearTimeout(recordTimer);
                recordTimer = setTimeout(() => { if (isRecording) stopRecording(true); }, AUDIO_CONFIG.maxRecordSeconds * 1000);
            }

            function stopRecording(auto = false) {
                if (!isRecording || state.isFinalizing) return;

                const elapsed = Date.now() - state.recordStartTime;
                const remaining = MIN_RECORD_DURATION - elapsed;

                state.isFinalizing = true;
                btnVoice.disabled = true;
                btnVoice.textContent = '⏳ 處理中...';
                btnVoice.classList.remove('recording');
                setStatus('⏳ 聆聽咒語中 ...', false);

                if (remaining > 0) {
                    if (state.minDurationTimer) clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = setTimeout(() => {
                        state.minDurationTimer = null;
                        finalizeStop();
                    }, remaining);
                } else {
                    finalizeStop();
                }
            }

            function finalizeStop() {
                if (state.isFlushing) return;
                state.isFlushing = true;

                if (sourceNode) { try { sourceNode.disconnect(); sourceNode = null; } catch(e) {} }
                if (recordTimer) { clearTimeout(recordTimer); recordTimer = null; }
                if (state.minDurationTimer) { clearTimeout(state.minDurationTimer); state.minDurationTimer = null; }

                if (audioWorkletNode) {
                    console.log('[Worklet] 發送 flush 指令');
                    audioWorkletNode.port.postMessage({ type: 'flush' });
                    const flushPromise = new Promise((resolve) => {
                        state.flushResolve = resolve;
                        setTimeout(() => {
                            if (state.flushResolve) {
                                console.warn('[Worklet] flush 超時，強制繼續');
                                state.flushResolve();
                                state.flushResolve = null;
                            }
                        }, 300);
                    });
                    flushPromise.then(() => {
                        if (state.wsReady && state.wsConnection && state.wsConnection.readyState === WebSocket.OPEN) {
                            sendAudioEnd();
                        } else {
                            console.warn('WS未就緒或未開啟，跳過尾幀');
                        }
                        state.audioBuffer = [];
                        isRecording = false;
                        state.isRecording = false;
                        state.isFinalizing = false;
                        state.isFlushing = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        btnVoice.classList.remove('recording');
                        btnVoice.disabled = (state.phase !== 'voice');
                        console.log('[錄音] 處理完成');
                    });
                } else {
                    if (state.wsReady && state.wsConnection && state.wsConnection.readyState === WebSocket.OPEN) sendAudioEnd();
                    isRecording = false;
                    state.isRecording = false;
                    state.isFinalizing = false;
                    state.isFlushing = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    btnVoice.classList.remove('recording');
                    btnVoice.disabled = (state.phase !== 'voice');
                }
            }

            // ---------- WebSocket ----------
            function preConnectWebSocket() {
                if (state.wsReady) return Promise.resolve();
                if (state.wsConnectPromise) return state.wsConnectPromise;
                state.wsConnectPromise = connectWebSocket().catch(() => { state.wsConnectPromise = null; });
                return state.wsConnectPromise;
            }

            async function connectWebSocket() {
                if (state.wsReady) return;
                if (state.wsConnection && state.wsConnection.readyState === WebSocket.CONNECTING) {
                    return new Promise((resolve) => {
                        const check = setInterval(() => {
                            if (state.wsReady) { clearInterval(check); resolve(); }
                        }, 100);
                    });
                }
                if (state.wsConnection) { try { state.wsConnection.close(); } catch(e) {} state.wsConnection = null; }
                try {
                    const url = buildWSSUrl();
                    state.wsConnection = new WebSocket(url);
                    state.wsConnection.binaryType = 'blob';
                    return new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => reject(new Error('WSS 連線超時')), 10000);
                        state.wsConnection.onopen = () => {
                            clearTimeout(timeout);
                            state.wsReady = true;
                            console.log('[WS] 連線成功');
                            sendInitFrame();
                            resolve();
                        };
                        state.wsConnection.onerror = () => {
                            clearTimeout(timeout);
                            console.error('[WS] 錯誤');
                            reject(new Error('WS error'));
                        };
                        state.wsConnection.onmessage = (e) => {
                            console.log('[WS] 收到訊息');
                            handleWSMessage(e.data);
                        };
                        state.wsConnection.onclose = () => {
                            state.wsReady = false;
                            state.wsConnection = null;
                            console.log('[WS] 連線關閉');
                        };
                    });
                } catch(e) { console.error('[WS] 連線失敗:', e); throw e; }
            }

            function buildWSSUrl() {
                const { APPID, API_KEY, API_SECRET, WSS_URL } = XF_CONFIG;
                const host = new URL(WSS_URL).host;
                const date = new Date().toUTCString();
                const signatureOrigin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
                const sha = CryptoJS.HmacSHA256(signatureOrigin, API_SECRET);
                const signature = CryptoJS.enc.Base64.stringify(sha);
                const authOrigin = `api_key="${API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const auth = btoa(authOrigin);
                return `${WSS_URL}?authorization=${auth}&date=${encodeURIComponent(date)}&host=${host}`;
            }

            function sendInitFrame() {
                if (!state.wsReady || !state.wsConnection || state.wsConnection.readyState !== WebSocket.OPEN) return;
                const payload = {
                    common: { app_id: XF_CONFIG.APPID },
                    business: {
                        language: 'zh_cn',
                        domain: 'iat',
                        accent: 'mandarin',
                        rlang: 'zh-cn',
                        ptt: 1,
                    },
                    data: { status: 0 }
                };
                state.wsConnection.send(JSON.stringify(payload));
            }

            function handleWSMessage(data) {
                try {
                    let text;
                    if (data instanceof Blob) {
                        const reader = new FileReader();
                        reader.onload = () => { parseWSResult(reader.result); };
                        reader.readAsText(data);
                    } else {
                        parseWSResult(data);
                    }
                } catch(e) { console.error('[WS] 處理訊息異常:', e); }
            }

            function parseWSResult(text) {
                try {
                    const json = JSON.parse(text);
                    if (json.code && json.code !== 0) {
                        console.warn('[WS] 訊飛 API 錯誤:', json.message);
                        return;
                    }
                    let recognized = '';
                    if (json.data && json.data.result && json.data.result.ws) {
                        const ws = json.data.result.ws;
                        for (let i = 0; i < ws.length; i++) {
                            const cw = ws[i].cw;
                            if (cw && cw.length > 0) recognized += cw[0].w;
                        }
                        recognized = recognized.replace(/[\s，。、！？；：,.!?;:]/g, '');
                        state.recognizedText = recognized;
                        console.log('[識別] 原始結果:', recognized);
                        if (json.data.status === 2 || json.data.result.ls === true) {
                            state.resultReceived = true;
                            handleRecognitionResult(recognized);
                        }
                    } else {
                        console.log('[WS] 暫無識別結果');
                    }
                } catch(e) { console.error('[WS] 解析結果失敗:', e); }
            }

            // ========== 9. 識別結果處理 ==========
            function handleRecognitionResult(recognized) {
                if (state.resultHandled) return;
                state.resultHandled = true;

                const targetChar = state.currentChar.char;
                const targetPinyin = pinyinMap[targetChar] || state.currentChar.pinyinRaw.replace(/\d/g, '');
                const recognizedPinyin = pinyinMap[recognized] || null;
                const isMatch = recognizedPinyin && recognizedPinyin === targetPinyin;

                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnVoice.disabled = (state.phase !== 'voice');
                state.isFinalizing = false;
                state.isFlushing = false;

                if (isMatch) {
                    setStatus('🎉 咒語正確！妖怪現形！', false);
                    revealMonster();
                } else {
                    setStatus('😤 咒語比對失敗，請再試一次！', true);
                    state.phase = 'voice';
                    btnVoice.disabled = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    closeWS();
                    resetAudioNode();
                }
                state.resultHandled = false;
            }

            // ========== 10. 妖怪現形 ==========
            function revealMonster() {
                state.phase = 'reveal';
                const char = state.currentChar;
                if (!char) return;
                modernChar.textContent = char.char;
                if (char.animalImg) {
                    animalImage.src = char.animalImg;
                    animalImage.style.display = 'block';
                }
                revealArea.classList.add('show');
                revealArea.style.display = 'flex';
                placeholderArea.style.display = 'none';
                setStatus(`✨ ${char.char} 已現形！ 繼續伏妖之旅？`, false);
                btnVoice.style.display = 'none';
                btnVerify.disabled = true;
                btnClear.disabled = true;
                state.canvasLocked = true;
                state.penColorGold = true;
                triggerShockwave();
                closeWS();
                renderOracle();
                resetAudioNode();
            }

            function triggerShockwave() {
                const container = shockwaveContainer;
                container.classList.remove('active');
                void container.offsetWidth;
                container.innerHTML = `
                    <div class="shockwave-ring"></div>
                    <div class="shockwave-ring"></div>
                    <div class="shockwave-ring"></div>
                `;
                container.classList.add('active');
                setTimeout(() => { container.classList.remove('active'); }, 1500);
            }

            // ========== 11. 流程控制 ==========
            function resetForNewChar(keepLock = false) {
                stopGlowAnimation();
                state.penColorGold = false;
                closeWS();
                state.wsConnectPromise = null;
                isRecording = false;
                state.isRecording = false;
                state.audioBuffer = [];
                state.drawScore = 0;
                state.canvasLocked = false;
                state.phase = 'draw';
                state.wsReady = false;
                state.recognizedText = '';
                state.resultReceived = false;
                state.resultHandled = false;
                if (recordTimer) { clearTimeout(recordTimer); recordTimer = null; }
                if (state.minDurationTimer) { clearTimeout(state.minDurationTimer); state.minDurationTimer = null; }
                resetAudioNode();
                drawHistory = [];
                renderOracle();
                revealArea.classList.remove('show');
                revealArea.style.display = 'none';
                placeholderArea.style.display = 'flex';
                animalImage.style.display = 'none';
                shockwaveContainer.classList.remove('active');
                shockwaveContainer.innerHTML = '';
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                btnVerify.disabled = false;
                btnClear.disabled = false;
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                state.audioPrepared = false;
                if (!keepLock) state.isLocked = false;
                updateThumbnailLockState();
            }

            function loadLevel(char) {
                if (state.isLocked && state.phase !== 'select') return;
                resetForNewChar(false);
                state.currentChar = char;
                state.selectedCharId = char.id;
                state.phase = 'draw';
                state.isLocked = false;
                renderOracle();
                setStatus(`✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span>`, false);
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                updateThumbnails();
                updateThumbnailLockState();
                startCamera();
                preConnectWebSocket();
                prepareAudio();
                startGlowAnimation();
            }

            function pickRandomChar() {
                const total = CHARACTERS.length;
                if (state.usedCharIds.length >= total) state.usedCharIds = [];
                const available = CHARACTERS.filter(c => !state.usedCharIds.includes(c.id));
                if (available.length === 0) { state.usedCharIds = []; return CHARACTERS[Math.floor(Math.random() * total)]; }
                const picked = available[Math.floor(Math.random() * available.length)];
                state.usedCharIds.push(picked.id);
                return picked;
            }

            function initLevel() {
                resetForNewChar(false);
                state.currentChar = pickRandomChar();
                state.selectedCharId = state.currentChar.id;
                state.phase = 'draw';
                state.isLocked = false;
                renderOracle();
                setStatus(`✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span>`, false);
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                updateThumbnails();
                updateThumbnailLockState();
                startCamera();
                preConnectWebSocket();
                prepareAudio();
                startGlowAnimation();
            }

            // ========== 12. 縮略圖 ==========
            function buildThumbnails() {
                thumbnailBar.innerHTML = '';
                CHARACTERS.forEach(char => {
                    const div = document.createElement('div');
                    div.className = 'thumb-item';
                    div.dataset.id = char.id;
                    const img = document.createElement('img');
                    img.className = 'thumb-img';
                    img.src = char.imgSrc;
                    img.alt = char.char;
                    img.loading = 'lazy';
                    div.appendChild(img);
                    div.addEventListener('click', () => {
                        if (state.isLocked) return;
                        if (state.selectedCharId === char.id && state.phase !== 'select') return;
                        loadLevel(char);
                    });
                    thumbnailBar.appendChild(div);
                });
                updateThumbnails();
            }

            function updateThumbnails() {
                const items = thumbnailBar.querySelectorAll('.thumb-item');
                items.forEach(item => {
                    const id = item.dataset.id;
                    item.classList.remove('active');
                    if (id === state.selectedCharId && state.phase !== 'select') item.classList.add('active');
                });
            }

            function updateThumbnailLockState() {
                const items = thumbnailBar.querySelectorAll('.thumb-item');
                items.forEach(item => {
                    if (state.isLocked && state.phase !== 'select') item.classList.add('locked');
                    else item.classList.remove('locked');
                });
            }

            // ========== 13. 按鈕事件 ==========
            function handleVerify() {
                if (state.isVerifying || state.phase === 'reveal' || state.phase === 'select') return;
                if (state.canvasLocked) { setStatus('⚠️ 符文已驗證通過，請進行唸咒', true); return; }
                if (drawHistory.length === 0 || drawHistory.every(p => p.length < 3)) {
                    setStatus('⚠️ 請先在畫布上描寫甲骨文', true);
                    return;
                }
                state.isVerifying = true;
                btnVerify.disabled = true;
                setStatus('🔍 比對符文靈力 ...', false);
                setTimeout(() => {
                    const score = computeF1Score();
                    state.drawScore = score;
                    state.isVerifying = false;
                    btnVerify.disabled = false;
                    if (score >= THRESHOLDS.drawPass) {
                        state.canvasLocked = true;
                        state.phase = 'voice';
                        state.isLocked = true;
                        state.penColorGold = true;
                        setStatus(`✅ 符文契合度合格！咒語已解鎖`, false);
                        pinyinDisplay.textContent = state.currentChar.pinyinTone;
                        pinyinDisplay.style.display = 'block';
                        setTimeout(() => pinyinDisplay.classList.add('show'), 50);
                        btnVoice.disabled = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        setStatus(`🗣️ 請唸出咒語`, false);
                        renderOracle();
                        updateThumbnailLockState();
                        prepareAudio();
                        preConnectWebSocket();
                    } else {
                        setStatus(`❌ 符文契合度不足，再努力描寫！`, true);
                        state.penColorGold = false;
                        renderOracle();
                    }
                }, 500);
            }

            function handleClear() {
                if (state.canvasLocked || state.phase === 'reveal' || state.phase === 'select') return;
                drawHistory = [];
                renderOracle();
                setStatus('✍️ 已清除，重新描寫', false);
            }

            function handleVoiceToggle() {
                if (state.phase !== 'voice') { setStatus('⚠️ 請先通過符文驗證', true); return; }
                if (isRecording) stopRecording(false);
                else startRecording();
            }

            function handleExit() {
                // 重置所有状态，清除画布底图
                state.penColorGold = false;
                stopGlowAnimation();
                state.isLocked = false;
                state.phase = 'select';
                state.canvasLocked = false;
                state.selectedCharId = null;
                // 关键：清除当前字符，使renderOracle不绘制任何底图
                state.currentChar = null;
                closeWS();
                resetAudioNode();
                drawHistory = [];
                // 重新绘制画布（此时state.currentChar为null，renderOracle会直接清空）
                renderOracle();
                // 重置其他UI
                revealArea.classList.remove('show');
                revealArea.style.display = 'none';
                placeholderArea.style.display = 'flex';
                animalImage.style.display = 'none';
                shockwaveContainer.classList.remove('active');
                shockwaveContainer.innerHTML = '';
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnVerify.disabled = false;
                btnClear.disabled = false;
                btnExit.disabled = false;
                setStatus('🔮 請選擇一個 <span class="highlight">符咒</span> 開始', false);
                updateThumbnails();
                updateThumbnailLockState();
                // 重启动画（虽然无底图，但保持循环）
                startGlowAnimation();
                console.log('[退出] 畫布已清空，底圖已移除');
            }

            function setStatus(html, isError = false) {
                statusText.innerHTML = html;
                statusText.style.color = isError ? '#a94442' : '#3a2e1e';
            }

            function closeWS() {
                if (state.wsConnection) { try { state.wsConnection.close(); } catch(e) {} state.wsConnection = null; }
                state.wsReady = false;
                state.wsConnectPromise = null;
                console.log('[WS] 已關閉');
            }

            // ========== 14. 圖片加載 ==========
            function loadImages() {
                const promises = CHARACTERS.map(char => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => { char.img = img; resolve(); };
                        img.onerror = () => {
                            const fallbackCanvas = document.createElement('canvas');
                            fallbackCanvas.width = 200;
                            fallbackCanvas.height = 200;
                            const fctx = fallbackCanvas.getContext('2d');
                            fctx.fillStyle = '#ffffff';
                            fctx.fillRect(0, 0, 200, 200);
                            fctx.strokeStyle = '#000000';
                            fctx.lineWidth = 4;
                            fctx.font = '60px sans-serif';
                            fctx.textAlign = 'center';
                            fctx.textBaseline = 'middle';
                            fctx.fillStyle = '#000';
                            fctx.fillText(char.char, 100, 100);
                            const imgData = fallbackCanvas.toDataURL();
                            const fallbackImg = new Image();
                            fallbackImg.onload = () => { char.img = fallbackImg; resolve(); };
                            fallbackImg.src = imgData;
                        };
                        img.src = char.imgSrc;
                    });
                });
                return Promise.all(promises);
            }

            // ========== 15. 初始化 ==========
            async function init() {
                loadingText.textContent = '📜 載入甲骨文字形圖片 ...';
                await loadImages();
                loadingText.textContent = '🔮 靈力凝聚中 ...';

                resizeCanvas();
                bindCanvasEvents();
                buildThumbnails();

                btnClear.addEventListener('click', handleClear);
                btnVerify.addEventListener('click', handleVerify);
                btnVoice.addEventListener('click', handleVoiceToggle);
                btnExit.addEventListener('click', handleExit);

                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(resizeCanvas, 200);
                });

                state.phase = 'select';
                state.isLocked = false;
                state.currentChar = null;
                state.selectedCharId = null;
                setStatus('🔮 請選擇一個 <span class="highlight">符咒</span> 開始', false);
                btnVoice.disabled = true;
                btnVerify.disabled = true;
                btnClear.disabled = true;
                updateThumbnails();
                updateThumbnailLockState();

                startGlowAnimation();

                setTimeout(() => loadingOverlay.classList.add('hidden'), 600);

                document.addEventListener('touchstart', () => {
                    if (audioContext && audioContext.state === 'suspended') audioContext.resume().catch(() => {});
                }, { passive: true });

                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
                        stream.getTracks().forEach(t => t.stop());
                    }).catch(() => {});
                } catch(e) {}

                console.log('🔮 《甲骨文伏妖錄》已啟動 (左側垂直縮略圖 · 金色筆跡持續 · 衝擊波特效)');
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
