<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>甲骨文伏妖錄</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f5f0e8;
            font-family: 'PingFang TC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        #app {
            display: flex;
            flex-direction: row;
            /* 強制左右分屏 */
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
        }

        /* ===== 左側面板 ===== */
        #left-panel {
            flex: 0 0 50%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1.2vh 1.2vw;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(180, 150, 100, 0.2);
            position: relative;
            z-index: 2;
            overflow: hidden;
        }
        #left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(200, 170, 120, 0.05), transparent 60%);
            pointer-events: none;
            animation: breatheGlow 8s ease-in-out infinite alternate;
        }
        @keyframes breatheGlow {
            0% {
                opacity: 0.3;
                transform: scale(1);
            }
            100% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        /* ---- 縮略圖欄 ---- */
        #thumbnail-bar {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.6vw;
            padding: 0.6vh 0.2vw;
            overflow-x: auto;
            overflow-y: hidden;
            flex-shrink: 0;
            position: relative;
            z-index: 3;
            scrollbar-width: thin;
            scrollbar-color: rgba(180, 150, 100, 0.3) transparent;
            -webkit-overflow-scrolling: touch;
            min-height: 7.5vh;
            border-bottom: 1px solid rgba(180, 150, 100, 0.12);
            margin-bottom: 0.6vh;
        }
        #thumbnail-bar::-webkit-scrollbar {
            height: 4px;
        }
        #thumbnail-bar::-webkit-scrollbar-thumb {
            background: rgba(180, 150, 100, 0.3);
            border-radius: 4px;
        }
        #thumbnail-bar::-webkit-scrollbar-track {
            background: transparent;
        }

        .thumb-item {
            flex: 0 0 auto;
            width: 7.2vh;
            height: 7.2vh;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(180, 150, 100, 0.2);
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.3vh;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            position: relative;
            touch-action: manipulation;
        }
        .thumb-item:active {
            transform: scale(0.92);
        }
        .thumb-item.active {
            border-color: #b8860b;
            box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.2), 0 4px 16px rgba(184, 134, 11, 0.15);
            background: rgba(255, 248, 235, 0.9);
        }
        .thumb-item.locked {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.6);
            pointer-events: none;
            border-color: rgba(180, 150, 100, 0.1);
        }
        .thumb-item .thumb-img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            display: block;
        }
        /* 移除標籤和完成勾 */

        /* ---- 狀態區 ---- */
        #status-area {
            width: 100%;
            max-width: 580px;
            text-align: center;
            padding: 0.8vh 1vw;
            margin-bottom: 0.8vh;
            background: rgba(255, 245, 230, 0.6);
            border: 1px solid rgba(180, 150, 100, 0.15);
            border-radius: 14px;
            position: relative;
            z-index: 2;
            min-height: 6vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #status-text {
            font-size: clamp(0.9rem, 1.8vh, 1.5rem);
            color: #3a2e1e;
            letter-spacing: 0.06em;
            font-weight: 400;
            line-height: 1.5;
        }
        #status-text .highlight {
            color: #b8860b;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(184, 134, 11, 0.12);
        }
        #pinyin-display {
            font-size: clamp(1.6rem, 3.2vh, 2.6rem);
            color: #b8860b;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(184, 134, 11, 0.12);
            margin-top: 0.1vh;
            display: none;
        }
        #pinyin-display.show {
            display: block;
            animation: pinyinPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes pinyinPop {
            0% {
                opacity: 0;
                transform: scale(0.6) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ---- 畫布 ---- */
        #canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(180, 150, 100, 0.12), inset 0 0 60px rgba(255, 250, 240, 0.4);
            border: 1px solid rgba(180, 150, 100, 0.2);
            background: #ffffff;
            z-index: 2;
            touch-action: none;
            flex: 1 1 auto;
            min-height: 0;
        }
        #canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: pointer;
        }
        #canvas-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(200, 180, 160, 0.06) 100%);
            border-radius: 18px;
            z-index: 1;
        }

        /* ---- 控制按鈕 ---- */
        #controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.6vh 0.8vw;
            width: 100%;
            max-width: 580px;
            margin-top: 1.2vh;
            padding: 0.4vh 0;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }
        .btn {
            padding: 0.6vh 1.6vw;
            min-height: 4.6vh;
            min-width: 7vw;
            font-size: clamp(0.7rem, 1.4vh, 1.1rem);
            font-weight: 500;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.04em;
            touch-action: manipulation;
            background: rgba(255, 255, 255, 0.6);
            color: #3a2e1e;
            border: 1px solid rgba(180, 150, 100, 0.25);
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3vw;
            flex: 0 1 auto;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: linear-gradient(135deg, #d4a017, #b8860b);
            color: #fff;
            border-color: #b8860b;
            box-shadow: 0 4px 20px rgba(184, 134, 11, 0.2);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            filter: grayscale(0.5);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-voice {
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.1), rgba(60, 100, 200, 0.05));
            border-color: rgba(60, 100, 200, 0.2);
            color: #3a6bb0;
        }
        .btn-voice.recording {
            animation: pulseMic 1.2s ease-in-out infinite;
            border-color: #c0392b;
            color: #c0392b;
            background: rgba(200, 70, 70, 0.1);
        }
        @keyframes pulseMic {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(192, 57, 43, 0.12);
            }
            50% {
                box-shadow: 0 0 30px rgba(192, 57, 43, 0.25), 0 0 60px rgba(192, 57, 43, 0.05);
            }
        }
        .btn-success {
            background: linear-gradient(135deg, #5cb85c, #449d44);
            color: #fff;
            border-color: #449d44;
            box-shadow: 0 4px 20px rgba(68, 157, 68, 0.2);
        }
        .btn-clear {
            background: rgba(200, 180, 160, 0.15);
            border-color: rgba(180, 150, 100, 0.12);
            color: #6b5a44;
        }
        .btn-clear:active {
            background: rgba(200, 180, 160, 0.3);
        }
        .btn-exit {
            background: rgba(200, 80, 80, 0.08);
            border-color: rgba(200, 80, 80, 0.15);
            color: #a05252;
        }
        .btn-exit:active {
            background: rgba(200, 80, 80, 0.2);
        }
        .btn-exit:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 右側 AR 相機 ===== */
        #right-panel {
            flex: 0 0 50%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
        }

        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #placeholder-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: clamp(0.9rem, 1.8vh, 1.4rem);
            letter-spacing: 0.2em;
            text-align: center;
            padding: 2vh;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
        #placeholder-area .symbol {
            font-size: clamp(2.6rem, 7vh, 5rem);
            opacity: 0.25;
            margin-bottom: 0.8vh;
        }

        #reveal-area {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1vh 2vw 0 2vw;
            pointer-events: none;
            animation: revealAppear 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        #reveal-area.show {
            display: flex;
        }
        @keyframes revealAppear {
            0% {
                opacity: 0;
                transform: scale(0.6) rotate(-6deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        #modern-char {
            font-size: clamp(2.8rem, 9vh, 7rem);
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.4), 0 0 120px rgba(255, 215, 0, 0.15);
            letter-spacing: 0.1em;
            line-height: 1.2;
            flex: 0 0 12%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            animation: charGlow 3s ease-in-out infinite alternate;
        }
        @keyframes charGlow {
            0% {
                text-shadow: 0 0 50px rgba(184, 134, 11, 0.2), 0 0 100px rgba(184, 134, 11, 0.05);
            }
            100% {
                text-shadow: 0 0 80px rgba(184, 134, 11, 0.4), 0 0 180px rgba(184, 134, 11, 0.15);
            }
        }

        #animal-image {
            flex: 0 0 88%;
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply;
            background: transparent;
            filter: drop-shadow(0 0 30px rgba(184, 134, 11, 0.08));
            animation: floatAnimal 3.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes floatAnimal {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        /* ===== 加載遮罩 ===== */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
            color: #b8860b;
            font-size: clamp(1rem, 2vh, 1.6rem);
            letter-spacing: 0.1em;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-overlay .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(184, 134, 11, 0.1);
            border-top: 3px solid #b8860b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2vh;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== 強制左右分屏，移除豎屏變換 ===== */
        @media (max-width: 640px) {
            #left-panel {
                padding: 1vh 1.2vw;
            }
            .thumb-item {
                width: 6.4vh;
                height: 6.4vh;
                border-radius: 12px;
            }
            #thumbnail-bar {
                min-height: 6.8vh;
                gap: 0.8vw;
                padding: 0.4vh 0.2vw;
            }
            .btn {
                min-height: 4vh;
                min-width: 10vw;
                padding: 0.4vh 1.4vw;
                font-size: clamp(0.6rem, 1.2vh, 0.9rem);
            }
            #status-area {
                min-height: 5vh;
                padding: 0.4vh 1vw;
            }
            #status-text {
                font-size: clamp(0.75rem, 1.5vh, 1.2rem);
            }
        }
        /* 移除所有豎屏覆蓋，保持左右 */
    </style>
</head>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">🔮 召喚甲骨文靈力 ...</div>
    </div>

    <div id="app">
        <div id="left-panel">
            <div id="thumbnail-bar"></div>

            <div id="status-area">
                <div id="status-text">🔮 請選擇一個 <span class="highlight">符咒</span> 開始</div>
                <div id="pinyin-display"></div>
            </div>

            <div id="canvas-wrapper">
                <canvas id="oracleCanvas"></canvas>
            </div>

            <div id="controls">
                <button class="btn btn-clear" id="btnClear">🗑 清除</button>
                <button class="btn btn-primary" id="btnVerify">⚡ 驗證符文</button>
                <button class="btn btn-voice" id="btnVoice" disabled>🎙️ 唸咒</button>
                <button class="btn btn-exit" id="btnExit">🚪 退出</button>
            </div>
        </div>

        <div id="right-panel">
            <video id="camera-video" autoplay playsinline muted></video>
            <div id="placeholder-area">
                <div class="symbol">✦</div>
                <div>選擇符咒 · 描繪甲骨文</div>
                <div style="font-size:0.7em; opacity:0.4; margin-top:0.4vh;">召喚上古靈力</div>
            </div>
            <div id="reveal-area">
                <div id="modern-char">羊</div>
                <img id="animal-image" src="" alt="妖怪">
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 1. 配置 ==========
            const XF_CONFIG = {
                APPID: '2600b137',
                API_KEY: '8b012124ed213c06974cd469f29e134b',

            const AUDIO_CONFIG = { sampleRate: 16000, bitDepth: 16, channels: 1, frameDuration: 40, maxRecordSeconds: 8 };
            const THRESHOLDS = { drawPass: 45 };

            // ========== 2. 字庫 ==========
            const CHARACTERS = [{

                img: null,
            }, {
                id: 'ma',

                imgSrc: 'images/馬_1.png',

            }, {

            // ========== 3. 同音字映射（含擴展：理由→牛，你好→鳥，與→魚） ==========

                const baseMap = {

                const map = {};
                CHARACTERS.forEach(item => {
                    const pinyinNoTone = item.pinyinRaw.replace(/\d/g, '');
                    for (const [key, val] of Object.entries(baseMap)) {

                    map[item.char] = pinyinNoTone;

                return map;

            const pinyinMap = buildFullPinyinMap();

            // ========== 4. 狀態 ==========
            const state = {

                audioWorkletNode: null,
                mediaStream: null,
                cameraStream: null,
                audioBuffer: [],
                recordTimer: null,
                wsConnection: null,
                wsReady: false,
                wsConnectPromise: null,
                usedCharIds: [],
                recordStartTime: 0,
                minDurationTimer: null,
                isFinalizing: false,
                flushResolve: null,
                isFlushing: false,
                recognizedText: '',
                audioPrepared: false,
                preparingAudio: false,
                resultReceived: false,
                resultHandled: false,
                isLocked: false, // 缩略图锁定
                selectedCharId: null,
                // 移除 completedIds
            };

            // ========== 5. DOM ==========
            const $ = id => document.getElementById(id);
            const canvas = $('oracleCanvas');
            const ctx = canvas.getContext('2d');
            const statusText = $('status-text');
            const pinyinDisplay = $('pinyin-display');
            const btnClear = $('btnClear');
            const btnVerify = $('btnVerify');
            const btnVoice = $('btnVoice');
            const btnExit = $('btnExit');
            const revealArea = $('reveal-area');
            const placeholderArea = $('placeholder-area');
            const modernChar = $('modern-char');
            const animalImage = $('animal-image');
            const cameraVideo = $('camera-video');
            const loadingOverlay = $('loading-overlay');
            const loadingText = $('loading-text');
            const thumbnailBar = $('thumbnail-bar');

            // ========== 6. Canvas ==========
            let canvasW, canvasH;
            let isDrawing = false;
            let drawHistory = [];

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvasW = rect.width;
                canvasH = rect.height;
                canvas.width = canvasW * dpr;
                canvas.height = canvasH * dpr;
                canvas.style.width = canvasW + 'px';
                canvas.style.height = canvasH + 'px';
                ctx.scale(dpr, dpr);
                ctx.lineWidth = Math.max(3, canvasW * 0.02);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                // 默認筆跡為硃砂紅
                ctx.strokeStyle = '#c0392b'; // 硃砂紅
                ctx.shadowColor = 'rgba(192, 57, 43, 0.15)';
                ctx.shadowBlur = 8;
                renderOracle();
            }

            function renderOracle() {
                ctx.clearRect(0, 0, canvasW, canvasH);
                const char = state.currentChar;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.22;
                    ctx.drawImage(char.img, 0, 0, canvasW, canvasH);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#ddd';
                    ctx.font = '18px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('字形載入中...', canvasW / 2, canvasH / 2);
                }
                if (drawHistory.length > 0) {
                    ctx.save();
                    if (state.canvasLocked && state.phase === 'voice') {
                        // 金色效果
                        ctx.strokeStyle = '#ffd700';
                        ctx.shadowColor = 'rgba(255,215,0,0.35)';
                        ctx.shadowBlur = 20;
                    } else {
                        ctx.strokeStyle = '#c0392b'; // 硃砂紅
                        ctx.shadowColor = 'rgba(192, 57, 43, 0.15)';
                        ctx.shadowBlur = 10;
                    }
                    ctx.lineWidth = Math.max(3, canvasW * 0.02);
                    ctx.globalAlpha = 0.85;
                    for (const path of drawHistory) {
                        if (path.length < 2) continue;
                        ctx.beginPath();
                        ctx.moveTo(path[0].x, path[0].y);
                        for (let i = 1; i < path.length; i++) {
                            ctx.lineTo(path[i].x, path[i].y);
                        }
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
            }

            function startDraw(e) {
                if (state.canvasLocked || state.phase === 'reveal' || state.phase === 'select') return;
                e.preventDefault();
                isDrawing = true;
                const pos = getPos(e);
                drawHistory.push([{ x: pos.x, y: pos.y }]);
            }

            function moveDraw(e) {
                if (!isDrawing || state.canvasLocked) return;
                e.preventDefault();
                const pos = getPos(e);
                const currentPath = drawHistory[drawHistory.length - 1];
                if (currentPath) {
                    const last = currentPath[currentPath.length - 1];
                    if (last && Math.hypot(pos.x - last.x, pos.y - last.y) < 2) return;
                    currentPath.push({ x: pos.x, y: pos.y });
                }
                renderOracle();
            }

            function endDraw(e) {
                if (isDrawing) {
                    isDrawing = false;
                    const lastPath = drawHistory[drawHistory.length - 1];
                    if (lastPath && lastPath.length < 3) {
                        drawHistory.pop();
                        renderOracle();
                    }
                }
            }

            function bindCanvasEvents() {
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', moveDraw, { passive: false });
                canvas.addEventListener('touchend', endDraw, { passive: false });
                canvas.addEventListener('touchcancel', endDraw, { passive: false });
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', moveDraw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
            }

            // ========== 7. 像素比對 ==========
            function computeF1Score() {
                const dpr = window.devicePixelRatio || 1;
                const w = Math.floor(canvasW * dpr);
                const h = Math.floor(canvasH * dpr);

                const off1 = document.createElement('canvas');
                off1.width = w;
                off1.height = h;
                const ctx1 = off1.getContext('2d');
                const char = state.currentChar;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx1.drawImage(char.img, 0, 0, w, h);
                }

                const off2 = document.createElement('canvas');
                off2.width = w;
                off2.height = h;
                const ctx2 = off2.getContext('2d');
                ctx2.strokeStyle = '#ffffff';
                ctx2.lineWidth = Math.max(3, canvasW * 0.02) * dpr;
                ctx2.lineCap = 'round';
                ctx2.lineJoin = 'round';
                for (const path of drawHistory) {
                    if (path.length < 2) continue;
                    ctx2.beginPath();
                    const scaleX = w / canvasW;
                    const scaleY = h / canvasH;
                    ctx2.moveTo(path[0].x * scaleX, path[0].y * scaleY);
                    for (let i = 1; i < path.length; i++) {
                        ctx2.lineTo(path[i].x * scaleX, path[i].y * scaleY);
                    }
                    ctx2.stroke();
                }

                const data1 = ctx1.getImageData(0, 0, w, h).data;
                const data2 = ctx2.getImageData(0, 0, w, h).data;

                const step = 2;
                let tp = 0,
                    fp = 0,
                    fn = 0;
                const threshold = 30;

                for (let i = 0; i < data1.length; i += 4 * step) {
                    const idx = i / 4;
                    const x = (idx % w);
                    const y = Math.floor(idx / w);
                    if (x % step !== 0 || y % step !== 0) continue;

                    const lum1 = 0.299 * data1[i] + 0.587 * data1[i + 1] + 0.114 * data1[i + 2];
                    const lum2 = 0.299 * data2[i] + 0.587 * data2[i + 1] + 0.114 * data2[i + 2];

                    const isFore1 = lum1 < threshold;
                    const isFore2 = lum2 > threshold;

                    if (isFore1 && isFore2) tp++;
                    else if (!isFore1 && isFore2) fp++;
                    else if (isFore1 && !isFore2) fn++;
                }

                if (tp === 0) return 0;
                const precision = tp / (tp + fp);
                const recall = tp / (tp + fn);
                const f1 = 2 * precision * recall / (precision + recall);
                return Math.round(f1 * 100);
            }

            // ========== 8. 音頻與相機 ==========
            const workletCode = `
          class PCMProcessor extends AudioWorkletProcessor {
            constructor() {
              super();
              this.buffer = [];
              this.chunkSize = 640;
              this.running = true;
              this.port.onmessage = (e) => {
                if (e.data.type === 'flush') {
                  this.flushBuffer();
                }
              };
            }
            flushBuffer() {
              if (this.buffer.length === 0) {
                this.port.postMessage({ type: 'flushed' });
                return;
              }
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              const merged = new Float32Array(totalLen);
              let offset = 0;
              for (const chunk of this.buffer) {
                merged.set(chunk, offset);
                offset += chunk.length;
              }
              this.buffer = [];
              const pcm = new Int16Array(merged.length);
              for (let i = 0; i < merged.length; i++) {
                let s = merged[i];
                s = Math.max(-1, Math.min(1, s));
                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
              }
              this.port.postMessage({ type: 'audio', buffer: pcm.buffer, isFlush: true }, [pcm.buffer]);
              this.port.postMessage({ type: 'flushed' });
            }
            process(inputs, outputs, parameters) {
              if (!this.running) return false;
              const input = inputs[0];
              if (!input || input.length === 0) return true;
              const channelData = input[0];
              if (!channelData) return true;
              this.buffer.push(new Float32Array(channelData));
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              if (totalLen >= this.chunkSize) {
                const merged = new Float32Array(totalLen);
                let offset = 0;
                for (const chunk of this.buffer) {
                  merged.set(chunk, offset);
                  offset += chunk.length;
                }
                this.buffer = [];
                const sendData = merged.slice(0, this.chunkSize);
                if (merged.length > this.chunkSize) {
                  const remaining = merged.slice(this.chunkSize);
                  this.buffer.push(remaining);
                }
                const pcm = new Int16Array(sendData.length);
                for (let i = 0; i < sendData.length; i++) {
                  let s = sendData[i];
                  s = Math.max(-1, Math.min(1, s));
                  pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                this.port.postMessage({ type: 'audio', buffer: pcm.buffer, isFlush: false }, [pcm.buffer]);
              }
              return true;
            }
          }
          registerProcessor('pcm-processor', PCMProcessor);
        `;
            let workletBlobURL = null;

            function initWorklet() {
                if (!workletBlobURL) {
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    workletBlobURL = URL.createObjectURL(blob);
                }
                return workletBlobURL;
            }

            let audioContext = null,
                audioWorkletNode = null,
                mediaStream = null,
                cameraStream = null;
            let isRecording = false;
            let recordTimer = null;
            let sourceNode = null;

            async function startCamera() {
                if (cameraStream) {
                    if (cameraVideo.srcObject !== cameraStream) {
                        cameraVideo.srcObject = cameraStream;
                    }
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false,
                    });
                    cameraStream = stream;
                    cameraVideo.srcObject = stream;
                    await cameraVideo.play();
                    console.log('[AR] 相機已啟動');
                } catch (e) {
                    console.warn('[AR] 相機啟動失敗，使用靜態背景');
                }
            }

            async function prepareAudio() {
                if (state.audioPrepared) return;
                if (state.preparingAudio) {
                    return new Promise((resolve) => {
                        const check = setInterval(() => {
                            if (state.audioPrepared) {
                                clearInterval(check);
                                resolve();
                            }
                        }, 50);
                    });
                }
                state.preparingAudio = true;
                console.log('[準備] 初始化音頻...');
                try {
                    if (!audioContext || audioContext.state === 'closed') {
                        audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: AUDIO_CONFIG
                                .sampleRate });
                    }
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }

                    if (!mediaStream || mediaStream.getTracks().some(t => t.readyState === 'ended')) {
                        if (mediaStream) {
                            mediaStream.getTracks().forEach(t => t.stop());
                            mediaStream = null;
                        }
                        mediaStream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                sampleRate: AUDIO_CONFIG.sampleRate,
                            },
                            video: false,
                        });
                        console.log('[準備] 麥克風權限已獲得');
                    }

                    if (!audioWorkletNode) {
                        await audioContext.audioWorklet.addModule(initWorklet());
                        sourceNode = audioContext.createMediaStreamSource(mediaStream);
                        audioWorkletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                        audioWorkletNode.port.onmessage = (e) => {
                            if (e.data.type === 'audio' && state.isRecording && state.wsReady) {
                                const buffer = e.data.buffer;
                                const bytes = new Uint8Array(buffer);
                                let binary = '';
                                for (let i = 0; i < bytes.length; i++) {
                                    binary += String.fromCharCode(bytes[i]);
                                }
                                const b64 = btoa(binary);
                                sendAudioChunk(b64, e.data.isFlush || false);
                            }
                            if (e.data.type === 'flushed') {
                                if (state.flushResolve) {
                                    state.flushResolve();
                                    state.flushResolve = null;
                                }
                            }
                        };
                        sourceNode.connect(audioWorkletNode);
                        audioWorkletNode.connect(audioContext.destination);
                        console.log('[準備] AudioWorkletNode 創建成功');
                    }

                    state.audioPrepared = true;
                    console.log('[準備] 音頻初始化完成');
                } catch (e) {
                    console.error('[準備] 音頻初始化失敗:', e);
                } finally {
                    state.preparingAudio = false;
                }
            }

            function resetAudioNode() {
                if (audioWorkletNode) {
                    try { audioWorkletNode.disconnect();
                        audioWorkletNode = null; } catch (e) {}
                }
                if (sourceNode) {
                    try { sourceNode.disconnect();
                        sourceNode = null; } catch (e) {}
                }
                state.audioPrepared = false;
                state.audioBuffer = [];
                console.log('[重置] 音頻節點已斷開');
            }

            function sendAudioChunk(b64Data, isFlush = false) {
                if (!state.wsReady || !state.wsConnection) {
                    console.warn('WebSocket未就緒，丟棄音頻幀');
                    return;
                }
                const payload = {
                    data: {
                        status: 1,
                        format: 'audio/L16;rate=16000',
                        encoding: 'raw',
                        audio: b64Data
                    }
                };
                state.audioBuffer.push(b64Data);
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                    console.log(`[WS] 發送音頻幀, 大小=${b64Data.length}${isFlush ? ' (flush)' : ''}`);
                } catch (e) {
                    console.error('發送音訊幀失敗:', e);
                }
            }

            function sendAudioEnd() {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = { data: { status: 2 } };
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                    console.log('[WS] 發送尾幀 status=2');
                } catch (e) {
                    console.error('發送尾幀失敗:', e);
                }
            }

            async function startRecording() {
                if (isRecording) return;
                if (state.phase !== 'voice') {
                    setStatus('⚠️ 請先通過符文驗證再唸咒', true);
                    return;
                }

                if (!state.audioPrepared) {
                    await prepareAudio();
                }
                if (!state.wsReady) {
                    console.log('[WS] 等待 WebSocket 就緒...');
                    if (state.wsConnectPromise) {
                        await state.wsConnectPromise;
                    } else {
                        await connectWebSocket();
                    }
                    console.log('[WS] 就緒');
                }

                if (!audioWorkletNode) {
                    await prepareAudio();
                }

                if (audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                isRecording = true;
                state.isRecording = true;
                state.recordStartTime = Date.now();
                state.resultReceived = false;
                state.resultHandled = false;
                btnVoice.textContent = '⏹️ 停止錄音';
                btnVoice.classList.add('recording');
                btnVoice.disabled = false;
                setStatus('🎤 請朗讀咒語', false);
                if (recordTimer) clearTimeout(recordTimer);
                recordTimer = setTimeout(() => {
                    if (isRecording) stopRecording(true);
                }, AUDIO_CONFIG.maxRecordSeconds * 1000);
            }

            function stopRecording(auto = false) {
                if (!isRecording) return;
                if (state.isFinalizing) return;

                const elapsed = Date.now() - state.recordStartTime;
                const remaining = MIN_RECORD_DURATION - elapsed;

                state.isFinalizing = true;
                btnVoice.disabled = true;
                btnVoice.textContent = '⏳ 處理中...';
                btnVoice.classList.remove('recording');
                setStatus('⏳ 聆聽咒語中 ...', false);

                if (remaining > 0) {
                    if (state.minDurationTimer) clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = setTimeout(() => {
                        state.minDurationTimer = null;
                        finalizeStop();
                    }, remaining);
                } else {
                    finalizeStop();
                }
            }

            function finalizeStop() {
                if (state.isFlushing) return;
                state.isFlushing = true;

                if (sourceNode) {
                    try { sourceNode.disconnect();
                        sourceNode = null; } catch (e) {}
                }

                if (recordTimer) { clearTimeout(recordTimer);
                    recordTimer = null; }
                if (state.minDurationTimer) { clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = null; }

                if (audioWorkletNode) {
                    console.log('[Worklet] 發送 flush 指令');
                    audioWorkletNode.port.postMessage({ type: 'flush' });
                    const flushPromise = new Promise((resolve) => {
                        state.flushResolve = resolve;
                        setTimeout(() => {
                            if (state.flushResolve) {
                                console.warn('[Worklet] flush 超時，強制繼續');
                                state.flushResolve();
                                state.flushResolve = null;
                            }
                        }, 300);
                    });
                    flushPromise.then(() => {
                        if (state.wsReady) {
                            sendAudioEnd();
                        } else {
                            console.warn('WS未就緒，無法發送尾幀');
                        }
                        state.audioBuffer = [];
                        isRecording = false;
                        state.isRecording = false;
                        state.isFinalizing = false;
                        state.isFlushing = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        btnVoice.classList.remove('recording');
                        btnVoice.disabled = (state.phase !== 'voice');
                        console.log('[錄音] 尾幀已發送，等待服務器響應');
                    });
                } else {
                    if (state.wsReady) {
                        sendAudioEnd();
                    }
                    isRecording = false;
                    state.isRecording = false;
                    state.isFinalizing = false;
                    state.isFlushing = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    btnVoice.classList.remove('recording');
                    btnVoice.disabled = (state.phase !== 'voice');
                }
            }

            // ---------- WebSocket ----------
            function preConnectWebSocket() {
                if (state.wsReady) return Promise.resolve();
                if (state.wsConnectPromise) return state.wsConnectPromise;
                state.wsConnectPromise = connectWebSocket().catch(() => {
                    state.wsConnectPromise = null;
                });
                return state.wsConnectPromise;
            }

            async function connectWebSocket() {
                if (state.wsReady) return;
                if (state.wsConnection && state.wsConnection.readyState === WebSocket.CONNECTING) {
                    return new Promise((resolve) => {
                        const check = setInterval(() => {
                            if (state.wsReady) {
                                clearInterval(check);
                                resolve();
                            }
                        }, 100);
                    });
                }
                if (state.wsConnection) {
                    try { state.wsConnection.close(); } catch (e) {}
                    state.wsConnection = null;
                }
                try {
                    const url = buildWSSUrl();
                    state.wsConnection = new WebSocket(url);
                    state.wsConnection.binaryType = 'blob';
                    return new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error('WSS 連線超時'));
                        }, 10000);
                        state.wsConnection.onopen = () => {
                            clearTimeout(timeout);
                            state.wsReady = true;
                            console.log('[WS] 連線成功');
                            sendInitFrame();
                            resolve();
                        };
                        state.wsConnection.onerror = () => {
                            clearTimeout(timeout);
                            console.error('[WS] 錯誤');
                            reject(new Error('WS error'));
                        };
                        state.wsConnection.onmessage = (e) => {
                            console.log('[WS] 收到訊息');
                            handleWSMessage(e.data);
                        };
                        state.wsConnection.onclose = () => {
                            state.wsReady = false;
                            console.log('[WS] 連線關閉');
                        };
                    });
                } catch (e) {
                    console.error('[WS] 連線失敗:', e);
                    throw e;
                }
            }

            function buildWSSUrl() {
                const { APPID, API_KEY, API_SECRET, WSS_URL } = XF_CONFIG;
                const host = new URL(WSS_URL).host;
                const date = new Date().toUTCString();
                const signatureOrigin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
                const sha = CryptoJS.HmacSHA256(signatureOrigin, API_SECRET);
                const signature = CryptoJS.enc.Base64.stringify(sha);
                const authOrigin = `api_key="${API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const auth = btoa(authOrigin);
                return `${WSS_URL}?authorization=${auth}&date=${encodeURIComponent(date)}&host=${host}`;
            }

            function sendInitFrame() {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = {
                    common: { app_id: XF_CONFIG.APPID },
                    business: {
                        language: 'zh_cn',
                        domain: 'iat',
                        accent: 'mandarin',
                        rlang: 'zh-cn',
                        ptt: 1,
                    },
                    data: { status: 0 }
                };
                state.wsConnection.send(JSON.stringify(payload));
            }

            function handleWSMessage(data) {
                try {
                    let text;
                    if (data instanceof Blob) {
                        const reader = new FileReader();
                        reader.onload = () => {
                            const result = reader.result;
                            parseWSResult(result);
                        };
                        reader.readAsText(data);
                    } else {
                        parseWSResult(data);
                    }
                } catch (e) {
                    console.error('[WS] 處理訊息異常:', e);
                }
            }

            function parseWSResult(text) {
                try {
                    const json = JSON.parse(text);
                    if (json.code && json.code !== 0) {
                        console.warn('[WS] 訊飛 API 錯誤:', json.message);
                        return;
                    }
                    let recognized = '';
                    if (json.data && json.data.result && json.data.result.ws) {
                        const ws = json.data.result.ws;
                        for (let i = 0; i < ws.length; i++) {
                            const cw = ws[i].cw;
                            if (cw && cw.length > 0) {
                                recognized += cw[0].w;
                            }
                        }
                        recognized = recognized.replace(/[\s，。、！？；：,.!?;:]/g, '');
                        state.recognizedText = recognized;
                        console.log('[識別] 原始結果:', recognized);
                        if (json.data.status === 2 || json.data.result.ls === true) {
                            state.resultReceived = true;
                            handleRecognitionResult(recognized);
                        }
                    } else {
                        console.log('[WS] 暫無識別結果');
                    }
                } catch (e) {
                    console.error('[WS] 解析結果失敗:', e);
                }
            }

            // ========== 9. 識別結果處理（不顯示具體字，不限制單字） ==========
            function handleRecognitionResult(recognized) {
                if (state.resultHandled) return;
                state.resultHandled = true;

                const targetChar = state.currentChar.char;
                const targetPinyin = pinyinMap[targetChar] || state.currentChar.pinyinRaw.replace(/\d/g, '');

                // 直接使用整個識別結果（去除標點）查映射表
                const recognizedPinyin = pinyinMap[recognized] || null;
                const isMatch = recognizedPinyin && recognizedPinyin === targetPinyin;

                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnVoice.disabled = (state.phase !== 'voice');
                state.isFinalizing = false;
                state.isFlushing = false;

                if (isMatch) {
                    setStatus('🎉 咒語正確！妖怪現形！', false);
                    revealMonster();
                } else {
                    // 不顯示識別到的字，只提示失敗
                    setStatus('😤 咒語比對失敗，請再試一次！', true);
                    state.phase = 'voice';
                    btnVoice.disabled = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    closeWS();
                    resetAudioNode();
                }
                state.resultHandled = false;
            }

            // ========== 10. 妖怪現形 ==========
            function revealMonster() {
                state.phase = 'reveal';
                const char = state.currentChar;
                if (!char) return;
                modernChar.textContent = char.char;
                if (char.animalImg) {
                    animalImage.src = char.animalImg;
                    animalImage.style.display = 'block';
                }
                revealArea.classList.add('show');
                revealArea.style.display = 'flex';
                placeholderArea.style.display = 'none';
                setStatus(`✨ ${char.char} 已現形！ 繼續伏妖之旅？`, false);
                btnVoice.style.display = 'none';
                btnVerify.disabled = true;
                btnClear.disabled = true;
                state.canvasLocked = true;
                closeWS();
                renderOracle();
                resetAudioNode();
                // 移除完成標記
            }

            // ========== 11. 流程控制 ==========
            function resetForNewChar(keepLock = false) {
                closeWS();
                state.wsConnectPromise = null;
                isRecording = false;
                state.isRecording = false;
                state.audioBuffer = [];
                state.drawScore = 0;
                state.canvasLocked = false;
                state.phase = 'draw';
                state.wsReady = false;
                state.recognizedText = '';
                state.resultReceived = false;
                state.resultHandled = false;
                if (recordTimer) { clearTimeout(recordTimer);
                    recordTimer = null; }
                if (state.minDurationTimer) { clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = null; }
                resetAudioNode();
                drawHistory = [];
                renderOracle();
                revealArea.classList.remove('show');
                revealArea.style.display = 'none';
                placeholderArea.style.display = 'flex';
                animalImage.style.display = 'none';
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                btnVerify.disabled = false;
                btnClear.disabled = false;
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                state.audioPrepared = false;
                if (!keepLock) {
                    state.isLocked = false;
                }
                updateThumbnailLockState();
            }

            function loadLevel(char) {
                if (state.isLocked && state.phase !== 'select') {
                    return;
                }
                resetForNewChar(false);
                state.currentChar = char;
                state.selectedCharId = char.id;
                state.phase = 'draw';
                state.isLocked = false;
                renderOracle();
                setStatus(`✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span>`, false);
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                updateThumbnails();
                updateThumbnailLockState();
                startCamera();
                preConnectWebSocket();
                prepareAudio();
            }

            function pickRandomChar() {
                const total = CHARACTERS.length;
                if (state.usedCharIds.length >= total) {
                    state.usedCharIds = [];
                }
                const available = CHARACTERS.filter(c => !state.usedCharIds.includes(c.id));
                if (available.length === 0) {
                    state.usedCharIds = [];
                    return CHARACTERS[Math.floor(Math.random() * total)];
                }
                const picked = available[Math.floor(Math.random() * available.length)];
                state.usedCharIds.push(picked.id);
                return picked;
            }

            function initLevel() {
                resetForNewChar(false);
                state.currentChar = pickRandomChar();
                state.selectedCharId = state.currentChar.id;
                state.phase = 'draw';
                state.isLocked = false;
                renderOracle();
                setStatus(`✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span>`, false);
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                updateThumbnails();
                updateThumbnailLockState();
                startCamera();
                preConnectWebSocket();
                prepareAudio();
            }

            // ========== 12. 縮略圖 ==========
            function buildThumbnails() {
                thumbnailBar.innerHTML = '';
                CHARACTERS.forEach(char => {
                    const div = document.createElement('div');
                    div.className = 'thumb-item';
                    div.dataset.id = char.id;

                    const img = document.createElement('img');
                    img.className = 'thumb-img';
                    img.src = char.imgSrc;
                    img.alt = char.char;
                    img.loading = 'lazy';
                    div.appendChild(img);

                    // 移除標籤和對勾

                    div.addEventListener('click', () => {
                        if (state.isLocked) return;
                        if (state.selectedCharId === char.id && state.phase !== 'select') return;
                        loadLevel(char);
                    });

                    thumbnailBar.appendChild(div);
                });
                updateThumbnails();
            }

            function updateThumbnails() {
                const items = thumbnailBar.querySelectorAll('.thumb-item');
                items.forEach(item => {
                    const id = item.dataset.id;
                    item.classList.remove('active');
                    if (id === state.selectedCharId && state.phase !== 'select') {
                        item.classList.add('active');
                    }
                    // 移除完成狀態
                });
            }

            function updateThumbnailLockState() {
                const items = thumbnailBar.querySelectorAll('.thumb-item');
                items.forEach(item => {
                    if (state.isLocked && state.phase !== 'select') {
                        item.classList.add('locked');
                    } else {
                        item.classList.remove('locked');
                    }
                });
            }

            // ========== 13. 按鈕事件 ==========
            function handleVerify() {
                if (state.isVerifying || state.phase === 'reveal' || state.phase === 'select') return;
                if (state.canvasLocked) {
                    setStatus('⚠️ 符文已驗證通過，請進行唸咒', true);
                    return;
                }
                if (drawHistory.length === 0 || drawHistory.every(p => p.length < 3)) {
                    setStatus('⚠️ 請先在畫布上描寫甲骨文', true);
                    return;
                }
                state.isVerifying = true;
                btnVerify.disabled = true;
                setStatus('🔍 比對符文靈力 ...', false);
                setTimeout(() => {
                    const score = computeF1Score();
                    state.drawScore = score;
                    state.isVerifying = false;
                    btnVerify.disabled = false;
                    if (score >= THRESHOLDS.drawPass) {
                        state.canvasLocked = true;
                        state.phase = 'voice';
                        state.isLocked = true;
                        setStatus(`✅ 符文契合度合格！咒語已解鎖`, false);
                        pinyinDisplay.textContent = state.currentChar.pinyinTone;
                        pinyinDisplay.style.display = 'block';
                        setTimeout(() => pinyinDisplay.classList.add('show'), 50);
                        btnVoice.disabled = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        setStatus(`🗣️ 請唸出咒語`, false);
                        renderOracle();
                        updateThumbnailLockState();
                        prepareAudio();
                        preConnectWebSocket();
                    } else {
                        setStatus(`❌ 符文契合度不足，再努力描寫！`, true);
                    }
                }, 500);
            }

            function handleClear() {
                if (state.canvasLocked || state.phase === 'reveal' || state.phase === 'select') return;
                drawHistory = [];
                renderOracle();
                setStatus('✍️ 已清除，重新描寫', false);
            }

            function handleVoiceToggle() {
                if (state.phase !== 'voice') {
                    setStatus('⚠️ 請先通過符文驗證', true);
                    return;
                }
                if (isRecording) stopRecording(false);
                else startRecording();
            }

            function handleExit() {
                state.isLocked = false;
                state.phase = 'select';
                state.canvasLocked = false;
                state.selectedCharId = null;
                closeWS();
                resetAudioNode();
                drawHistory = [];
                renderOracle();
                revealArea.classList.remove('show');
                revealArea.style.display = 'none';
                placeholderArea.style.display = 'flex';
                animalImage.style.display = 'none';
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnVerify.disabled = false;
                btnClear.disabled = false;
                btnExit.disabled = false;
                state.phase = 'select';
                state.currentChar = null;
                setStatus('🔮 請選擇一個 <span class="highlight">符咒</span> 開始', false);
                updateThumbnails();
                updateThumbnailLockState();
            }

            function setStatus(html, isError = false) {
                statusText.innerHTML = html;
                statusText.style.color = isError ? '#a94442' : '#3a2e1e';
            }

            function closeWS() {
                if (state.wsConnection) {
                    try { state.wsConnection.close(); } catch (e) {}
                    state.wsConnection = null;
                }
                state.wsReady = false;
                state.wsConnectPromise = null;
            }

            // ========== 14. 圖片加載 ==========
            function loadImages() {
                const promises = CHARACTERS.map(char => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            char.img = img;
                            resolve();
                        };
                        img.onerror = () => {
                            // 生成佔位圖
                            const fallbackCanvas = document.createElement('canvas');
                            fallbackCanvas.width = 200;
                            fallbackCanvas.height = 200;
                            const fctx = fallbackCanvas.getContext('2d');
                            fctx.fillStyle = '#ffffff';
                            fctx.fillRect(0, 0, 200, 200);
                            fctx.strokeStyle = '#000000';
                            fctx.lineWidth = 4;
                            fctx.font = '60px sans-serif';
                            fctx.textAlign = 'center';
                            fctx.textBaseline = 'middle';
                            fctx.fillStyle = '#000';
                            fctx.fillText(char.char, 100, 100);
                            const imgData = fallbackCanvas.toDataURL();
                            const fallbackImg = new Image();
                            fallbackImg.onload = () => {
                                char.img = fallbackImg;
                                resolve();
                            };
                            fallbackImg.src = imgData;
                        };
                        img.src = char.imgSrc;
                    });
                });
                return Promise.all(promises);
            }

            // ========== 15. 初始化 ==========
            async function init() {
                loadingText.textContent = '📜 載入甲骨文字形圖片 ...';
                await loadImages();
                loadingText.textContent = '🔮 靈力凝聚中 ...';

                resizeCanvas();
                bindCanvasEvents();
                buildThumbnails();

                btnClear.addEventListener('click', handleClear);
                btnVerify.addEventListener('click', handleVerify);
                btnVoice.addEventListener('click', handleVoiceToggle);
                btnExit.addEventListener('click', handleExit);

                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(resizeCanvas, 200);
                });

                state.phase = 'select';
                state.isLocked = false;
                state.currentChar = null;
                state.selectedCharId = null;
                setStatus('🔮 請選擇一個 <span class="highlight">符咒</span> 開始', false);
                btnVoice.disabled = true;
                btnVerify.disabled = true;
                btnClear.disabled = true;
                updateThumbnails();
                updateThumbnailLockState();

                setTimeout(() => loadingOverlay.classList.add('hidden'), 600);

                document.addEventListener('touchstart', () => {
                    if (audioContext && audioContext.state === 'suspended') audioContext.resume().catch(() => {});
                }, { passive: true });

                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
                        stream.getTracks().forEach(t => t.stop());
                    }).catch(() => {});
                } catch (e) {}

                console.log('🔮 《甲骨文伏妖錄》已啟動 (左右分屏 · 硃砂紅筆跡 · 無單字限制)');
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
</html>
