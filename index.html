<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>甲骨文伏妖錄</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f5f0e8;
            font-family: 'PingFang TC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
        }

        #left-panel {
            flex: 0 0 50%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2vh 2vw;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(180, 150, 100, 0.2);
            position: relative;
        }
        #left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(200, 170, 120, 0.05), transparent 60%);
            pointer-events: none;
            animation: breatheGlow 8s ease-in-out infinite alternate;
        }
        @keyframes breatheGlow {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        #status-area {
            width: 100%;
            max-width: 580px;
            text-align: center;
            padding: 1.2vh 1vw;
            margin-bottom: 1.5vh;
            background: rgba(255, 245, 230, 0.7);
            border: 1px solid rgba(180, 150, 100, 0.2);
            border-radius: 16px;
            position: relative;
            z-index: 2;
            min-height: 7vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #status-text {
            font-size: clamp(1.1rem, 2.2vh, 1.8rem);
            color: #3a2e1e;
            letter-spacing: 0.06em;
            font-weight: 400;
            line-height: 1.6;
        }
        #status-text .highlight {
            color: #b8860b;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(184, 134, 11, 0.15);
        }
        #pinyin-display {
            font-size: clamp(1.8rem, 3.6vh, 3rem);
            color: #b8860b;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(184, 134, 11, 0.15);
            margin-top: 0.2vh;
            display: none;
        }
        #pinyin-display.show {
            display: block;
            animation: pinyinPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes pinyinPop {
            0% { opacity: 0; transform: scale(0.6) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(180, 150, 100, 0.15), inset 0 0 60px rgba(255, 250, 240, 0.5);
            border: 1px solid rgba(180, 150, 100, 0.25);
            background: #ffffff;
            z-index: 2;
            touch-action: none;
        }
        #canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: pointer;
        }
        #canvas-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(200, 180, 160, 0.1) 100%);
            border-radius: 20px;
            z-index: 1;
        }

        #controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8vh 1vw;
            width: 100%;
            max-width: 580px;
            margin-top: 1.8vh;
            padding: 0.6vh 0;
            position: relative;
            z-index: 2;
        }
        .btn {
            padding: 0.8vh 1.8vw;
            min-height: 5vh;
            min-width: 8vw;
            font-size: clamp(0.8rem, 1.6vh, 1.2rem);
            font-weight: 500;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.04em;
            touch-action: manipulation;
            background: rgba(255, 255, 255, 0.6);
            color: #3a2e1e;
            border: 1px solid rgba(180, 150, 100, 0.3);
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4vw;
            flex: 0 1 auto;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .btn:active { transform: scale(0.94); }
        .btn-primary {
            background: linear-gradient(135deg, #d4a017, #b8860b);
            color: #fff;
            border-color: #b8860b;
            box-shadow: 0 4px 20px rgba(184, 134, 11, 0.25);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            filter: grayscale(0.5);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-voice {
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.1), rgba(60, 100, 200, 0.05));
            border-color: rgba(60, 100, 200, 0.2);
            color: #3a6bb0;
        }
        .btn-voice.recording {
            animation: pulseMic 1.2s ease-in-out infinite;
            border-color: #c0392b;
            color: #c0392b;
            background: rgba(200, 70, 70, 0.1);
        }
        @keyframes pulseMic {
            0%, 100% { box-shadow: 0 0 10px rgba(192, 57, 43, 0.15); }
            50% { box-shadow: 0 0 30px rgba(192, 57, 43, 0.3), 0 0 60px rgba(192, 57, 43, 0.05); }
        }
        .btn-success {
            background: linear-gradient(135deg, #5cb85c, #449d44);
            color: #fff;
            border-color: #449d44;
            box-shadow: 0 4px 20px rgba(68, 157, 68, 0.25);
        }
        .btn-clear {
            background: rgba(200, 180, 160, 0.2);
            border-color: rgba(180, 150, 100, 0.15);
            color: #6b5a44;
        }
        .btn-clear:active { background: rgba(200, 180, 160, 0.35); }

        #right-panel {
            flex: 0 0 50%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 60% 40%, #faf5ee, #f0ebe3);
            position: relative;
            overflow: hidden;
            padding: 0;
            /* 移除padding让内容填满 */
        }
        /* 移除鸟居图案 */
        #right-panel::before,
        #right-panel::after {
            display: none;
        }

        /* 右側妖怪展示區 - 重新布局 */
        #reveal-area {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            /* 从上到下排列 */
            width: 100%;
            height: 100%;
            z-index: 5;
            position: relative;
            padding: 1vh 2vw 0 2vw;
            /* 上边距稍留空间 */
            animation: revealAppear 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        #reveal-area.show {
            display: flex;
        }
        @keyframes revealAppear {
            0% { opacity: 0; transform: scale(0.6) rotate(-8deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* 现代中文字 - 占上1/8 */
        #modern-char {
            font-size: clamp(3rem, 10vh, 8rem);
            /* 适当缩小，因为空间变小 */
            font-weight: 700;
            color: #b8860b;
            text-shadow: 0 0 60px rgba(184, 134, 11, 0.3), 0 0 120px rgba(184, 134, 11, 0.1);
            letter-spacing: 0.1em;
            line-height: 1.2;
            flex: 0 0 12.5%;
            /* 1/8 */
            display: flex;
            align-items: center;
            justify-content: center;
            animation: charGlow 3s ease-in-out infinite alternate;
            width: 100%;
        }
        @keyframes charGlow {
            0% { text-shadow: 0 0 60px rgba(184, 134, 11, 0.2), 0 0 120px rgba(184, 134, 11, 0.05); }
            100% { text-shadow: 0 0 80px rgba(184, 134, 11, 0.4), 0 0 180px rgba(184, 134, 11, 0.15); }
        }

        /* 妖怪图片 - 占下7/8 */
        #animal-image {
            flex: 0 0 87.5%;
            /* 7/8 */
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            /* 保持比例填满 */
            mix-blend-mode: multiply;
            /* 尝试去除白色背景 */
            background: transparent;
            filter: drop-shadow(0 0 30px rgba(184, 134, 11, 0.1));
            animation: floatAnimal 3.5s ease-in-out infinite;
        }
        @keyframes floatAnimal {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* 佔位區（未現形）保持居中 */
        #placeholder-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            color: rgba(180, 150, 100, 0.2);
            font-size: clamp(1rem, 2vh, 1.6rem);
            letter-spacing: 0.2em;
            text-align: center;
            padding: 2vh;
            width: 100%;
            height: 100%;
        }
        #placeholder-area .symbol {
            font-size: clamp(4rem, 10vh, 8rem);
            opacity: 0.2;
            margin-bottom: 1vh;
            animation: spinArray 30s linear infinite;
        }
        @keyframes spinArray {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
            color: #b8860b;
            font-size: clamp(1rem, 2vh, 1.6rem);
            letter-spacing: 0.1em;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-overlay .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(184, 134, 11, 0.1);
            border-top: 3px solid #b8860b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2vh;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">🔮 召喚甲骨文靈力 ...</div>
    </div>

    <div id="app">
        <div id="left-panel">
            <div id="status-area">
                <div id="status-text">✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span></div>
                <div id="pinyin-display"></div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="oracleCanvas"></canvas>
            </div>
            <div id="controls">
                <button class="btn btn-clear" id="btnClear">🗑 清除</button>
                <button class="btn btn-primary" id="btnVerify">⚡ 驗證符文</button>
                <button class="btn btn-voice" id="btnVoice" disabled>🎙️ 唸咒</button>
                <button class="btn btn-success" id="btnNext" style="display:none;">🔮 尋找下個妖怪</button>
            </div>
        </div>

        <div id="right-panel">
            <div id="placeholder-area">
                <div class="symbol">⛩️</div>
                <div>等待符文之力</div>
                <div style="font-size:0.7em; opacity:0.5; margin-top:0.5vh;">描繪甲骨文 · 誦唸咒語</div>
            </div>
            <div id="reveal-area">
                <div id="modern-char">羊</div>
                <img id="animal-image" src="" alt="妖怪">
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 1. 配置 ==========
            const XF_CONFIG = {
                APPID: '2600b137',
                API_KEY: '8b012124ed213c06974cd469f29e134b',
                API_SECRET: 'MWNkZTQ1ZTEzOTM0NTVjZThjOTQxNjZj',
                WSS_URL: 'wss://iat-api.xfyun.cn/v2/iat',
            };
            const AUDIO_CONFIG = { sampleRate: 16000, bitDepth: 16, channels: 1, frameDuration: 40, maxRecordSeconds: 8 };
            const THRESHOLDS = { drawPass: 45 };
            const MIN_RECORD_DURATION = 1000;

            // ========== 2. 字庫 ==========
            const CHARACTERS = [{
                id: 'yang',
                char: '羊',
                pinyinRaw: 'yang2',
                pinyinTone: 'yáng',
                imgSrc: 'images/羊_1.png',
                animalImg: 'images/羊.png',
                img: null,
            }, {
                id: 'ma',
                char: '馬',
                pinyinRaw: 'ma3',
                pinyinTone: 'mǎ',
                imgSrc: 'images/馬_1.png',
                animalImg: 'images/馬.png',
                img: null,
            }, {
                id: 'niu',
                char: '牛',
                pinyinRaw: 'niu2',
                pinyinTone: 'niú',
                imgSrc: 'images/牛_1.png',
                animalImg: 'images/牛.png',
                img: null,
            }, {
                id: 'niao',
                char: '鳥',
                pinyinRaw: 'niao3',
                pinyinTone: 'niǎo',
                imgSrc: 'images/鳥_1.png',
                animalImg: 'images/鳥.png',
                img: null,
            }, {
                id: 'yu',
                char: '魚',
                pinyinRaw: 'yu2',
                pinyinTone: 'yú',
                imgSrc: 'images/魚_1.png',
                animalImg: 'images/魚.png',
                img: null,
            }];

            // ========== 3. 同音字映射 ==========
            function buildFullPinyinMap() {
                const map = {};
                const homophoneGroups = {
                    'yang2': ['羊', '阳', '杨', '扬', '洋', '佯', '疡', '徉', '炀', '烊', '旸', '飏', '蛘', '阚', '陽', '楊', '揚', '洋',
                        '暘'
                    ],
                    'ma3': ['马', '码', '玛', '蚂', '杩', '砝', '犸', '唛', '遤', '馬', '碼', '瑪', '螞'],
                    'niu2': ['牛', '妞', '扭', '纽', '钮', '拗', '忸', '沤', '紐', '鈕'],
                    'niao3': ['鸟', '袅', '嬲', '茑', '鳥', '裊'],
                    'yu2': ['鱼', '渔', '余', '于', '娱', '愚', '隅', '俞', '逾', '渝', '瑜', '萸', '榆', '虞', '舆', '玙', '魚', '漁',
                        '餘', '於', '娛', '愚', '隅', '俞', '逾', '渝', '瑜', '榆', '虞', '輿'
                    ]
                };
                CHARACTERS.forEach(item => {
                    const pinyin = item.pinyinRaw;
                    const group = homophoneGroups[pinyin] || [];
                    group.forEach(char => {
                        map[char] = pinyin;
                    });
                    map[item.char] = pinyin;
                });
                return map;
            }

            const pinyinMap = buildFullPinyinMap();

            // ========== 4. 狀態 ==========
            const state = {
                currentChar: null,
                phase: 'draw',
                canvasLocked: false,
                isRecording: false,
                isVerifying: false,
                drawScore: 0,
                audioContext: null,
                audioWorkletNode: null,
                mediaStream: null,
                audioBuffer: [],
                recordTimer: null,
                wsConnection: null,
                wsReady: false,
                wsConnectPromise: null,
                usedCharIds: [],
                recordStartTime: 0,
                minDurationTimer: null,
                isFinalizing: false,
                flushResolve: null,
                isFlushing: false,
                recognizedText: '',
                audioPrepared: false,
                preparingAudio: false,
            };

            // ========== 5. DOM ==========
            const $ = id => document.getElementById(id);
            const canvas = $('oracleCanvas');
            const ctx = canvas.getContext('2d');
            const statusText = $('status-text');
            const pinyinDisplay = $('pinyin-display');
            const btnClear = $('btnClear');
            const btnVerify = $('btnVerify');
            const btnVoice = $('btnVoice');
            const btnNext = $('btnNext');
            const revealArea = $('reveal-area');
            const placeholderArea = $('placeholder-area');
            const modernChar = $('modern-char');
            const animalImage = $('animal-image');
            const loadingOverlay = $('loading-overlay');
            const loadingText = $('loading-text');

            // ========== 6. Canvas ==========
            let canvasW, canvasH;
            let isDrawing = false;
            let drawHistory = [];

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvasW = rect.width;
                canvasH = rect.height;
                canvas.width = canvasW * dpr;
                canvas.height = canvasH * dpr;
                canvas.style.width = canvasW + 'px';
                canvas.style.height = canvasH + 'px';
                ctx.scale(dpr, dpr);
                ctx.lineWidth = Math.max(3, canvasW * 0.02);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#5a4a3a';
                ctx.shadowColor = 'rgba(100,80,60,0.1)';
                ctx.shadowBlur = 8;
                renderOracle();
            }

            function renderOracle() {
                ctx.clearRect(0, 0, canvasW, canvasH);
                const char = state.currentChar;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.25;
                    ctx.drawImage(char.img, 0, 0, canvasW, canvasH);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#ddd';
                    ctx.font = '18px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('字形載入中...', canvasW / 2, canvasH / 2);
                }
                if (drawHistory.length > 0) {
                    ctx.save();
                    if (state.canvasLocked && state.phase === 'voice') {
                        ctx.strokeStyle = '#ffd700';
                        ctx.shadowColor = 'rgba(255,215,0,0.4)';
                        ctx.shadowBlur = 20;
                    } else {
                        ctx.strokeStyle = '#5a4a3a';
                        ctx.shadowColor = 'rgba(100,80,60,0.15)';
                        ctx.shadowBlur = 10;
                    }
                    ctx.lineWidth = Math.max(3, canvasW * 0.02);
                    ctx.globalAlpha = 0.85;
                    for (const path of drawHistory) {
                        if (path.length < 2) continue;
                        ctx.beginPath();
                        ctx.moveTo(path[0].x, path[0].y);
                        for (let i = 1; i < path.length; i++) {
                            ctx.lineTo(path[i].x, path[i].y);
                        }
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
            }

            function startDraw(e) {
                if (state.canvasLocked || state.phase === 'reveal') return;
                e.preventDefault();
                isDrawing = true;
                const pos = getPos(e);
                drawHistory.push([{ x: pos.x, y: pos.y }]);
            }

            function moveDraw(e) {
                if (!isDrawing || state.canvasLocked) return;
                e.preventDefault();
                const pos = getPos(e);
                const currentPath = drawHistory[drawHistory.length - 1];
                if (currentPath) {
                    const last = currentPath[currentPath.length - 1];
                    if (last && Math.hypot(pos.x - last.x, pos.y - last.y) < 2) return;
                    currentPath.push({ x: pos.x, y: pos.y });
                }
                renderOracle();
            }

            function endDraw(e) {
                if (isDrawing) {
                    isDrawing = false;
                    const lastPath = drawHistory[drawHistory.length - 1];
                    if (lastPath && lastPath.length < 3) {
                        drawHistory.pop();
                        renderOracle();
                    }
                }
            }

            function bindCanvasEvents() {
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', moveDraw, { passive: false });
                canvas.addEventListener('touchend', endDraw, { passive: false });
                canvas.addEventListener('touchcancel', endDraw, { passive: false });
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', moveDraw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
            }

            // ========== 7. 像素比對 ==========
            function computeF1Score() {
                const dpr = window.devicePixelRatio || 1;
                const w = Math.floor(canvasW * dpr);
                const h = Math.floor(canvasH * dpr);

                const off1 = document.createElement('canvas');
                off1.width = w;
                off1.height = h;
                const ctx1 = off1.getContext('2d');
                const char = state.currentChar;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx1.drawImage(char.img, 0, 0, w, h);
                }

                const off2 = document.createElement('canvas');
                off2.width = w;
                off2.height = h;
                const ctx2 = off2.getContext('2d');
                ctx2.strokeStyle = '#ffffff';
                ctx2.lineWidth = Math.max(3, canvasW * 0.02) * dpr;
                ctx2.lineCap = 'round';
                ctx2.lineJoin = 'round';
                for (const path of drawHistory) {
                    if (path.length < 2) continue;
                    ctx2.beginPath();
                    const scaleX = w / canvasW;
                    const scaleY = h / canvasH;
                    ctx2.moveTo(path[0].x * scaleX, path[0].y * scaleY);
                    for (let i = 1; i < path.length; i++) {
                        ctx2.lineTo(path[i].x * scaleX, path[i].y * scaleY);
                    }
                    ctx2.stroke();
                }

                const data1 = ctx1.getImageData(0, 0, w, h).data;
                const data2 = ctx2.getImageData(0, 0, w, h).data;

                const step = 2;
                let tp = 0,
                    fp = 0,
                    fn = 0;
                const threshold = 30;

                for (let i = 0; i < data1.length; i += 4 * step) {
                    const idx = i / 4;
                    const x = (idx % w);
                    const y = Math.floor(idx / w);
                    if (x % step !== 0 || y % step !== 0) continue;

                    const lum1 = 0.299 * data1[i] + 0.587 * data1[i + 1] + 0.114 * data1[i + 2];
                    const lum2 = 0.299 * data2[i] + 0.587 * data2[i + 1] + 0.114 * data2[i + 2];

                    const isFore1 = lum1 < threshold;
                    const isFore2 = lum2 > threshold;

                    if (isFore1 && isFore2) tp++;
                    else if (!isFore1 && isFore2) fp++;
                    else if (isFore1 && !isFore2) fn++;
                }

                if (tp === 0) return 0;
                const precision = tp / (tp + fp);
                const recall = tp / (tp + fn);
                const f1 = 2 * precision * recall / (precision + recall);
                return Math.round(f1 * 100);
            }

            // ========== 8. 音頻相關 ==========
            const workletCode = `
          class PCMProcessor extends AudioWorkletProcessor {
            constructor() {
              super();
              this.buffer = [];
              this.chunkSize = 640;
              this.running = true;
              this.port.onmessage = (e) => {
                if (e.data.type === 'flush') {
                  this.flushBuffer();
                }
              };
            }
            flushBuffer() {
              if (this.buffer.length === 0) {
                this.port.postMessage({ type: 'flushed' });
                return;
              }
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              const merged = new Float32Array(totalLen);
              let offset = 0;
              for (const chunk of this.buffer) {
                merged.set(chunk, offset);
                offset += chunk.length;
              }
              this.buffer = [];
              const pcm = new Int16Array(merged.length);
              for (let i = 0; i < merged.length; i++) {
                let s = merged[i];
                s = Math.max(-1, Math.min(1, s));
                pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
              }
              this.port.postMessage({ type: 'audio', buffer: pcm.buffer, isFlush: true }, [pcm.buffer]);
              this.port.postMessage({ type: 'flushed' });
            }
            process(inputs, outputs, parameters) {
              if (!this.running) return false;
              const input = inputs[0];
              if (!input || input.length === 0) return true;
              const channelData = input[0];
              if (!channelData) return true;
              this.buffer.push(new Float32Array(channelData));
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              if (totalLen >= this.chunkSize) {
                const merged = new Float32Array(totalLen);
                let offset = 0;
                for (const chunk of this.buffer) {
                  merged.set(chunk, offset);
                  offset += chunk.length;
                }
                this.buffer = [];
                const sendData = merged.slice(0, this.chunkSize);
                if (merged.length > this.chunkSize) {
                  const remaining = merged.slice(this.chunkSize);
                  this.buffer.push(remaining);
                }
                const pcm = new Int16Array(sendData.length);
                for (let i = 0; i < sendData.length; i++) {
                  let s = sendData[i];
                  s = Math.max(-1, Math.min(1, s));
                  pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                this.port.postMessage({ type: 'audio', buffer: pcm.buffer, isFlush: false }, [pcm.buffer]);
              }
              return true;
            }
          }
          registerProcessor('pcm-processor', PCMProcessor);
        `;
            let workletBlobURL = null;

            function initWorklet() {
                if (!workletBlobURL) {
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    workletBlobURL = URL.createObjectURL(blob);
                }
                return workletBlobURL;
            }

            let audioContext = null,
                audioWorkletNode = null,
                mediaStream = null;
            let isRecording = false;
            let recordTimer = null;
            let sourceNode = null;

            async function prepareAudio() {
                if (state.audioPrepared) return;
                if (state.preparingAudio) return;
                state.preparingAudio = true;
                console.log('[準備] 開始預初始化音頻...');

                try {
                    if (!audioContext) {
                        audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: AUDIO_CONFIG
                                .sampleRate });
                        await audioContext.resume();
                    }
                    if (!mediaStream) {
                        mediaStream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                sampleRate: AUDIO_CONFIG.sampleRate,
                            },
                            video: false,
                        });
                        console.log('[準備] 麥克風權限已獲得');
                    }
                    if (!audioWorkletNode) {
                        await audioContext.audioWorklet.addModule(initWorklet());
                        sourceNode = audioContext.createMediaStreamSource(mediaStream);
                        audioWorkletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                        audioWorkletNode.port.onmessage = (e) => {
                            if (e.data.type === 'audio' && state.isRecording && state.wsReady) {
                                const buffer = e.data.buffer;
                                const bytes = new Uint8Array(buffer);
                                let binary = '';
                                for (let i = 0; i < bytes.length; i++) {
                                    binary += String.fromCharCode(bytes[i]);
                                }
                                const b64 = btoa(binary);
                                sendAudioChunk(b64, e.data.isFlush || false);
                            }
                            if (e.data.type === 'flushed') {
                                console.log('[Worklet] flush 完成');
                                if (state.flushResolve) {
                                    state.flushResolve();
                                    state.flushResolve = null;
                                }
                            }
                        };
                        sourceNode.connect(audioWorkletNode);
                        audioWorkletNode.connect(audioContext.destination);
                        console.log('[準備] AudioWorkletNode 創建成功');
                    }
                    state.audioPrepared = true;
                    console.log('[準備] 音頻預初始化完成');
                } catch (e) {
                    console.warn('[準備] 音頻預初始化失敗:', e);
                } finally {
                    state.preparingAudio = false;
                }
            }

            function sendAudioChunk(b64Data, isFlush = false) {
                if (!state.wsReady || !state.wsConnection) {
                    console.warn('WebSocket未就緒，丟棄音頻幀');
                    return;
                }
                const payload = {
                    data: {
                        status: 1,
                        format: 'audio/L16;rate=16000',
                        encoding: 'raw',
                        audio: b64Data
                    }
                };
                state.audioBuffer.push(b64Data);
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                    console.log(`[WS] 發送音頻幀, 大小=${b64Data.length}${isFlush ? ' (flush)' : ''}`);
                } catch (e) {
                    console.error('發送音訊幀失敗:', e);
                }
            }

            function sendAudioEnd() {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = { data: { status: 2 } };
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                    console.log('[WS] 發送尾幀 status=2');
                } catch (e) {
                    console.error('發送尾幀失敗:', e);
                }
            }

            async function startRecording() {
                if (isRecording) return;
                if (state.phase !== 'voice') {
                    setStatus('⚠️ 請先通過符文驗證再唸咒', true);
                    return;
                }

                if (!state.audioPrepared) {
                    await prepareAudio();
                }
                if (!state.wsReady) {
                    console.log('[WS] 等待 WebSocket 就緒...');
                    if (state.wsConnectPromise) {
                        await state.wsConnectPromise;
                    } else {
                        await connectWebSocket();
                    }
                    console.log('[WS] 就緒');
                }

                if (audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                if (!audioWorkletNode) {
                    await prepareAudio();
                }

                isRecording = true;
                state.isRecording = true;
                state.recordStartTime = Date.now();
                btnVoice.textContent = '⏹️ 停止錄音';
                btnVoice.classList.add('recording');
                btnVoice.disabled = false;
                setStatus('🎤 請朗讀咒語（語音識別自動比對）', false);
                if (recordTimer) clearTimeout(recordTimer);
                recordTimer = setTimeout(() => {
                    if (isRecording) stopRecording(true);
                }, AUDIO_CONFIG.maxRecordSeconds * 1000);
            }

            function stopRecording(auto = false) {
                if (!isRecording) return;
                if (state.isFinalizing) return;

                const elapsed = Date.now() - state.recordStartTime;
                const remaining = MIN_RECORD_DURATION - elapsed;

                state.isFinalizing = true;
                btnVoice.disabled = true;
                btnVoice.textContent = '⏳ 處理中...';
                btnVoice.classList.remove('recording');
                setStatus('⏳ 語音識別中，請等候 ...', false);

                if (remaining > 0) {
                    console.log(`[錄音] 時長 ${elapsed}ms，不足 ${MIN_RECORD_DURATION}ms，延遲 ${remaining}ms 後停止`);
                    if (state.minDurationTimer) clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = setTimeout(() => {
                        state.minDurationTimer = null;
                        finalizeStop();
                    }, remaining);
                } else {
                    finalizeStop();
                }
            }

            function finalizeStop() {
                if (state.isFlushing) return;
                state.isFlushing = true;

                if (sourceNode) {
                    try {
                        sourceNode.disconnect();
                        sourceNode = null;
                        console.log('[錄音] sourceNode 已斷開');
                    } catch (e) {}
                }
                if (recordTimer) { clearTimeout(recordTimer);
                    recordTimer = null; }
                if (state.minDurationTimer) { clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = null; }

                if (audioWorkletNode) {
                    console.log('[Worklet] 發送 flush 指令');
                    audioWorkletNode.port.postMessage({ type: 'flush' });
                    const flushPromise = new Promise((resolve) => {
                        state.flushResolve = resolve;
                        setTimeout(() => {
                            if (state.flushResolve) {
                                console.warn('[Worklet] flush 超時，強制繼續');
                                state.flushResolve();
                                state.flushResolve = null;
                            }
                        }, 300);
                    });
                    flushPromise.then(() => {
                        if (state.wsReady) {
                            sendAudioEnd();
                        } else {
                            console.warn('WS未就緒，無法發送尾幀');
                        }
                        if (audioWorkletNode) {
                            try {
                                audioWorkletNode.disconnect();
                                audioWorkletNode = null;
                            } catch (e) {}
                        }
                        isRecording = false;
                        state.isRecording = false;
                        state.isFinalizing = false;
                        state.isFlushing = false;
                        resetVoiceUI();
                        setStatus('⏳ 等待識別結果 ...', false);
                        console.log('[錄音] 已停止，等待服務器響應');
                    });
                } else {
                    if (state.wsReady) {
                        sendAudioEnd();
                    }
                    isRecording = false;
                    state.isRecording = false;
                    state.isFinalizing = false;
                    state.isFlushing = false;
                    resetVoiceUI();
                    setStatus('⏳ 等待識別結果 ...', false);
                }
            }

            function resetVoiceUI() {
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnVoice.disabled = (state.phase !== 'voice');
                if (state.minDurationTimer) {
                    clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = null;
                }
                state.isFinalizing = false;
                state.isFlushing = false;
            }

            // ---------- WebSocket ----------
            function preConnectWebSocket() {
                if (state.wsReady) {
                    console.log('[WS] 已就緒');
                    return Promise.resolve();
                }
                if (state.wsConnectPromise) {
                    console.log('[WS] 等待已有連接');
                    return state.wsConnectPromise;
                }
                console.log('[WS] 開始預連接...');
                state.wsConnectPromise = connectWebSocket().then(() => {
                    console.log('[WS] 預連接完成');
                }).catch((e) => {
                    console.warn('[WS] 預連接失敗:', e);
                    state.wsConnectPromise = null;
                });
                return state.wsConnectPromise;
            }

            async function connectWebSocket() {
                if (state.wsReady) return;
                if (state.wsConnection && state.wsConnection.readyState === WebSocket.CONNECTING) {
                    return new Promise((resolve) => {
                        const check = setInterval(() => {
                            if (state.wsReady) {
                                clearInterval(check);
                                resolve();
                            }
                        }, 100);
                    });
                }
                if (state.wsConnection) {
                    try { state.wsConnection.close(); } catch (e) {}
                    state.wsConnection = null;
                }
                try {
                    const url = buildWSSUrl();
                    state.wsConnection = new WebSocket(url);
                    state.wsConnection.binaryType = 'blob';
                    return new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error('WSS 連線超時'));
                        }, 10000);
                        state.wsConnection.onopen = () => {
                            clearTimeout(timeout);
                            state.wsReady = true;
                            console.log('[WS] 連線成功');
                            sendInitFrame();
                            resolve();
                        };
                        state.wsConnection.onerror = (err) => {
                            clearTimeout(timeout);
                            console.error('[WS] 錯誤:', err);
                            reject(err);
                        };
                        state.wsConnection.onmessage = (e) => {
                            console.log('[WS] 收到訊息');
                            handleWSMessage(e.data);
                        };
                        state.wsConnection.onclose = (e) => {
                            state.wsReady = false;
                            console.log(`[WS] 連線關閉，代碼=${e.code}`);
                        };
                    });
                } catch (e) {
                    console.error('[WS] 連線失敗:', e);
                    setStatus('⚠️ 語音服務連線失敗，請檢查網路', true);
                    throw e;
                }
            }

            function buildWSSUrl() {
                const { APPID, API_KEY, API_SECRET, WSS_URL } = XF_CONFIG;
                const host = new URL(WSS_URL).host;
                const date = new Date().toUTCString();
                const signatureOrigin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
                const sha = CryptoJS.HmacSHA256(signatureOrigin, API_SECRET);
                const signature = CryptoJS.enc.Base64.stringify(sha);
                const authOrigin = `api_key="${API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const auth = btoa(authOrigin);
                return `${WSS_URL}?authorization=${auth}&date=${encodeURIComponent(date)}&host=${host}`;
            }

            function sendInitFrame() {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = {
                    common: { app_id: XF_CONFIG.APPID },
                    business: {
                        language: 'zh_cn',
                        domain: 'iat',
                        accent: 'mandarin',
                        rlang: 'zh-cn',
                        ptt: 1,
                    },
                    data: { status: 0 }
                };
                state.wsConnection.send(JSON.stringify(payload));
            }

            function handleWSMessage(data) {
                try {
                    let text;
                    if (data instanceof Blob) {
                        const reader = new FileReader();
                        reader.onload = () => {
                            const result = reader.result;
                            parseWSResult(result);
                        };
                        reader.readAsText(data);
                    } else {
                        parseWSResult(data);
                    }
                } catch (e) {
                    console.error('[WS] 處理訊息異常:', e);
                }
            }

            function parseWSResult(text) {
                try {
                    const json = JSON.parse(text);
                    if (json.code && json.code !== 0) {
                        console.warn('[WS] 訊飛 API 錯誤:', json.message);
                        setStatus('⚠️ 語音識別錯誤: ' + (json.message || '未知錯誤'), true);
                        return;
                    }
                    let recognized = '';
                    if (json.data && json.data.result && json.data.result.ws) {
                        const ws = json.data.result.ws;
                        for (let i = 0; i < ws.length; i++) {
                            const cw = ws[i].cw;
                            if (cw && cw.length > 0) {
                                recognized += cw[0].w;
                            }
                        }
                        recognized = recognized.replace(/[\s，。、！？；：,.!?;:]/g, '');
                        state.recognizedText = recognized;
                        if (json.data.status === 2 || json.data.result.ls === true) {
                            handleRecognitionResult(recognized);
                        }
                    }
                } catch (e) {
                    console.error('[WS] 解析結果失敗:', e);
                }
            }

            // ========== 9. 同音字比對 ==========
            function handleRecognitionResult(recognized) {
                const targetChar = state.currentChar.char;
                const targetPinyin = pinyinMap[targetChar] || state.currentChar.pinyinRaw;
                const recognizedPinyin = pinyinMap[recognized] || null;
                const isMatch = recognizedPinyin && recognizedPinyin === targetPinyin;

                if (isMatch) {
                    setStatus('🎉 咒語正確！妖怪現形！', false);
                    revealMonster();
                } else {
                    setStatus(`😤 咒語比對失敗，請再試一次！`, true);
                    state.phase = 'voice';
                    btnVoice.disabled = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    closeWS();
                }
            }

            // ========== 10. 妖怪現形 ==========
            function revealMonster() {
                state.phase = 'reveal';
                const char = state.currentChar;
                if (!char) return;
                modernChar.textContent = char.char;
                if (char.animalImg) {
                    animalImage.src = char.animalImg;
                    animalImage.style.display = 'block';
                }
                revealArea.classList.add('show');
                revealArea.style.display = 'flex';
                placeholderArea.style.display = 'none';
                setStatus(`✨ ${char.char} 已現形！ 繼續伏妖之旅？`, false);
                btnVoice.style.display = 'none';
                btnNext.style.display = 'inline-flex';
                btnVerify.disabled = true;
                btnClear.disabled = true;
                state.canvasLocked = true;
                closeWS();
                renderOracle();
            }

            // ========== 11. 流程控制 ==========
            function resetForNewChar() {
                closeWS();
                state.wsConnectPromise = null;
                isRecording = false;
                state.isRecording = false;
                state.audioBuffer = [];
                state.drawScore = 0;
                state.canvasLocked = false;
                state.phase = 'draw';
                state.wsReady = false;
                state.recognizedText = '';
                if (recordTimer) { clearTimeout(recordTimer);
                    recordTimer = null; }
                if (state.minDurationTimer) { clearTimeout(state.minDurationTimer);
                    state.minDurationTimer = null; }
                if (audioWorkletNode) {
                    try { audioWorkletNode.disconnect(); } catch (e) {}
                    audioWorkletNode = null;
                }
                if (sourceNode) {
                    try { sourceNode.disconnect(); } catch (e) {}
                    sourceNode = null;
                }
                state.isFinalizing = false;
                state.isFlushing = false;
                drawHistory = [];
                renderOracle();
                revealArea.classList.remove('show');
                revealArea.style.display = 'none';
                placeholderArea.style.display = 'flex';
                animalImage.style.display = 'none';
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                btnNext.style.display = 'none';
                btnVerify.disabled = false;
                btnClear.disabled = false;
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                state.audioPrepared = false;
            }

            function pickRandomChar() {
                const total = CHARACTERS.length;
                if (state.usedCharIds.length >= total) {
                    state.usedCharIds = [];
                }
                const available = CHARACTERS.filter(c => !state.usedCharIds.includes(c.id));
                if (available.length === 0) {
                    state.usedCharIds = [];
                    return CHARACTERS[Math.floor(Math.random() * total)];
                }
                const picked = available[Math.floor(Math.random() * available.length)];
                state.usedCharIds.push(picked.id);
                return picked;
            }

            function initLevel() {
                resetForNewChar();
                state.currentChar = pickRandomChar();
                renderOracle();
                setStatus(`✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span>`, false);
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
            }

            function handleVerify() {
                if (state.isVerifying || state.phase === 'reveal') return;
                if (state.canvasLocked) { setStatus('⚠️ 符文已驗證通過，請進行唸咒', true); return; }
                if (drawHistory.length === 0 || drawHistory.every(p => p.length < 3)) {
                    setStatus('⚠️ 請先在畫布上描寫甲骨文', true);
                    return;
                }
                state.isVerifying = true;
                btnVerify.disabled = true;
                setStatus('🔍 比對符文靈力 ...', false);
                setTimeout(() => {
                    const score = computeF1Score();
                    state.drawScore = score;
                    state.isVerifying = false;
                    btnVerify.disabled = false;
                    if (score >= THRESHOLDS.drawPass) {
                        state.canvasLocked = true;
                        state.phase = 'voice';
                        setStatus(`✅ 符文契合度合格！咒語已解鎖`, false);
                        pinyinDisplay.textContent = state.currentChar.pinyinTone;
                        pinyinDisplay.style.display = 'block';
                        setTimeout(() => pinyinDisplay.classList.add('show'), 50);
                        btnVoice.disabled = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        setStatus(`🗣️ 請唸出咒語（語音識別自動比對）`, false);
                        renderOracle();
                        prepareAudio();
                        preConnectWebSocket();
                    } else {
                        setStatus(`❌ 符文契合度不足，再努力描寫！`, true);
                    }
                }, 500);
            }

            function handleClear() {
                if (state.canvasLocked || state.phase === 'reveal') return;
                drawHistory = [];
                renderOracle();
                setStatus('✍️ 已清除，重新描寫', false);
            }

            function handleNext() { initLevel(); }

            function handleVoiceToggle() {
                if (state.phase !== 'voice') { setStatus('⚠️ 請先通過符文驗證', true); return; }
                if (isRecording) stopRecording(false);
                else startRecording();
            }

            function setStatus(html, isError = false) {
                statusText.innerHTML = html;
                statusText.style.color = isError ? '#a94442' : '#3a2e1e';
            }

            function closeWS() {
                if (state.wsConnection) {
                    try { state.wsConnection.close(); } catch (e) {}
                    state.wsConnection = null;
                }
                state.wsReady = false;
                state.wsConnectPromise = null;
            }

            // ========== 12. 圖片加載 ==========
            function loadImages() {
                const promises = CHARACTERS.map(char => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            char.img = img;
                            console.log(`✅ 底圖載入成功: ${char.imgSrc}`);
                            resolve();
                        };
                        img.onerror = () => {
                            console.warn(`⚠️ 底圖載入失敗: ${char.imgSrc}，使用佔位圖`);
                            const fallbackCanvas = document.createElement('canvas');
                            fallbackCanvas.width = 200;
                            fallbackCanvas.height = 200;
                            const fctx = fallbackCanvas.getContext('2d');
                            fctx.fillStyle = '#ffffff';
                            fctx.fillRect(0, 0, 200, 200);
                            fctx.strokeStyle = '#000000';
                            fctx.lineWidth = 4;
                            fctx.font = '60px sans-serif';
                            fctx.textAlign = 'center';
                            fctx.textBaseline = 'middle';
                            fctx.fillStyle = '#000';
                            fctx.fillText(char.char, 100, 100);
                            const imgData = fallbackCanvas.toDataURL();
                            const fallbackImg = new Image();
                            fallbackImg.onload = () => {
                                char.img = fallbackImg;
                                resolve();
                            };
                            fallbackImg.src = imgData;
                        };
                        img.src = char.imgSrc;
                    });
                });
                return Promise.all(promises);
            }

            // ========== 13. 初始化 ==========
            async function init() {
                loadingText.textContent = '📜 載入甲骨文字形圖片 ...';
                await loadImages();
                loadingText.textContent = '🔮 靈力凝聚中 ...';

                resizeCanvas();
                bindCanvasEvents();
                btnClear.addEventListener('click', handleClear);
                btnVerify.addEventListener('click', handleVerify);
                btnVoice.addEventListener('click', handleVoiceToggle);
                btnNext.addEventListener('click', handleNext);
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(resizeCanvas, 200);
                });
                initLevel();
                setTimeout(() => loadingOverlay.classList.add('hidden'), 600);
                document.addEventListener('touchstart', () => {
                    if (audioContext && audioContext.state === 'suspended') audioContext.resume().catch(() => {});
                }, { passive: true });
                console.log('🔮 《甲骨文伏妖錄》已啟動');
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
</html>
