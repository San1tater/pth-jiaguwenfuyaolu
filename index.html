<!DOCTYPE html>

<head>

    <style>

        * {

            -webkit-tap-highlight-color: transparent;

        #left-panel::before {

            }

        /* ===== 提示資訊區 ===== */
        #status-area {

            flex-direction: column;

            justify-content: center;

        #status-text {

            font-size: clamp(1.6rem, 3.2vh, 2.8rem);

            letter-spacing: 0.1em;

        }

        #pinyin-display.show {
            display: block;
            animation: pinyinPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes pinyinPop {
            0% {
                opacity: 0;
                transform: scale(0.6) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }

        /* ===== 畫布區 ===== */
        #canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 215, 100, 0.06), inset 0 0 80px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 100, 0.10);
            background: #0d0b14;
            z-index: 2;
            touch-action: none;
        }

        #canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: pointer;
        }

        /* 畫布上層裝飾 */
        #canvas-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(0, 0, 0, 0.3) 100%);
            border-radius: 20px;
            z-index: 1;
        }

        /* ===== 控制按鈕區 ===== */
        #controls {

            align-items: center;
            justify-content: center;

            transition: all 0.25s ease;
            letter-spacing: 0.04em;
            touch-action: manipulation;

            color: #c8bda0;
            border: 1px solid rgba(255, 215, 100, 0.15);

            left: 10%;

            }

        @keyframes revealAppear {

                font-weight: 300;
                text-align: center;
                padding: 10vw;
                line-height: 1.8;
            }
        }

        /* ===== 載入動畫 ===== */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
            color: #ffd764;
            font-size: clamp(1rem, 2vh, 1.6rem);

        }

            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 215, 100, 0.08);
            border-top: 3px solid #ffd764;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2vh;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 清除按鈕特殊樣式 */
        .btn-clear {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.06);
            color: #887e6a;
        }
        .btn-clear:active {
            background: rgba(255, 255, 255, 0.08);
        }

        /* 小工具：狀態指示燈 */
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .dot.green {
            background: #5ddb7a;
            box-shadow: 0 0 20px rgba(93, 219, 122, 0.3);
        }
        .dot.yellow {
            background: #f5b042;
            box-shadow: 0 0 20px rgba(245, 176, 66, 0.2);
        }
        .dot.red {
            background: #ff5a5a;
            box-shadow: 0 0 20px rgba(255, 70, 70, 0.2);
        }
        .dot.gray {
            background: #444;
        }
    </style>
</head>

    <script>
        // ================================================================

                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - s * 0.5);

                    ctx.stroke();
                    for (let side = -1; side <= 1; side += 2) {
                        for (let leg = -1; leg <= 1; leg += 2) {
                            ctx.beginPath();
                            ctx.moveTo(cx + side * s * 0.2 + leg * s * 0.15, cy + s * 0.7);

            }, {
                id: 'ma',

                            0.08);
                        ctx.stroke();
                    }
                    ctx.beginPath();
                    ctx.ellipse(cx + s * 0.1, cy + s * 0.2, s * 0.5, s * 0.4, 0.1, 0, Math.PI * 2);
                    ctx.stroke();
                    for (let side = -1; side <= 1; side += 2) {

            // ============================================================
            //  3. 狀態管理
            // ============================================================

            const state = {
                currentChar: null,
                phase: 'draw',
                canvasLocked: false,
                isRecording: false,
                isVerifying: false,
                isVoiceProcessing: false,
                drawScore: 0,
                voiceScore: 0,
                audioContext: null,
                audioWorkletNode: null,
                mediaStream: null,
                audioBuffer: [],
                recordStartTime: 0,
                recordTimer: null,
                wsConnection: null,
                wsReady: false,
                isSimulateMode: false, // 因已嵌入憑證，保持 false
            };

            // ============================================================
            //  4. DOM 引用
            // ============================================================

            const $ = (id) => document.getElementById(id);
            const canvas = $('oracleCanvas');
            const ctx = canvas.getContext('2d');
            const statusText = $('status-text');
            const pinyinDisplay = $('pinyin-display');
            const btnClear = $('btnClear');
            const btnVerify = $('btnVerify');
            const btnVoice = $('btnVoice');
            const btnNext = $('btnNext');
            const revealArea = $('reveal-area');
            const placeholderArea = $('placeholder-area');
            const modernChar = $('modern-char');
            const animalEmoji = $('animal-emoji');
            const scoreBadge = $('score-badge');
            const loadingOverlay = $('loading-overlay');

            // ============================================================
            //  5. Canvas 尺寸與繪圖 (同前)
            // ============================================================

            let canvasW, canvasH;
            let isDrawing = false;
            let lastX, lastY;
            let drawHistory = [];

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvasW = rect.width;
                canvasH = rect.height;
                canvas.width = canvasW * dpr;
                canvas.height = canvasH * dpr;
                canvas.style.width = canvasW + 'px';
                canvas.style.height = canvasH + 'px';
                ctx.scale(dpr, dpr);
                ctx.lineWidth = Math.max(3, canvasW * 0.02);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#ffd764';
                ctx.shadowColor = 'rgba(255,215,100,0.15)';
                ctx.shadowBlur = 12;
                renderOracle();
            }

            function renderOracle() {
                ctx.clearRect(0, 0, canvasW, canvasH);
                if (state.currentChar) {
                    state.currentChar.drawOracle(ctx, canvasW, canvasH);
                }
                if (drawHistory.length > 0) {
                    ctx.save();
                    ctx.strokeStyle = '#ffd764';
                    ctx.lineWidth = Math.max(3, canvasW * 0.02);
                    ctx.shadowColor = 'rgba(255,215,100,0.2)';
                    ctx.shadowBlur = 15;
                    ctx.globalAlpha = 0.85;
                    for (const path of drawHistory) {
                        if (path.length < 2) continue;
                        ctx.beginPath();
                        ctx.moveTo(path[0].x, path[0].y);
                        for (let i = 1; i < path.length; i++) {
                            ctx.lineTo(path[i].x, path[i].y);
                        }
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return {
                    x: (touch.clientX - rect.left),
                    y: (touch.clientY - rect.top),
                };
            }

            function startDraw(e) {
                if (state.canvasLocked || state.phase === 'reveal') return;
                e.preventDefault();
                isDrawing = true;
                const pos = getPos(e);
                lastX = pos.x;
                lastY = pos.y;
                drawHistory.push([{ x: pos.x, y: pos.y }]);
            }

            function moveDraw(e) {
                if (!isDrawing || state.canvasLocked) return;
                e.preventDefault();
                const pos = getPos(e);
                const currentPath = drawHistory[drawHistory.length - 1];
                if (currentPath) {
                    const last = currentPath[currentPath.length - 1];
                    if (last && Math.hypot(pos.x - last.x, pos.y - last.y) < 2) return;
                    currentPath.push({ x: pos.x, y: pos.y });
                }
                renderOracle();
            }

            function endDraw(e) {
                if (isDrawing) {
                    isDrawing = false;
                    const lastPath = drawHistory[drawHistory.length - 1];
                    if (lastPath && lastPath.length < 3) {
                        drawHistory.pop();
                        renderOracle();
                    }
                }
            }

            function bindCanvasEvents() {
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', moveDraw, { passive: false });
                canvas.addEventListener('touchend', endDraw, { passive: false });
                canvas.addEventListener('touchcancel', endDraw, { passive: false });
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', moveDraw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
            }

            // ============================================================
            //  6. 像素比對 (F1-Score) 同前
            // ============================================================

            function computeF1Score() {
                const dpr = window.devicePixelRatio || 1;
                const w = Math.floor(canvasW * dpr);
                const h = Math.floor(canvasH * dpr);
                const off1 = document.createElement('canvas');
                off1.width = w;
                off1.height = h;
                const ctx1 = off1.getContext('2d');
                ctx1.scale(dpr, dpr);
                if (state.currentChar) {
                    state.currentChar.drawOracle(ctx1, canvasW, canvasH);
                }
                const off2 = document.createElement('canvas');
                off2.width = w;
                off2.height = h;
                const ctx2 = off2.getContext('2d');
                ctx2.scale(dpr, dpr);
                ctx2.strokeStyle = '#fff';
                ctx2.lineWidth = Math.max(3, canvasW * 0.02);
                ctx2.lineCap = 'round';
                ctx2.lineJoin = 'round';
                for (const path of drawHistory) {
                    if (path.length < 2) continue;
                    ctx2.beginPath();
                    ctx2.moveTo(path[0].x, path[0].y);
                    for (let i = 1; i < path.length; i++) {
                        ctx2.lineTo(path[i].x, path[i].y);
                    }
                    ctx2.stroke();
                }
                const data1 = ctx1.getImageData(0, 0, w, h).data;
                const data2 = ctx2.getImageData(0, 0, w, h).data;
                const step = 2;
                let tp = 0,
                    fp = 0,
                    fn = 0;
                const threshold = 30;
                for (let i = 0; i < data1.length; i += 4 * step) {
                    const idx = i / 4;
                    const x = (idx % w);
                    const y = Math.floor(idx / w);
                    if (x % step !== 0 || y % step !== 0) continue;
                    const r1 = data1[i],
                        g1 = data1[i + 1],
                        b1 = data1[i + 2];
                    const r2 = data2[i],
                        g2 = data2[i + 1],
                        b2 = data2[i + 2];
                    const lum1 = 0.299 * r1 + 0.587 * g1 + 0.114 * b1;
                    const lum2 = 0.299 * r2 + 0.587 * g2 + 0.114 * b2;
                    const isFore1 = lum1 > threshold;
                    const isFore2 = lum2 > threshold;
                    if (isFore1 && isFore2) tp++;
                    else if (!isFore1 && isFore2) fp++;
                    else if (isFore1 && !isFore2) fn++;
                }
                if (tp + fp === 0 || tp + fn === 0) return 0;
                const precision = tp / (tp + fp);
                const recall = tp / (tp + fn);
                if (precision + recall === 0) return 0;
                const f1 = 2 * precision * recall / (precision + recall);
                return Math.round(f1 * 100);
            }

            // ============================================================
            //  7. 語音錄製 (AudioWorkletNode) 同前
            // ============================================================

            const workletCode = `
          class PCMProcessor extends AudioWorkletProcessor {
            constructor() {
              super();
              this.buffer = [];
              this.sampleRate = 16000;
              this.chunkSize = 640;
            }
            process(inputs, outputs, parameters) {
              const input = inputs[0];
              if (!input || input.length === 0) return true;
              const channelData = input[0];
              if (!channelData) return true;
              this.buffer.push(new Float32Array(channelData));
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              if (totalLen >= this.chunkSize) {
                const merged = new Float32Array(totalLen);
                let offset = 0;
                for (const chunk of this.buffer) {
                  merged.set(chunk, offset);
                  offset += chunk.length;
                }
                this.buffer = [];
                const sendData = merged.slice(0, this.chunkSize);
                const pcm = new Int16Array(sendData.length);
                for (let i = 0; i < sendData.length; i++) {
                  let s = sendData[i];
                  s = Math.max(-1, Math.min(1, s));
                  pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                const bytes = new Uint8Array(pcm.buffer);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) {
                  binary += String.fromCharCode(bytes[i]);
                }
                const b64 = btoa(binary);
                this.port.postMessage({ type: 'audio', data: b64, len: pcm.length });
              }
              return true;
            }
          }
          registerProcessor('pcm-processor', PCMProcessor);
        `;
            let workletBlobURL = null;

            function initWorklet() {
                if (!workletBlobURL) {
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    workletBlobURL = URL.createObjectURL(blob);
                }
                return workletBlobURL;
            }

            async function initAudio() {
                try {
                    if (state.audioContext && state.audioContext.state === 'running') {
                        return true;
                    }
                    if (!state.audioContext) {
                        state.audioContext = new(window.AudioContext || window.webkitAudioContext)({
                            sampleRate: AUDIO_CONFIG.sampleRate,
                        });
                    }
                    if (state.audioContext.state === 'suspended') {
                        await state.audioContext.resume();
                    }
                    if (state.audioContext.state !== 'running') {
                        throw new Error('音頻上下文未就緒');
                    }
                    return true;
                } catch (e) {
                    console.error('音頻初始化失敗:', e);
                    setStatus('⚠️ 麥克風權限被拒絕，請允許後重試', true);
                    return false;
                }
            }

            async function startRecording() {
                if (state.isRecording) return;
                if (state.phase !== 'voice') {
                    setStatus('⚠️ 請先通過符文驗證再唸咒', true);
                    return;
                }
                try {
                    const ok = await initAudio();
                    if (!ok) return;
                    if (!state.mediaStream) {
                        state.mediaStream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                sampleRate: AUDIO_CONFIG.sampleRate,
                            },
                            video: false,
                        });
                    }
                    if (!state.audioWorkletNode) {
                        await state.audioContext.audioWorklet.addModule(initWorklet());
                        const source = state.audioContext.createMediaStreamSource(state.mediaStream);
                        state.audioWorkletNode = new AudioWorkletNode(state.audioContext, 'pcm-processor');
                        state.audioWorkletNode.port.onmessage = (e) => {
                            if (e.data.type === 'audio') {
                                if (state.isRecording && state.wsReady) {
                                    sendAudioChunk(e.data.data, e.data.len);
                                }
                            }
                        };
                        source.connect(state.audioWorkletNode);
                        state.audioWorkletNode.connect(state.audioContext.destination);
                    }
                    state.audioBuffer = [];
                    state.isRecording = true;
                    state.recordStartTime = Date.now();
                    btnVoice.textContent = '⏹️ 停止錄音';
                    btnVoice.classList.add('recording');
                    btnVoice.disabled = false;
                    setStatus('🎤 請大聲朗讀咒語 ... (最長 8 秒)', false);
                    if (state.recordTimer) clearTimeout(state.recordTimer);
                    state.recordTimer = setTimeout(() => {
                        if (state.isRecording) {
                            stopRecording(true);
                        }
                    }, AUDIO_CONFIG.maxRecordSeconds * 1000);
                    if (!state.wsReady) {
                        await connectWebSocket();
                    }
                } catch (e) {
                    console.error('錄音啟動失敗:', e);
                    setStatus('⚠️ 無法存取麥克風: ' + e.message, true);
                    resetVoiceUI();
                }
            }

            function stopRecording(auto = false) {
                if (!state.isRecording) return;
                state.isRecording = false;
                if (state.recordTimer) {
                    clearTimeout(state.recordTimer);
                    state.recordTimer = null;
                }
                if (state.wsReady) {
                    sendAudioEnd();
                }
                resetVoiceUI();
                if (!auto) {
                    setStatus('⏳ 等待咒語評測 ...', false);
                } else {
                    setStatus('⏳ 咒語已送出，請等候 ...', false);
                }
            }

            function resetVoiceUI() {
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnVoice.disabled = (state.phase !== 'voice');
            }

            function sendAudioChunk(b64Data, len) {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = {
                    cmd: 'auw',
                    aus: state.audioBuffer.length === 0 ? 1 : 2,
                    data: b64Data,
                };
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                } catch (e) {
                    console.warn('發送音訊失敗:', e);
                }
            }

            function sendAudioEnd() {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = {
                    cmd: 'auw',
                    aus: 4,
                    data: '',
                };
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                } catch (e) {
                    console.warn('發送尾幀失敗:', e);
                }
            }

            // ============================================================
            //  8. 科大訊飛 WebSocket 連線 (使用真實憑證)
            // ============================================================

            function buildWSSUrl() {
                const { APPID, API_KEY, API_SECRET, WSS_URL } = XF_CONFIG;
                const host = new URL(WSS_URL).host;
                const date = new Date().toUTCString();
                const signatureOrigin = `host: ${host}\ndate: ${date}\nGET /v2/ise HTTP/1.1`;
                const sha = CryptoJS.HmacSHA256(signatureOrigin, API_SECRET);
                const signature = CryptoJS.enc.Base64.stringify(sha);
                const authOrigin = `api_key="${API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const auth = btoa(authOrigin);
                return `${WSS_URL}?authorization=${auth}&date=${encodeURIComponent(date)}&host=${host}`;
            }

            async function connectWebSocket() {
                if (state.wsReady) return;
                try {
                    const url = buildWSSUrl();
                    state.wsConnection = new WebSocket(url);
                    state.wsConnection.binaryType = 'blob';
                    return new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error('WSS 連線超時'));
                        }, 10000);
                        state.wsConnection.onopen = () => {
                            clearTimeout(timeout);
                            state.wsReady = true;
                            sendInitFrame();
                            resolve();
                        };
                        state.wsConnection.onerror = (err) => {
                            clearTimeout(timeout);
                            console.error('WSS 錯誤:', err);
                            reject(err);
                        };
                        state.wsConnection.onmessage = (e) => {
                            handleWSMessage(e.data);
                        };
                        state.wsConnection.onclose = () => {
                            state.wsReady = false;
                            console.log('WSS 連線關閉');
                        };
                    });
                } catch (e) {
                    console.error('WSS 連線失敗:', e);
                    setStatus('⚠️ 語音服務連線失敗，請檢查網路', true);
                    throw e;
                }
            }

            function sendInitFrame() {
                if (!state.wsReady || !state.wsConnection) return;
                const char = state.currentChar;
                if (!char) return;
                const text = char.char + '\n' + char.pinyin;
                const payload = {
                    cmd: 'ssb',
                    sub: 'ise',
                    data: JSON.stringify({
                        common: { app_id: XF_CONFIG.APPID },
                        business: {
                            category: 'read_syllable',
                            sub: 'ise',
                            ent: 'cn_vip',
                            cmd: 'ssb',
                            auf: 'audio/L16;rate=16000',
                            aue: 'raw',
                            rst: 'plain',
                            text: text,
                        },
                        data: {
                            status: 0,
                            data: '',
                        },
                    }),
                };
                state.wsConnection.send(JSON.stringify(payload));
            }

            function handleWSMessage(data) {
                try {
                    let text;
                    if (data instanceof Blob) {
                        const reader = new FileReader();
                        reader.onload = () => {
                            parseWSResult(reader.result);
                        };
                        reader.readAsText(data);
                    } else {
                        text = data;
                        parseWSResult(text);
                    }
                } catch (e) {
                    console.warn('解析 WSS 訊息失敗:', e);
                }
            }

            function parseWSResult(text) {
                try {
                    const json = JSON.parse(text);
                    if (json.code && json.code !== 0) {
                        console.warn('訊飛 API 錯誤:', json.message);
                        setStatus('⚠️ 語音評測錯誤: ' + (json.message || '未知錯誤'), true);
                        return;
                    }
                    if (json.data && json.data.data) {
                        const xmlB64 = json.data.data;
                        const binaryStr = atob(xmlB64);
                        const decoder = new TextDecoder('utf-8');
                        const xml = decoder.decode(new Uint8Array([...binaryStr].map(c => c.charCodeAt(0))));
                        const score = extractScoreFromXML(xml);
                        if (score !== null) {
                            handleVoiceResult(score);
                        }
                    }
                } catch (e) {
                    console.warn('解析結果失敗:', e);
                }
            }

            function extractScoreFromXML(xml) {
                const match = xml.match(/<total_score>([\d.]+)<\/total_score>/i);
                if (match) return parseFloat(match[1]);
                const match2 = xml.match(/<score>([\d.]+)<\/score>/i);
                if (match2) return parseFloat(match2[1]);
                const nums = xml.match(/\b([\d.]+)\b/g);
                if (nums) {
                    const last = nums[nums.length - 1];
                    const val = parseFloat(last);
                    if (val > 0 && val <= 100) return val;
                }
                return null;
            }

            // ============================================================
            //  9. 語音結果處理
            // ============================================================

            function handleVoiceResult(score) {
                state.voiceScore = Math.round(score);
                if (state.voiceScore >= THRESHOLDS.voicePass) {
                    setStatus('🎉 咒語生效！妖怪現形！', false);
                    revealMonster();
                } else {
                    setStatus(`😤 咒語靈力不足 (${state.voiceScore}分)，再試一次！`, true);
                    state.phase = 'voice';
                    btnVoice.disabled = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    closeWS();
                }
            }

            // ============================================================
            //  10. 妖怪現形
            // ============================================================

            function revealMonster() {
                state.phase = 'reveal';
                const char = state.currentChar;
                if (!char) return;
                modernChar.textContent = char.char;
                animalEmoji.textContent = char.emoji;
                revealArea.classList.add('show');
                revealArea.style.display = 'flex';
                placeholderArea.style.display = 'none';
                setStatus(`✨ ${char.char} 已現形！ 繼續伏妖之旅？`, false);
                btnVoice.style.display = 'none';
                btnNext.style.display = 'inline-flex';
                btnVerify.disabled = true;
                btnClear.disabled = true;
                state.canvasLocked = true;
                closeWS();
                updateScoreBadge(`✨ 靈力 ${state.drawScore}/${state.voiceScore}`);
            }

            // ============================================================
            //  11. 核心流程控制
            // ============================================================

            function resetForNewChar() {
                closeWS();
                state.isRecording = false;
                state.isVerifying = false;
                state.isVoiceProcessing = false;
                state.audioBuffer = [];
                state.drawScore = 0;
                state.voiceScore = 0;
                state.canvasLocked = false;
                state.phase = 'draw';
                state.wsReady = false;
                if (state.recordTimer) {
                    clearTimeout(state.recordTimer);
                    state.recordTimer = null;
                }
                drawHistory = [];
                renderOracle();
                revealArea.classList.remove('show');
                revealArea.style.display = 'none';
                placeholderArea.style.display = 'flex';
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                btnNext.style.display = 'none';
                btnVerify.disabled = false;
                btnClear.disabled = false;
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                updateScoreBadge('靈力 · 待啟動');
            }

            function pickRandomChar() {
                const idx = Math.floor(Math.random() * CHARACTERS.length);
                return CHARACTERS[idx];
            }

            function initLevel() {
                resetForNewChar();
                state.currentChar = pickRandomChar();
                renderOracle();
                setStatus(`✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span>`, false);
                updateScoreBadge(`🎯 目標: ${state.currentChar.char}`);
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
            }

            function handleVerify() {
                if (state.isVerifying || state.phase === 'reveal') return;
                if (state.canvasLocked) {
                    setStatus('⚠️ 符文已驗證通過，請進行唸咒', true);
                    return;
                }
                if (drawHistory.length === 0 || drawHistory.every(p => p.length < 3)) {
                    setStatus('⚠️ 請先在畫布上描寫甲骨文', true);
                    return;
                }
                state.isVerifying = true;
                btnVerify.disabled = true;
                setStatus('🔍 比對符文靈力 ...', false);
                setTimeout(() => {
                    const score = computeF1Score();
                    state.drawScore = score;
                    state.isVerifying = false;
                    btnVerify.disabled = false;
                    if (score >= THRESHOLDS.drawPass) {
                        state.canvasLocked = true;
                        state.phase = 'voice';
                        setStatus(`✅ 符文契合度 ${score}分！ 咒語已解鎖`, false);
                        pinyinDisplay.textContent = state.currentChar.pinyin;
                        pinyinDisplay.style.display = 'block';
                        setTimeout(() => {
                            pinyinDisplay.classList.add('show');
                        }, 50);
                        btnVoice.disabled = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        updateScoreBadge(`✅ 符文 ${score}分 · 請唸咒`);
                        setStatus(`🗣️ 請唸出咒語：<span class="highlight">${state.currentChar.pinyin}</span>`, false);
                    } else {
                        setStatus(`❌ 符文契合度 ${score}分，再努力描寫！ (需 ≥ ${THRESHOLDS.drawPass}分)`, true);
                        updateScoreBadge(`❌ ${score}分 · 未過關`);
                    }
                }, 500);
            }

            function handleClear() {
                if (state.canvasLocked || state.phase === 'reveal') return;
                drawHistory = [];
                renderOracle();
                setStatus('✍️ 已清除，重新描寫', false);
            }

            function handleNext() {
                initLevel();
            }

            function handleVoiceToggle() {
                if (state.phase !== 'voice') {
                    setStatus('⚠️ 請先通過符文驗證', true);
                    return;
                }
                if (state.isRecording) {
                    stopRecording(false);
                } else {
                    startRecording();
                }
            }

            // ============================================================
            //  12. 輔助函數
            // ============================================================

            function setStatus(html, isError = false) {
                statusText.innerHTML = html;
                statusText.style.color = isError ? '#ff7a7a' : '#f0e6c5';
                if (isError) {
                    statusText.style.textShadow = '0 0 30px rgba(255,70,70,0.15)';
                } else {
                    statusText.style.textShadow = '0 0 20px rgba(255,215,100,0.05)';
                }
            }

            function updateScoreBadge(text) {
                scoreBadge.textContent = text;
            }

            function closeWS() {
                if (state.wsConnection) {
                    try {
                        state.wsConnection.close();
                    } catch (e) {}
                    state.wsConnection = null;
                }
                state.wsReady = false;
            }

            // ============================================================
            //  13. 初始化
            // ============================================================

            function init() {
                resizeCanvas();
                bindCanvasEvents();
                btnClear.addEventListener('click', handleClear);
                btnVerify.addEventListener('click', handleVerify);
                btnVoice.addEventListener('click', handleVoiceToggle);
                btnNext.addEventListener('click', handleNext);
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        resizeCanvas();
                    }, 200);
                });
                initLevel();
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                }, 600);
                document.addEventListener('touchstart', () => {
                    if (state.audioContext && state.audioContext.state === 'suspended') {
                        state.audioContext.resume().catch(() => {});
                    }
                }, { passive: true });
                console.log('🔮 《甲骨文伏妖錄》已啟動 (真實 API 模式)');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
