<!DOCTYPE html>

<head>

    <style>

            display: flex;

            height: 100vh;
            background: #f5f0e8;
        }

        /* ===== 左側面板 ===== */

            left: -50%;

            animation: breatheGlow 8s ease-in-out infinite alternate;
        }
        @keyframes breatheGlow {
            0% {
                opacity: 0.3;
                transform: scale(1);
            }
            100% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        /* ===== 狀態提示 ===== */
        #status-area {
            width: 100%;
            max-width: 580px;
            text-align: center;
            padding: 1.2vh 1vw;
            margin-bottom: 1.5vh;
            background: rgba(255, 245, 230, 0.7);
            border: 1px solid rgba(180, 150, 100, 0.2);
            border-radius: 16px;
            position: relative;
            z-index: 2;
            min-height: 7vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #status-text {
            font-size: clamp(1.1rem, 2.2vh, 1.8rem);

        }
        #status-text .highlight {

        #pinyin-display {

        }
        #pinyin-display.show {
            display: block;

        }
        @keyframes pinyinPop {
            0% {
                opacity: 0;
                transform: scale(0.6) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ===== 畫布 ===== */
        #canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 580px;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(180, 150, 100, 0.15), inset 0 0 60px rgba(255, 250, 240, 0.5);
            border: 1px solid rgba(180, 150, 100, 0.25);

            z-index: 2;
            touch-action: none;
        }
        #canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: pointer;
        }
        #canvas-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(200, 180, 160, 0.1) 100%);
            border-radius: 20px;
            z-index: 1;
        }

        /* ===== 按鈕區 ===== */
        #controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8vh 1vw;
            width: 100%;
            max-width: 580px;
            margin-top: 1.8vh;
            padding: 0.6vh 0;
            position: relative;

        }
        .btn {

            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.04em;
            touch-action: manipulation;
            background: rgba(255, 255, 255, 0.6);
            color: #3a2e1e;
            border: 1px solid rgba(180, 150, 100, 0.3);
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4vw;
            flex: 0 1 auto;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: linear-gradient(135deg, #d4a017, #b8860b);
            color: #fff;
            border-color: #b8860b;
            box-shadow: 0 4px 20px rgba(184, 134, 11, 0.25);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            filter: grayscale(0.5);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(180, 150, 100, 0.2);
            color: #3a2e1e;
        }
        .btn-secondary:active {
            background: rgba(200, 180, 160, 0.3);
        }
        .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger {

        .btn-voice {

        .btn-voice.recording {

        @keyframes pulseMic {

        .btn-success {

        .btn-clear {

        /* ===== 右側面板 ===== */
        #right-panel {
            flex: 0 0 50%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 60% 40%, #faf5ee, #f0ebe3);

        #right-panel::before {
            content: '✦';
            position: absolute;
            font-size: 50vh;

        #right-panel::after {
            content: '';

            left: 10%;

        @keyframes spinArray {

        /* ===== 妖怪展示 ===== */
        #reveal-area {
            display: none;

            justify-content: center;

        @keyframes revealAppear {

        }
        @keyframes charGlow {

                text-shadow: 0 0 60px rgba(184, 134, 11, 0.2), 0 0 120px rgba(184, 134, 11, 0.05);
            }
            100% {
                text-shadow: 0 0 80px rgba(184, 134, 11, 0.4), 0 0 180px rgba(184, 134, 11, 0.15);

        #animal-emoji {
            font-size: clamp(8rem, 22vh, 16rem);
            line-height: 1;
            animation: floatAnimal 3.5s ease-in-out infinite;

        @keyframes floatAnimal {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        #placeholder-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            color: rgba(180, 150, 100, 0.2);
            font-size: clamp(1rem, 2vh, 1.6rem);
            letter-spacing: 0.2em;
            text-align: center;
            padding: 2vh;
        }
        #placeholder-area .symbol {
            font-size: clamp(4rem, 10vh, 8rem);
            opacity: 0.2;
            margin-bottom: 1vh;
            animation: spinArray 30s linear infinite;
        }

        #score-badge {
            position: absolute;
            bottom: 1.5vh;
            right: 1.5vw;
            font-size: clamp(0.7rem, 1.2vh, 1rem);
            color: rgba(100, 80, 60, 0.3);
            background: rgba(255, 255, 255, 0.6);
            padding: 0.3vh 0.8vw;
            border-radius: 20px;
            border: 1px solid rgba(180, 150, 100, 0.15);
            pointer-events: none;
            z-index: 10;
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        /* ===== 載入遮罩 ===== */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
            color: #b8860b;
            font-size: clamp(1rem, 2vh, 1.6rem);
            letter-spacing: 0.1em;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-overlay .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(184, 134, 11, 0.1);
            border-top: 3px solid #b8860b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2vh;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">🔮 召喚甲骨文靈力 ...</div>
    </div>

    <div id="app">
        <div id="left-panel">
            <div id="status-area">
                <div id="status-text">✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span></div>
                <div id="pinyin-display"></div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="oracleCanvas"></canvas>
            </div>
            <div id="controls">
                <button class="btn btn-clear" id="btnClear">🗑 清除</button>
                <button class="btn btn-primary" id="btnVerify">⚡ 驗證符文</button>
                <button class="btn btn-voice" id="btnVoice" disabled>🎙️ 唸咒</button>
                <button class="btn btn-success" id="btnNext" style="display:none;">🔮 尋找下個妖怪</button>
            </div>
            <div id="score-badge">靈力 · 待啟動</div>
        </div>

        <div id="right-panel">
            <div id="placeholder-area">
                <div class="symbol">⛩️</div>
                <div>等待符文之力</div>
                <div style="font-size:0.7em; opacity:0.5; margin-top:0.5vh;">描繪甲骨文 · 誦唸咒語</div>
            </div>
            <div id="reveal-area">
                <div id="modern-char">羊</div>
                <div id="animal-emoji">🐑</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 1. 配置 ==========
            const XF_CONFIG = {
                APPID: '2600b137',
                API_KEY: '8b012124ed213c06974cd469f29e134b',
                API_SECRET: 'MWNkZTQ1ZTEzOTM0NTVjZThjOTQxNjZj',
                WSS_URL: 'wss://ise-api.xfyun.cn/v2/open-ise',
            };
            const AUDIO_CONFIG = { sampleRate: 16000, bitDepth: 16, channels: 1, frameDuration: 40, maxRecordSeconds: 8 };
            const THRESHOLDS = { drawPass: 45, voicePass: 60 };

            // ========== 2. 字庫（使用圖片，文件名改為繁體） ==========
            const CHARACTERS = [{
                id: 'yang',
                char: '羊',
                pinyinRaw: 'yang2',
                pinyinTone: 'yáng',
                emoji: '🐑',
                imgSrc: 'images/羊_1.png',
                img: null,
            }, {
                id: 'ma',
                char: '馬',
                pinyinRaw: 'ma3',
                pinyinTone: 'mǎ',
                emoji: '🐴',
                imgSrc: 'images/馬_1.png',
                img: null,
            }, {
                id: 'niu',
                char: '牛',
                pinyinRaw: 'niu2',
                pinyinTone: 'niú',
                emoji: '🐮',
                imgSrc: 'images/牛_1.png',
                img: null,
            }, {
                id: 'niao',
                char: '鳥',
                pinyinRaw: 'niao3',
                pinyinTone: 'niǎo',
                emoji: '🐦',
                imgSrc: 'images/鳥_1.png',
                img: null,
            }, {
                id: 'yu',
                char: '魚',
                pinyinRaw: 'yu2',
                pinyinTone: 'yú',
                emoji: '🐟',
                imgSrc: 'images/魚_1.png',
                img: null,
            }];

            // ========== 3. 狀態 ==========
            const state = {
                currentChar: null,
                phase: 'draw',
                canvasLocked: false,
                isRecording: false,
                isVerifying: false,
                drawScore: 0,
                voiceScore: 0,
                audioContext: null,
                audioWorkletNode: null,
                mediaStream: null,
                audioBuffer: [],
                recordTimer: null,
                wsConnection: null,
                wsReady: false,
                imagesLoaded: false,
            };

            // ========== 4. DOM ==========
            const $ = id => document.getElementById(id);
            const canvas = $('oracleCanvas');
            const ctx = canvas.getContext('2d');
            const statusText = $('status-text');
            const pinyinDisplay = $('pinyin-display');
            const btnClear = $('btnClear');
            const btnVerify = $('btnVerify');
            const btnVoice = $('btnVoice');
            const btnNext = $('btnNext');
            const revealArea = $('reveal-area');
            const placeholderArea = $('placeholder-area');
            const modernChar = $('modern-char');
            const animalEmoji = $('animal-emoji');
            const scoreBadge = $('score-badge');
            const loadingOverlay = $('loading-overlay');
            const loadingText = $('loading-text');

            // ========== 5. Canvas ==========
            let canvasW, canvasH;
            let isDrawing = false;
            let drawHistory = [];

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvasW = rect.width;
                canvasH = rect.height;
                canvas.width = canvasW * dpr;
                canvas.height = canvasH * dpr;
                canvas.style.width = canvasW + 'px';
                canvas.style.height = canvasH + 'px';
                ctx.scale(dpr, dpr);
                ctx.lineWidth = Math.max(3, canvasW * 0.02);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#5a4a3a';
                ctx.shadowColor = 'rgba(100,80,60,0.1)';
                ctx.shadowBlur = 8;
                renderOracle();
            }

            function renderOracle() {
                ctx.clearRect(0, 0, canvasW, canvasH);
                const char = state.currentChar;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.25;
                    ctx.drawImage(char.img, 0, 0, canvasW, canvasH);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#ddd';
                    ctx.font = '18px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('字形載入中...', canvasW / 2, canvasH / 2);
                }
                if (drawHistory.length > 0) {
                    ctx.save();
                    ctx.strokeStyle = '#5a4a3a';
                    ctx.lineWidth = Math.max(3, canvasW * 0.02);
                    ctx.shadowColor = 'rgba(100,80,60,0.15)';
                    ctx.shadowBlur = 10;
                    ctx.globalAlpha = 0.85;
                    for (const path of drawHistory) {
                        if (path.length < 2) continue;
                        ctx.beginPath();
                        ctx.moveTo(path[0].x, path[0].y);
                        for (let i = 1; i < path.length; i++) {
                            ctx.lineTo(path[i].x, path[i].y);
                        }
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
            }

            function startDraw(e) {
                if (state.canvasLocked || state.phase === 'reveal') return;
                e.preventDefault();
                isDrawing = true;
                const pos = getPos(e);
                drawHistory.push([{ x: pos.x, y: pos.y }]);
            }

            function moveDraw(e) {
                if (!isDrawing || state.canvasLocked) return;
                e.preventDefault();
                const pos = getPos(e);
                const currentPath = drawHistory[drawHistory.length - 1];
                if (currentPath) {
                    const last = currentPath[currentPath.length - 1];
                    if (last && Math.hypot(pos.x - last.x, pos.y - last.y) < 2) return;
                    currentPath.push({ x: pos.x, y: pos.y });
                }
                renderOracle();
            }

            function endDraw(e) {
                if (isDrawing) {
                    isDrawing = false;
                    const lastPath = drawHistory[drawHistory.length - 1];
                    if (lastPath && lastPath.length < 3) {
                        drawHistory.pop();
                        renderOracle();
                    }
                }
            }

            function bindCanvasEvents() {
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', moveDraw, { passive: false });
                canvas.addEventListener('touchend', endDraw, { passive: false });
                canvas.addEventListener('touchcancel', endDraw, { passive: false });
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', moveDraw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);
            }

            // ========== 6. 像素比對 (F1) ==========
            function computeF1Score() {
                const dpr = window.devicePixelRatio || 1;
                const w = Math.floor(canvasW * dpr);
                const h = Math.floor(canvasH * dpr);

                const off1 = document.createElement('canvas');
                off1.width = w;
                off1.height = h;
                const ctx1 = off1.getContext('2d');
                const char = state.currentChar;
                if (char && char.img && char.img.complete && char.img.naturalWidth > 0) {
                    ctx1.drawImage(char.img, 0, 0, w, h);
                }

                const off2 = document.createElement('canvas');
                off2.width = w;
                off2.height = h;
                const ctx2 = off2.getContext('2d');
                ctx2.strokeStyle = '#ffffff';
                ctx2.lineWidth = Math.max(3, canvasW * 0.02) * dpr;
                ctx2.lineCap = 'round';
                ctx2.lineJoin = 'round';
                for (const path of drawHistory) {
                    if (path.length < 2) continue;
                    ctx2.beginPath();
                    const scaleX = w / canvasW;
                    const scaleY = h / canvasH;
                    ctx2.moveTo(path[0].x * scaleX, path[0].y * scaleY);
                    for (let i = 1; i < path.length; i++) {
                        ctx2.lineTo(path[i].x * scaleX, path[i].y * scaleY);
                    }
                    ctx2.stroke();
                }

                const data1 = ctx1.getImageData(0, 0, w, h).data;
                const data2 = ctx2.getImageData(0, 0, w, h).data;

                const step = 2;
                let tp = 0,
                    fp = 0,
                    fn = 0;
                const threshold = 30;

                for (let i = 0; i < data1.length; i += 4 * step) {
                    const idx = i / 4;
                    const x = (idx % w);
                    const y = Math.floor(idx / w);
                    if (x % step !== 0 || y % step !== 0) continue;

                    const lum1 = 0.299 * data1[i] + 0.587 * data1[i + 1] + 0.114 * data1[i + 2];
                    const lum2 = 0.299 * data2[i] + 0.587 * data2[i + 1] + 0.114 * data2[i + 2];

                    const isFore1 = lum1 < threshold;
                    const isFore2 = lum2 > threshold;

                    if (isFore1 && isFore2) tp++;
                    else if (!isFore1 && isFore2) fp++;
                    else if (isFore1 && !isFore2) fn++;
                }

                if (tp === 0) return 0;
                const precision = tp / (tp + fp);
                const recall = tp / (tp + fn);
                const f1 = 2 * precision * recall / (precision + recall);
                return Math.round(f1 * 100);
            }

            // ========== 7. 語音錄製 (Worklet) ==========
            const workletCode = `
          class PCMProcessor extends AudioWorkletProcessor {
            constructor() {
              super();
              this.buffer = [];
              this.chunkSize = 640;
            }
            process(inputs, outputs, parameters) {
              const input = inputs[0];
              if (!input || input.length === 0) return true;
              const channelData = input[0];
              if (!channelData) return true;
              this.buffer.push(new Float32Array(channelData));
              let totalLen = 0;
              for (const chunk of this.buffer) totalLen += chunk.length;
              if (totalLen >= this.chunkSize) {
                const merged = new Float32Array(totalLen);
                let offset = 0;
                for (const chunk of this.buffer) {
                  merged.set(chunk, offset);
                  offset += chunk.length;
                }
                this.buffer = [];
                const sendData = merged.slice(0, this.chunkSize);
                const pcm = new Int16Array(sendData.length);
                for (let i = 0; i < sendData.length; i++) {
                  let s = sendData[i];
                  s = Math.max(-1, Math.min(1, s));
                  pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                this.port.postMessage({ type: 'audio', buffer: pcm.buffer }, [pcm.buffer]);
              }
              return true;
            }
          }
          registerProcessor('pcm-processor', PCMProcessor);
        `;
            let workletBlobURL = null;

            function initWorklet() {
                if (!workletBlobURL) {
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    workletBlobURL = URL.createObjectURL(blob);
                }
                return workletBlobURL;
            }

            let audioContext = null,
                audioWorkletNode = null,
                mediaStream = null;
            let isRecording = false;
            let recordTimer = null;

            async function initAudio() {
                try {
                    if (audioContext && audioContext.state === 'running') return true;
                    if (!audioContext) {
                        audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: AUDIO_CONFIG
                                .sampleRate });
                    }
                    if (audioContext.state === 'suspended') await audioContext.resume();
                    if (audioContext.state !== 'running') throw new Error('音頻上下文未就緒');
                    return true;
                } catch (e) {
                    console.error('音頻初始化失敗:', e);
                    setStatus('⚠️ 麥克風權限被拒絕，請允許後重試', true);
                    return false;
                }
            }

            // ----- 音頻發送相關 -----
            function sendAudioChunk(b64Data) {
                if (!state.wsReady || !state.wsConnection) {
                    console.warn('WebSocket未就緒，丟棄音頻幀');
                    return;
                }
                const aus = state.audioBuffer.length === 0 ? 1 : 2;
                const payload = {
                    business: { cmd: 'auw', aus: aus },
                    data: { status: 1, data: b64Data }
                };
                state.audioBuffer.push(b64Data);
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                    console.log(`[WS] 發送音頻幀 aus=${aus}, 大小=${b64Data.length}`);
                } catch (e) {
                    console.error('發送音訊幀失敗:', e);
                }
            }

            function sendAudioEnd() {
                if (!state.wsReady || !state.wsConnection) return;
                const payload = {
                    business: { cmd: 'auw', aus: 4 },
                    data: { status: 2, data: '' }
                };
                try {
                    state.wsConnection.send(JSON.stringify(payload));
                    console.log('[WS] 發送尾幀 aus=4');
                } catch (e) {
                    console.error('發送尾幀失敗:', e);
                }
            }

            // ----- 開始/停止錄音 -----
            async function startRecording() {
                if (isRecording) return;
                if (state.phase !== 'voice') {
                    setStatus('⚠️ 請先通過符文驗證再唸咒', true);
                    return;
                }
                try {
                    const ok = await initAudio();
                    if (!ok) return;
                    if (!mediaStream) {
                        mediaStream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                sampleRate: AUDIO_CONFIG.sampleRate,
                            },
                            video: false,
                        });
                        console.log('✅ 麥克風取得成功');
                    }
                    if (!audioWorkletNode) {
                        await audioContext.audioWorklet.addModule(initWorklet());
                        const source = audioContext.createMediaStreamSource(mediaStream);
                        audioWorkletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
                        audioWorkletNode.port.onmessage = (e) => {
                            if (e.data.type === 'audio' && isRecording && state.wsReady) {
                                const buffer = e.data.buffer;
                                const bytes = new Uint8Array(buffer);
                                let binary = '';
                                for (let i = 0; i < bytes.length; i++) {
                                    binary += String.fromCharCode(bytes[i]);
                                }
                                const b64 = btoa(binary);
                                sendAudioChunk(b64);
                            }
                        };
                        source.connect(audioWorkletNode);
                        audioWorkletNode.connect(audioContext.destination);
                        console.log('✅ AudioWorkletNode 創建成功');
                    }
                    isRecording = true;
                    state.isRecording = true;
                    btnVoice.textContent = '⏹️ 停止錄音';
                    btnVoice.classList.add('recording');
                    btnVoice.disabled = false;
                    setStatus('🎤 請大聲朗讀咒語 ... (最長 8 秒)', false);
                    if (recordTimer) clearTimeout(recordTimer);
                    recordTimer = setTimeout(() => {
                        if (isRecording) stopRecording(true);
                    }, AUDIO_CONFIG.maxRecordSeconds * 1000);
                    // 若尚未連接 WS，則建立連接
                    if (!state.wsReady) {
                        console.log('[WS] 開始連接 WebSocket ...');
                        await connectWebSocket();
                    }
                } catch (e) {
                    console.error('錄音啟動失敗:', e);
                    setStatus('⚠️ 無法存取麥克風: ' + e.message, true);
                    resetVoiceUI();
                }
            }

            function stopRecording(auto = false) {
                if (!isRecording) return;
                isRecording = false;
                state.isRecording = false;
                if (recordTimer) { clearTimeout(recordTimer);
                    recordTimer = null; }
                if (state.wsReady) {
                    sendAudioEnd();
                } else {
                    console.warn('WS未就緒，無法發送尾幀');
                }
                resetVoiceUI();
                const msg = auto ? '⏳ 咒語已送出，請等候 ...' : '⏳ 等待咒語評測 ...';
                setStatus(msg, false);
                console.log('[錄音] 已停止，等待服務器響應');
            }

            function resetVoiceUI() {
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                btnVoice.disabled = (state.phase !== 'voice');
            }

            // ========== 8. WebSocket 與訊飛 API ==========
            function buildWSSUrl() {
                const { APPID, API_KEY, API_SECRET, WSS_URL } = XF_CONFIG;
                const host = new URL(WSS_URL).host;
                const date = new Date().toUTCString();
                const signatureOrigin = `host: ${host}\ndate: ${date}\nGET /v2/open-ise HTTP/1.1`;
                const sha = CryptoJS.HmacSHA256(signatureOrigin, API_SECRET);
                const signature = CryptoJS.enc.Base64.stringify(sha);
                const authOrigin = `api_key="${API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
                const auth = btoa(authOrigin);
                const url = `${WSS_URL}?authorization=${auth}&date=${encodeURIComponent(date)}&host=${host}`;
                console.log('[WS] 構建URL:', url);
                return url;
            }

            async function connectWebSocket() {
                if (state.wsReady) {
                    console.log('[WS] 已就緒，無需重複連接');
                    return;
                }
                try {
                    const url = buildWSSUrl();
                    state.wsConnection = new WebSocket(url);
                    state.wsConnection.binaryType = 'blob';
                    return new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error('WSS 連線超時'));
                        }, 10000);
                        state.wsConnection.onopen = () => {
                            clearTimeout(timeout);
                            state.wsReady = true;
                            console.log('[WS] 連線成功，發送首幀');
                            sendInitFrame();
                            resolve();
                        };
                        state.wsConnection.onerror = (err) => {
                            clearTimeout(timeout);
                            console.error('[WS] 錯誤:', err);
                            reject(err);
                        };
                        state.wsConnection.onmessage = (e) => {
                            console.log('[WS] 收到訊息，類型:', typeof e.data);
                            handleWSMessage(e.data);
                        };
                        state.wsConnection.onclose = (e) => {
                            state.wsReady = false;
                            console.log(`[WS] 連線關閉，代碼=${e.code}, 原因=${e.reason}`);
                        };
                    });
                } catch (e) {
                    console.error('[WS] 連線失敗:', e);
                    setStatus('⚠️ 語音服務連線失敗，請檢查網路', true);
                    throw e;
                }
            }

            function sendInitFrame() {
                if (!state.wsReady || !state.wsConnection) {
                    console.warn('[WS] 未就緒，無法發送首幀');
                    return;
                }
                const char = state.currentChar;
                if (!char) return;
                const text = '\uFEFF' + char.char + '\n' + char.pinyinRaw;
                const payload = {
                    common: { app_id: XF_CONFIG.APPID },
                    business: {
                        sub: 'ise',
                        ent: 'cn_vip',
                        category: 'read_syllable',
                        cmd: 'ssb',
                        auf: 'audio/L16;rate=16000',
                        aue: 'raw',
                        text: text,
                        ttp_skip: true,
                        rst: 'entirety',
                        ise_unite: '1',
                    },
                    data: { status: 0 }
                };
                const json = JSON.stringify(payload);
                console.log('[WS] 發送首幀:', json);
                state.wsConnection.send(json);
            }

            function handleWSMessage(data) {
                try {
                    let text;
                    if (data instanceof Blob) {
                        const reader = new FileReader();
                        reader.onload = () => {
                            const result = reader.result;
                            console.log('[WS] Blob 轉文字:', result);
                            parseWSResult(result);
                        };
                        reader.readAsText(data);
                    } else {
                        text = data;
                        console.log('[WS] 收到文字訊息:', text);
                        parseWSResult(text);
                    }
                } catch (e) {
                    console.error('[WS] 處理訊息異常:', e);
                }
            }

            function parseWSResult(text) {
                try {
                    const json = JSON.parse(text);
                    console.log('[WS] 解析 JSON:', json);
                    if (json.code && json.code !== 0) {
                        console.warn('[WS] 訊飛 API 錯誤:', json.message);
                        setStatus('⚠️ 語音評測錯誤: ' + (json.message || '未知錯誤'), true);
                        return;
                    }
                    if (json.data && json.data.data) {
                        const xmlB64 = json.data.data;
                        const binaryStr = atob(xmlB64);
                        const decoder = new TextDecoder('utf-8');
                        const xml = decoder.decode(new Uint8Array([...binaryStr].map(c => c.charCodeAt(0))));
                        console.log('[WS] 評測結果 XML:', xml);
                        const score = extractScoreFromXML(xml);
                        if (score !== null) {
                            console.log('[WS] 得分:', score);
                            handleVoiceResult(score);
                        } else {
                            console.warn('[WS] 無法從 XML 提取分數');
                        }
                    } else {
                        console.log('[WS] 暫無結果數據');
                    }
                } catch (e) {
                    console.error('[WS] 解析結果失敗:', e, '原始文本:', text);
                }
            }

            function extractScoreFromXML(xml) {
                const match = xml.match(/<total_score>([\d.]+)<\/total_score>/i);
                if (match) return parseFloat(match[1]);
                const match2 = xml.match(/<score>([\d.]+)<\/score>/i);
                if (match2) return parseFloat(match2[1]);
                const nums = xml.match(/\b([\d.]+)\b/g);
                if (nums) { const last = nums[nums.length - 1]; const val = parseFloat(last); if (val > 0 && val <= 100)
                    return val; }
                return null;
            }

            // ========== 9. 語音結果處理 ==========
            function handleVoiceResult(score) {
                state.voiceScore = Math.round(score);
                if (state.voiceScore >= THRESHOLDS.voicePass) {
                    setStatus('🎉 咒語生效！妖怪現形！', false);
                    revealMonster();
                } else {
                    setStatus(`😤 咒語靈力不足 (${state.voiceScore}分)，再試一次！`, true);
                    state.phase = 'voice';
                    btnVoice.disabled = false;
                    btnVoice.textContent = '🎙️ 唸咒';
                    closeWS();
                }
            }

            // ========== 10. 妖怪現形 ==========
            function revealMonster() {
                state.phase = 'reveal';
                const char = state.currentChar;
                if (!char) return;
                modernChar.textContent = char.char;
                animalEmoji.textContent = char.emoji;
                revealArea.classList.add('show');
                revealArea.style.display = 'flex';
                placeholderArea.style.display = 'none';
                setStatus(`✨ ${char.char} 已現形！ 繼續伏妖之旅？`, false);
                btnVoice.style.display = 'none';
                btnNext.style.display = 'inline-flex';
                btnVerify.disabled = true;
                btnClear.disabled = true;
                state.canvasLocked = true;
                closeWS();
                updateScoreBadge(`✨ 靈力 ${state.drawScore}/${state.voiceScore}`);
            }

            // ========== 11. 流程控制 ==========
            function resetForNewChar() {
                closeWS();
                isRecording = false;
                state.isRecording = false;
                state.audioBuffer = [];
                state.drawScore = 0;
                state.voiceScore = 0;
                state.canvasLocked = false;
                state.phase = 'draw';
                state.wsReady = false;
                if (recordTimer) { clearTimeout(recordTimer);
                    recordTimer = null; }
                drawHistory = [];
                renderOracle();
                revealArea.classList.remove('show');
                revealArea.style.display = 'none';
                placeholderArea.style.display = 'flex';
                pinyinDisplay.classList.remove('show');
                pinyinDisplay.textContent = '';
                pinyinDisplay.style.display = 'none';
                btnVoice.style.display = 'inline-flex';
                btnNext.style.display = 'none';
                btnVerify.disabled = false;
                btnClear.disabled = false;
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
                updateScoreBadge('靈力 · 待啟動');
            }

            function pickRandomChar() { return CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)]; }

            function initLevel() {
                resetForNewChar();
                state.currentChar = pickRandomChar();
                renderOracle();
                setStatus(`✍️ 請描寫下方的 <span class="highlight">甲骨文字形</span>`, false);
                updateScoreBadge(`🎯 目標: ${state.currentChar.char}`);
                btnVoice.disabled = true;
                btnVoice.textContent = '🎙️ 唸咒';
                btnVoice.classList.remove('recording');
            }

            function handleVerify() {
                if (state.isVerifying || state.phase === 'reveal') return;
                if (state.canvasLocked) { setStatus('⚠️ 符文已驗證通過，請進行唸咒', true); return; }
                if (drawHistory.length === 0 || drawHistory.every(p => p.length < 3)) {
                    setStatus('⚠️ 請先在畫布上描寫甲骨文', true);
                    return;
                }
                state.isVerifying = true;
                btnVerify.disabled = true;
                setStatus('🔍 比對符文靈力 ...', false);
                setTimeout(() => {
                    const score = computeF1Score();
                    state.drawScore = score;
                    state.isVerifying = false;
                    btnVerify.disabled = false;
                    if (score >= THRESHOLDS.drawPass) {
                        state.canvasLocked = true;
                        state.phase = 'voice';
                        setStatus(`✅ 符文契合度 ${score}分！ 咒語已解鎖`, false);
                        pinyinDisplay.textContent = state.currentChar.pinyinTone;
                        pinyinDisplay.style.display = 'block';
                        setTimeout(() => pinyinDisplay.classList.add('show'), 50);
                        btnVoice.disabled = false;
                        btnVoice.textContent = '🎙️ 唸咒';
                        updateScoreBadge(`✅ 符文 ${score}分 · 請唸咒`);
                        setStatus(`🗣️ 請唸出咒語：<span class="highlight">${state.currentChar.pinyinTone}</span>`, false);
                    } else {
                        setStatus(`❌ 符文契合度 ${score}分，再努力描寫！ (需 ≥ ${THRESHOLDS.drawPass}分)`, true);
                        updateScoreBadge(`❌ ${score}分 · 未過關`);
                    }
                }, 500);
            }

            function handleClear() {
                if (state.canvasLocked || state.phase === 'reveal') return;
                drawHistory = [];
                renderOracle();
                setStatus('✍️ 已清除，重新描寫', false);
            }

            function handleNext() { initLevel(); }

            function handleVoiceToggle() {
                if (state.phase !== 'voice') { setStatus('⚠️ 請先通過符文驗證', true); return; }
                if (isRecording) stopRecording(false);
                else startRecording();
            }

            // ========== 12. 輔助 ==========
            function setStatus(html, isError = false) {
                statusText.innerHTML = html;
                statusText.style.color = isError ? '#a94442' : '#3a2e1e';
            }

            function updateScoreBadge(text) { scoreBadge.textContent = text; }

            function closeWS() {
                if (state.wsConnection) {
                    try { state.wsConnection.close(); } catch (e) {}
                    state.wsConnection = null;
                }
                state.wsReady = false;
                console.log('[WS] 已關閉連接');
            }

            // ========== 13. 圖片預加載 ==========
            function loadImages() {
                const promises = CHARACTERS.map(char => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            char.img = img;
                            console.log(`✅ 圖片載入成功: ${char.imgSrc}`);
                            resolve();
                        };
                        img.onerror = () => {
                            console.warn(`⚠️ 圖片載入失敗: ${char.imgSrc}，使用佔位圖`);
                            // 創建佔位圖
                            const fallbackCanvas = document.createElement('canvas');
                            fallbackCanvas.width = 200;
                            fallbackCanvas.height = 200;
                            const fctx = fallbackCanvas.getContext('2d');
                            fctx.fillStyle = '#ffffff';
                            fctx.fillRect(0, 0, 200, 200);
                            fctx.strokeStyle = '#000000';
                            fctx.lineWidth = 4;
                            fctx.font = '60px sans-serif';
                            fctx.textAlign = 'center';
                            fctx.textBaseline = 'middle';
                            fctx.fillStyle = '#000';
                            fctx.fillText(char.char, 100, 100);
                            const imgData = fallbackCanvas.toDataURL();
                            const fallbackImg = new Image();
                            fallbackImg.onload = () => {
                                char.img = fallbackImg;
                                resolve();
                            };
                            fallbackImg.src = imgData;
                        };
                        img.src = char.imgSrc;
                    });
                });
                return Promise.all(promises);
            }

            // ========== 14. 初始化 ==========
            async function init() {
                loadingText.textContent = '📜 載入甲骨文字形圖片 ...';
                await loadImages();
                loadingText.textContent = '🔮 靈力凝聚中 ...';

                resizeCanvas();
                bindCanvasEvents();
                btnClear.addEventListener('click', handleClear);
                btnVerify.addEventListener('click', handleVerify);
                btnVoice.addEventListener('click', handleVoiceToggle);
                btnNext.addEventListener('click', handleNext);
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(resizeCanvas, 200);
                });
                initLevel();
                setTimeout(() => loadingOverlay.classList.add('hidden'), 600);
                document.addEventListener('touchstart', () => {
                    if (audioContext && audioContext.state === 'suspended') audioContext.resume().catch(() => {});
                }, { passive: true });
                console.log('🔮 《甲骨文伏妖錄》已啟動 (使用繁體圖片名 + 詳細日誌)');
                console.log('📌 請確保 images/ 目錄下存在以下圖片：羊_1.png, 馬_1.png, 牛_1.png, 鳥_1.png, 魚_1.png');
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
