<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>甲骨文伏妖錄 - 深度除錯版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', '標楷體', Arial, sans-serif;
            width: 100vw; height: 100vh; overflow: hidden;
            display: flex; flex-direction: row;
            background-color: #1a1a1d; color: #ecf0f1;
        }
        
        #left-panel {
            width: 50%; height: 100%;
            background-color: #f4ebd8; color: #333;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-right: 4px solid #8b7355; position: relative;
        }

        #prompt-area {
            height: 100px; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            margin-bottom: 20px; text-align: center;
        }
        #pinyin-display {
            font-size: 40px; font-family: Arial, sans-serif;
            color: #c0392b; font-weight: bold; opacity: 0;
            transition: opacity 0.5s; letter-spacing: 2px;
        }
        #instruction-text {
            font-size: 22px; color: #5a4634; font-weight: bold;
            margin-top: 10px; background: rgba(255,255,255,0.6);
            padding: 5px 15px; border-radius: 8px;
        }

        #canvas-container {
            width: 350px; height: 350px; position: relative;
            background-color: #fff; border: 4px dashed #a68b6a;
            border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            touch-action: none;
        }
        #trace-guide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.15; pointer-events: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }

        .controls { margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        button {
            padding: 12px 20px; font-size: 18px; font-weight: bold;
            cursor: pointer; background-color: #5a4634; color: white;
            border: none; border-radius: 8px; transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.3); }
        button:disabled { background-color: #bdc3c7; color: #7f8c8d; cursor: not-allowed; box-shadow: none; }
        
        #recordBtn { background-color: #c0392b; transition: all 0.3s ease; }
        #recordBtn:hover:not(:disabled) { background-color: #922b21; }
        #nextBtn { background-color: #27ae60; display: none; }

        .recording-pulse {
            background-color: #e74c3c !important;
            animation: pulse-glow 1.5s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        #right-panel {
            width: 50%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle, #34495e 0%, #1a1a1d 80%);
            position: relative;
        }

        #monster-container {
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: scale(0.5); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #monster-container.revealed { opacity: 1; transform: scale(1); }

        #modern-char {
            font-family: 'BiauKai', '標楷體', serif; font-size: 160px;
            color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); margin-bottom: 20px;
        }
        #monster-pic {
            font-size: 180px; line-height: 1; filter: drop-shadow(0 0 30px rgba(255,255,255,0.4));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }

        #magic-circle {
            position: absolute; width: 500px; height: 500px;
            border: 2px dashed rgba(241, 196, 15, 0.2); border-radius: 50%;
            animation: spin 30s linear infinite; pointer-events: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="left-panel">
        <div id="prompt-area">
            <div id="pinyin-display"></div>
            <div id="instruction-text">請描寫下方的甲骨文字形</div>
        </div>
        
        <div id="canvas-container">
            <img id="trace-guide" src="" alt="甲骨文底圖">
            <canvas id="writeCanvas" width="350" height="350"></canvas>
        </div>

        <div class="controls">
            <button id="clearBtn" onclick="clearCanvas()">清除重寫</button>
            <button id="checkBtn" onclick="checkWriting()">驗證符文</button>
            <button id="recordBtn" onclick="toggleRecording()" disabled>🎙️ 唸咒</button>
            <button id="nextBtn" onclick="initGame()">尋找下個妖怪</button>
        </div>
    </div>

    <div id="right-panel">
        <div id="magic-circle"></div>
        <div id="monster-container">
            <div id="modern-char"></div>
            <div id="monster-pic"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 配置與字庫
        // ==========================================
        const XF_APPID = '2600b137';
        const XF_API_KEY = '8b012124ed213c06974cd469f29e134b';
        const XF_API_SECRET = 'MWNkZTQ1ZTEzOTM0NTVjZThjOTQxNjZj';

        const dictionary = [
            { char: '羊', pinyin: 'yáng', emoji: '🐑', svg: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50,20 L50,80 M20,30 L80,30 M30,50 L70,50 M30,20 L50,40 L70,20 M30,70 L70,70" stroke="%235a4634" stroke-width="5" stroke-linecap="round" fill="none"/></svg>' },
            { char: '馬', pinyin: 'mǎ', emoji: '🐴', svg: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M30,70 L40,30 L70,30 L80,50 M40,30 L40,80 M50,30 L50,80 M60,30 L60,80 M70,30 L70,70 M80,50 L75,85" stroke="%235a4634" stroke-width="5" stroke-linecap="round" fill="none"/></svg>' }
        ];

        let currentTarget = null;
        let isTracingPassed = false;
        const instructionEl = document.getElementById('instruction-text');
        const pinyinEl = document.getElementById('pinyin-display');

        function initGame() {
            console.log("[GAME] 初始化遊戲");
            currentTarget = dictionary[Math.floor(Math.random() * dictionary.length)];
            isTracingPassed = false;
            clearCanvas();
            document.getElementById('trace-guide').src = currentTarget.svg;
            document.getElementById('monster-container').classList.remove('revealed');
            pinyinEl.style.opacity = 0; pinyinEl.innerText = currentTarget.pinyin;
            instructionEl.innerText = "請描寫下方的甲骨文字形";
            document.getElementById('checkBtn').style.display = 'inline-block';
            
            const btn = document.getElementById('recordBtn');
            btn.disabled = true; btn.innerText = "🎙️ 唸咒"; btn.classList.remove('recording-pulse');
            document.getElementById('nextBtn').style.display = 'none';
        }

        // ==========================================
        // 2. 畫布邏輯 (簡化省略，專注語音)
        // ==========================================
        const canvas = document.getElementById('writeCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let isDrawing = false; const BRUSH_SIZE = 12;
        ctx.lineWidth = BRUSH_SIZE; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#2c3e50';

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        function startDrawing(e) { if(isTracingPassed) return; e.preventDefault(); isDrawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x + 0.1, pos.y + 0.1); ctx.stroke(); }
        function draw(e) { if (!isDrawing || isTracingPassed) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function stopDrawing() { isDrawing = false; }
        canvas.addEventListener('pointerdown', startDrawing); canvas.addEventListener('pointermove', draw); canvas.addEventListener('pointerup', stopDrawing); canvas.addEventListener('pointerout', stopDrawing); canvas.addEventListener('touchstart', startDrawing); canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', stopDrawing);

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); isTracingPassed = false; pinyinEl.style.opacity = 0; instructionEl.innerText = "請描寫下方的甲骨文字形"; document.getElementById('checkBtn').style.display = 'inline-block'; document.getElementById('recordBtn').disabled = true; }
        
        async function checkWriting() {
            console.log("[GAME] 驗證符文 (為了方便測試語音，此處直接放行)");
            isTracingPassed = true; 
            instructionEl.innerText = "符文生效！準備好後點擊唸咒按鈕";
            pinyinEl.style.opacity = 1; document.getElementById('checkBtn').style.display = 'none';
            document.getElementById('recordBtn').disabled = false;
        }

        // ==========================================
        // 3. 語音評測 (深度除錯與安全防護)
        // ==========================================
        let audioContext, mediaStream, audioWorkletNode;
        let currentWs = null;
        let isRecording = false;
        let stopTimeout = null;

        function getIseAuthUrl() {
            const host = "ise-api.xfyun.cn"; const path = "/v2/open-ise";
            const date = new Date().toUTCString();
            const signatureOrigin = `host: ${host}\ndate: ${date}\nGET ${path} HTTP/1.1`;
            const signatureSha = CryptoJS.HmacSHA256(signatureOrigin, XF_API_SECRET);
            const signature = CryptoJS.enc.Base64.stringify(signatureSha);
            const authorizationOrigin = `api_key="${XF_API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
            return `wss://${host}${path}?authorization=${encodeURIComponent(btoa(authorizationOrigin))}&date=${encodeURIComponent(date)}&host=${host}`;
        }

        function getValidXunfeiText(char) {
            const encoder = new TextEncoder();
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]); // UTF-8 BOM
            const textBytes = encoder.encode(char);
            const combined = new Uint8Array(bom.length + textBytes.length);
            combined.set(bom, 0); combined.set(textBytes, bom.length);
            let binary = '';
            for (let i = 0; i < combined.byteLength; i++) { binary += String.fromCharCode(combined[i]); }
            return window.btoa(binary);
        }

        function downsampleBuffer(buffer, sampleRate, outSampleRate) {
            if (outSampleRate === sampleRate) return buffer;
            const ratio = sampleRate / outSampleRate;
            const res = new Float32Array(Math.round(buffer.length / ratio));
            let offset = 0, bufOffset = 0;
            while (offset < res.length) {
                let nextOffset = Math.round((offset + 1) * ratio);
                let accum = 0, count = 0;
                for (let i = bufOffset; i < nextOffset && i < buffer.length; i++) { accum += buffer[i]; count++; }
                res[offset] = accum / count;
                offset++; bufOffset = nextOffset;
            }
            return res;
        }

        async function initAudioWorklet() {
            const workletCode = `
                class IseRecorderProcessor extends AudioWorkletProcessor {
                    process(inputs, outputs, parameters) {
                        const input = inputs[0];
                        if (input.length > 0 && input[0].length > 0) {
                            this.port.postMessage(input[0]); 
                        }
                        return true;
                    }
                }
                registerProcessor('ise-recorder', IseRecorderProcessor);
            `;
            const blob = new Blob([workletCode], { type: 'application/javascript' });
            const workletUrl = URL.createObjectURL(blob);
            
            console.log("[AUDIO] 嘗試載入 AudioWorklet...");
            try {
                await audioContext.audioWorklet.addModule(workletUrl);
                console.log("[AUDIO] AudioWorklet 載入成功");
                return true;
            } catch (err) {
                console.error("[AUDIO] 致命錯誤：AudioWorklet 載入失敗！(AbortError)", err);
                return false;
            }
        }

        async function toggleRecording() {
            if (isRecording) {
                console.log("[USER] 點擊 [停止錄音]");
                stopRecordingAndAssess();
            } else {
                console.log("[USER] 點擊 [開始錄音]");
                await startVoiceEvaluation();
            }
        }

        async function startVoiceEvaluation() {
            const btn = document.getElementById('recordBtn');
            instructionEl.innerText = "🔴 請允許麥克風...";

            try { 
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } }); 
                console.log("[AUDIO] 麥克風取得成功", mediaStream);
            } catch (e) {
                console.error("[AUDIO] 麥克風取得失敗", e);
                instructionEl.innerText = "❌ 麥克風授權失敗！";
                return;
            }

            isRecording = true;
            btn.innerText = "⏹️ 停止錄音";
            btn.classList.add('recording-pulse');
            instructionEl.innerText = `🔴 錄音中，請大聲讀出：「${currentTarget.pinyin}」，讀完點擊停止`;
            
            const wsUrl = getIseAuthUrl();
            console.log("[WS] 開始連線...", wsUrl);
            currentWs = new WebSocket(wsUrl);
            let isFirstAudioFrame = true;
            let audioChunkCount = 0;

            currentWs.onopen = async () => {
                console.log("[WS] 連線成功！");
                
                // 防護 1: 使用者可能在 WS 連線期間點擊了停止
                if (!isRecording) {
                    console.warn("[WS] 使用者已提前停止，放棄初始化");
                    if (currentWs) currentWs.close();
                    return; 
                }

                const payload = {
                    common: { app_id: XF_APPID },
                    business: { 
                        sub: "ise", cmd: "ssb", category: "read_syllable", 
                        ent: "cn_vip", aue: "raw", tte: "utf-8", ttp_skip: true,
                        text: getValidXunfeiText(currentTarget.char)
                    },
                    data: { status: 0, data: "" }
                };
                console.log("[WS] 發送首幀 (status=0):", payload);
                currentWs.send(JSON.stringify(payload));

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') {
                    console.log("[AUDIO] 喚醒 AudioContext...");
                    await audioContext.resume();
                }

                const workletSuccess = await initAudioWorklet();
                if (!workletSuccess) {
                    instructionEl.innerText = "瀏覽器不支援或封鎖了語音模組";
                    forceResetRecording();
                    return;
                }
                
                // 防護 2: 確認 mediaStream 仍然有效，避免 TypeError
                if (!mediaStream || !mediaStream.active) {
                    console.error("[AUDIO] mediaStream 無效或已被清空！");
                    forceResetRecording();
                    return;
                }
                
                try {
                    const source = audioContext.createMediaStreamSource(mediaStream);
                    audioWorkletNode = new AudioWorkletNode(audioContext, 'ise-recorder');
                    
                    audioWorkletNode.port.onmessage = (e) => {
                        if (!currentWs || currentWs.readyState !== WebSocket.OPEN || !isRecording) return;
                        
                        const downsampled = downsampleBuffer(e.data, audioContext.sampleRate, 16000);
                        
                        // 計算音量供除錯使用
                        let sum = 0;
                        for(let i=0; i<downsampled.length; i++) sum += Math.abs(downsampled[i]);
                        if (audioChunkCount % 10 === 0) {
                            console.log(`[AUDIO] 傳輸 Chunk ${audioChunkCount}, 平均音量: ${(sum/downsampled.length).toFixed(4)}, aus: ${isFirstAudioFrame ? 1 : 2}`);
                        }
                        audioChunkCount++;

                        const pcm = new Int16Array(downsampled.length);
                        for (let i = 0; i < downsampled.length; i++) {
                            let s = Math.max(-1, Math.min(1, downsampled[i]));
                            pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        let binary = ''; const bytes = new Uint8Array(pcm.buffer);
                        for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
                        const base64Audio = window.btoa(binary);

                        currentWs.send(JSON.stringify({ 
                            business: { cmd: "auw", aus: isFirstAudioFrame ? 1 : 2 },
                            data: { status: 1, data: base64Audio } 
                        }));
                        
                        isFirstAudioFrame = false;
                    };

                    source.connect(audioWorkletNode);
                    audioWorkletNode.connect(audioContext.destination); 
                    console.log("[AUDIO] 錄音管道串接完成，開始傳輸！");

                    // 8 秒極限保護
                    stopTimeout = setTimeout(() => { 
                        console.log("[USER] 8 秒超時，自動停止");
                        stopRecordingAndAssess(); 
                    }, 8000);

                } catch (err) {
                    console.error("[AUDIO] 建立音訊來源時發生錯誤:", err);
                    forceResetRecording();
                }
            };

            currentWs.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (res.code !== 0) {
                    console.error("[WS] 伺服器回傳錯誤:", res);
                    instructionEl.innerText = `系統錯誤：${res.code}`;
                    forceResetRecording();
                    return;
                }
                
                if (res.data && res.data.status === 2) {
                    console.log("[WS] 收到最終評測結果 (status=2)");
                    try {
                        const binaryStr = window.atob(res.data.data);
                        const bytes = new Uint8Array(binaryStr.length);
                        for (let i = 0; i < binaryStr.length; i++) { bytes[i] = binaryStr.charCodeAt(i); }
                        const xmlStr = new TextDecoder("utf-8").decode(bytes);
                        
                        console.log("========== 📋 訊飛回傳原始 XML ==========\n" + xmlStr + "\n========================================");
                        parseIseResult(xmlStr);
                    } catch (error) {
                        console.error("[XML] Base64 解碼失敗:", error);
                        instructionEl.innerText = "資料解析錯誤，請重試";
                        forceResetRecording();
                    }
                    currentWs.close();
                }
            };
            
            currentWs.onerror = (err) => {
                console.error("[WS] WebSocket 連線異常:", err);
                instructionEl.innerText = "連線失敗，請檢查網路或密鑰";
                forceResetRecording();
            };
        }

        function stopRecordingAndAssess() {
            if (!isRecording) return;
            isRecording = false;
            console.log("[ACTION] 執行停止錄音並送出結算");

            const btn = document.getElementById('recordBtn');
            btn.classList.remove('recording-pulse');
            btn.innerText = "⏳ 評分中...";
            btn.disabled = true;

            if (stopTimeout) clearTimeout(stopTimeout);

            if (audioWorkletNode) { audioWorkletNode.disconnect(); audioWorkletNode = null; }
            if (audioContext && audioContext.state !== 'closed') { audioContext.close().catch(() => {}); }
            if (mediaStream) { 
                mediaStream.getTracks().forEach(t => t.stop()); 
                mediaStream = null; 
                console.log("[AUDIO] 麥克風已釋放");
            }
            
            if (currentWs && currentWs.readyState === WebSocket.OPEN) { 
                console.log("[WS] 發送尾幀 (aus=4, status=2)");
                currentWs.send(JSON.stringify({ 
                    business: { cmd: "auw", aus: 4 },
                    data: { status: 2, data: "" } 
                })); 
            }
        }

        function forceResetRecording() {
            console.warn("[ACTION] 強制重置錄音狀態");
            isRecording = false;
            if (stopTimeout) clearTimeout(stopTimeout);
            if (audioWorkletNode) { audioWorkletNode.disconnect(); audioWorkletNode = null; }
            if (audioContext && audioContext.state !== 'closed') { audioContext.close().catch(() => {}); }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (currentWs) { currentWs.close(); }

            const btn = document.getElementById('recordBtn');
            btn.classList.remove('recording-pulse');
            btn.innerText = "🎙️ 唸咒";
            btn.disabled = false;
        }

        function parseIseResult(xmlStr) {
            const btn = document.getElementById('recordBtn');
            try {
                const xmlDoc = new DOMParser().parseFromString(xmlStr, "text/xml");
                const readSyllable = xmlDoc.getElementsByTagName("read_syllable")[0];
                
                if (!readSyllable) {
                    console.error("[XML] 找不到 <read_syllable> 節點");
                    instructionEl.innerText = "未找到評分結果";
                    btn.innerText = "🎙️ 唸咒"; btn.disabled = false;
                    return;
                }

                const score = parseFloat(readSyllable.getAttribute("total_score") || 0);
                console.log(`[ISE] 最終得分: ${score}`);
                
                if (score === 0) {
                    const sylls = xmlDoc.getElementsByTagName("syll");
                    if (sylls.length > 0) {
                        const dpMessage = sylls[0].getAttribute("dp_message");
                        console.warn(`[ISE] 0分原因 (dp_message) = ${dpMessage} (16=漏讀/無聲, 128=錯讀)`);
                    }
                }
                
                if (score > 60) {
                    instructionEl.innerText = "✨ 咒語成功！妖怪現形了！";
                    revealMonster();
                } else {
                    instructionEl.innerText = `發音不夠準 (${score.toFixed(1)}分)，再來一次！`;
                    btn.innerText = "🎙️ 唸咒";
                    btn.disabled = false;
                }
            } catch (err) { 
                console.error("[XML] 評測結果解析異常:", err);
                instructionEl.innerText = "解析評測結果失敗"; 
                btn.innerText = "🎙️ 唸咒";
                btn.disabled = false;
            }
        }

        function revealMonster() {
            document.getElementById('recordBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-block';
            document.getElementById('modern-char').innerText = currentTarget.char;
            document.getElementById('monster-pic').innerText = currentTarget.emoji;
            document.getElementById('monster-container').classList.add('revealed');
        }

        window.onload = initGame;
    </script>
</body>
</html>
